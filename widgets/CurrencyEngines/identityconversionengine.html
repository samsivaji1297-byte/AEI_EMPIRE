<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Identity Conversion CTA Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #888;
      --accent: #fff;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "SF Pro Display", "Segoe UI", sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .ambient {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.06), transparent 70%);
      animation: pulse 7s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes pulse {
      0% { opacity: 0.18; transform: scale(1); }
      100% { opacity: 0.32; transform: scale(1.08); }
    }

    .frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6vh 6vw;
      z-index: 1;
      cursor: pointer;
    }

    .inner {
      max-width: 720px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4vh;
    }

    .hook {
      min-height: 10vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hook-text {
      font-size: min(6vw, 26px);
      font-weight: 500;
      line-height: 1.3;
      color: var(--accent);
    }

    .cta-shell {
      position: relative;
      min-height: 18vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cta-block {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.4s ease-out, transform 0.4s ease-out;
    }

    .cta-text {
      font-size: min(7vw, 30px);
      font-weight: 500;
      line-height: 1.25;
      color: var(--accent);
    }

    .cta-sub {
      margin-top: 1.4vh;
      font-size: min(3.8vw, 14px);
      color: var(--muted);
    }

    .bio-center {
      margin-top: 2vh;
      display: flex;
      justify-content: center;
    }

    .bio-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.4em 1em;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      font-size: min(3.4vw, 13px);
      color: var(--fg);
    }

    .bio-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #fff;
    }

    .hint {
      position: absolute;
      bottom: 3vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="ambient"></div>

  <div class="frame" id="tap-area">
    <div class="inner">

      <!-- PROBLEM -->
      <div class="hook">
        <div class="hook-text" id="hook-text">
          You don’t need more motivation. You need a clearer identity.
        </div>
      </div>

      <!-- MICRO + CTA -->
      <div class="cta-shell">
        <div class="cta-block">
          <div class="cta-text" id="cta-main">
            The identity reset is in my bio.
          </div>
          <div class="cta-sub" id="cta-sub">
            Most people aren’t stuck — they’re just running an outdated internal reference.
          </div>
        </div>
      </div>

      <!-- BIO PILL -->
      <div class="bio-center">
        <span class="bio-pill">
          <span class="bio-dot"></span>
          <span>Bio is the only link that matters.</span>
        </span>
      </div>

    </div>

    <div class="hint">Tap anywhere to change</div>
  </div>

  <script>
    (function () {
      const hookEl = document.getElementById("hook-text");
      const ctaMainEl = document.getElementById("cta-main");
      const ctaSubEl = document.getElementById("cta-sub");
      const tapArea = document.getElementById("tap-area");

      const PAIRS = [
        {
          hook: "You don’t need more motivation. You need a clearer identity.",
          ctaMain: "The identity reset is in my bio.",
          ctaSub: "Most people aren’t stuck — they’re just running an outdated internal reference."
        },
        {
          hook: "You’re not behind. You’re running the wrong mental software.",
          ctaMain: "The identity upgrade is in my bio.",
          ctaSub: "Your system hasn’t caught up to who you’ve already become."
        },
        {
          hook: "You’re not lost. You’re unreferenced.",
          ctaMain: "The 60–90 minute identity reset is in my bio.",
          ctaSub: "When your internal compass is offline, everything feels harder than it should."
        },
        {
          hook: "You keep restarting because your identity isn’t stable.",
          ctaMain: "The identity framework is in my bio.",
          ctaSub: "Habits don’t stick when the identity underneath them is outdated."
        },
        {
          hook: "You’re not inconsistent. You’re misaligned.",
          ctaMain: "The alignment protocol is in my bio.",
          ctaSub: "Your actions don’t match your internal system — that’s why everything feels like friction."
        },
        {
          hook: "You don’t need a new routine. You need a new reference point.",
          ctaMain: "The identity audit is in my bio.",
          ctaSub: "Once your identity is clear, the rest becomes automatic."
        },
        {
          hook: "You’re not overwhelmed. You’re operating without an internal map.",
          ctaMain: "The clarity system is in my bio.",
          ctaSub: "Clarity isn’t a feeling — it’s a structure."
        },
        {
          hook: "You’re not broken. You’re out of sync with yourself.",
          ctaMain: "The identity update is in my bio.",
          ctaSub: "Your internal system hasn’t updated in years."
        },
        {
          hook: "You don’t need to fix your life. You need to fix the identity running it.",
          ctaMain: "The identity blueprint is in my bio.",
          ctaSub: "Everything else is downstream from the story you’re operating from."
        },
        {
          hook: "You’re not confused. You’re running two identities at once.",
          ctaMain: "The identity reset is in my bio.",
          ctaSub: "That’s why you feel pulled in every direction."
        }
      ];

      let current = 0;

      function render(idx) {
        const pair = PAIRS[idx];
        hookEl.textContent = pair.hook;
        ctaMainEl.textContent = pair.ctaMain;
        ctaSubEl.textContent = pair.ctaSub;
      }

      function next() {
        current = (current + 1) % PAIRS.length;
        render(current);
      }

      tapArea.addEventListener("click", next);

      render(current);
    })();
  </script>

</body>
</html>
