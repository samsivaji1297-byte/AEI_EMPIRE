<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sovereign Identity Carousel Engine</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif;
}

body{
  position:relative;
}

/* Apple-grade drifting background */
.bg{
  position:absolute;
  inset:-30%;
  filter:blur(70px);
  opacity:0.75;
  animation:drift 26s ease-in-out infinite alternate;
}

@keyframes drift{
  from{transform:scale(1) translate(0,0);}
  to{transform:scale(1.25) translate(-50px,-60px);}
}

.bgStyle{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.12), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,.06), transparent 40%),
    linear-gradient(180deg,#050505,#000);
}

/* Subtle glass + noise */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(255,255,255,.03),transparent);
  backdrop-filter:blur(18px);
}

.noise{
  position:absolute;
  inset:0;
  opacity:.035;
  background-image:radial-gradient(circle, white 1px, transparent 1px);
  background-size:4px 4px;
}

/* Slide container */
.slide{
  position:absolute;
  inset:0;
  padding:0 10vw;
  padding-top:12vh; /* iPhone safe zone */
  padding-bottom:12vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  opacity:0;
  transform:translateY(40px);
  transition:opacity .8s ease, transform .8s ease;
}

.slide.active{
  opacity:1;
  transform:translateY(0);
}

/* Typography */
.main{
  font-size:clamp(40px,8vw,90px);
  line-height:1.05;
  font-weight:680;
  letter-spacing:-1.5px;
  max-width:92%;
  text-wrap:balance;
  margin-bottom:32px;
}

.body{
  font-size:clamp(22px,4.6vw,36px);
  line-height:1.32;
  color:rgba(255,255,255,.78);
  max-width:90%;
  text-wrap:balance;
}

/* CTA slide */
.cta{
  font-size:clamp(26px,6vw,42px);
  line-height:1.25;
  font-weight:600;
  color:#fff;
  max-width:90%;
}

/* Navigation */
.nav{
  position:absolute;
  bottom:5vh;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:8px;
  z-index:10;
}

.dot{
  width:7px;
  height:7px;
  border-radius:999px;
  background:rgba(255,255,255,.25);
  transition:all .25s ease;
}

.dot.active{
  width:22px;
  background:#fff;
}

/* Tap zones */
.tap-left, .tap-right{
  position:absolute;
  top:0;
  bottom:0;
  width:50%;
  z-index:20;
}

.tap-left{ left:0; }
.tap-right{ right:0; }
</style>
</head>
<body>

<div id="bg" class="bg bgStyle"></div>
<div class="overlay"></div>
<div class="noise"></div>

<!-- Slides injected here -->
<div id="slides"></div>

<!-- Tap navigation -->
<div class="tap-left" id="prev"></div>
<div class="tap-right" id="next"></div>

<!-- Bottom nav dots -->
<div class="nav" id="navDots"></div>

<script>
/* ---------------------------------------------------------
   SOVEREIGN IDENTITY CAROUSEL ENGINE — v2
   Tailored to your digital product + doctrine
   --------------------------------------------------------- */

const data = [
  {
    main: "The moment you stop negotiating with the weaker version of you, everything accelerates.",
    body: "Your life doesn’t change when you learn more. It changes when you stop returning to the identity that keeps collapsing your momentum."
  },
  {
    main: "I used to operate from the version of me who couldn’t hold what he wanted.",
    body: "Not because I lacked discipline — but because my identity was still built around survival, not sovereignty. Every upgrade collapsed under the weight of who I used to be."
  },
  {
    main: "Then it clicked.",
    body: "The problem wasn’t my habits. It wasn’t my routines. It wasn’t my environment. It was the identity I kept defaulting back to — the one that couldn’t hold expansion."
  },
  {
    main: "So I rebuilt the internal architecture.",
    body: "I stopped trying to ‘fix’ myself and started operating from the version of me who already moves with inevitability. The one who doesn’t break self‑trust. The one who doesn’t shrink."
  },
  {
    main: "And everything shifted.",
    body: "Momentum stopped leaking. Decisions became clean. Output became automatic. Life started responding to the identity I was finally willing to hold."
  },
  {
    main: "If this hit you, comment 777.",
    body: "Not for luck — but as a declaration that you’re done operating from the version of you who keeps falling back into the old cycle."
  }
];

/* ---------------------------------------------------------
   RENDER ENGINE
   --------------------------------------------------------- */

const slidesContainer = document.getElementById("slides");
const navDots = document.getElementById("navDots");

let index = 0;

function renderSlides(){
  slidesContainer.innerHTML = "";
  navDots.innerHTML = "";

  data.forEach((s, i) => {
    const slide = document.createElement("div");
    slide.className = "slide" + (i === index ? " active" : "");
    slide.innerHTML = `
      <div class="main">${s.main}</div>
      <div class="body">${s.body}</div>
    `;
    slidesContainer.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "dot" + (i === index ? " active" : "");
    navDots.appendChild(dot);
  });
}

function next(){
  index = (index + 1) % data.length;
  renderSlides();
}

function prev(){
  index = (index - 1 + data.length) % data.length;
  renderSlides();
}

document.getElementById("next").onclick = next;
document.getElementById("prev").onclick = prev;

renderSlides();
</script>

</body>
</html>
