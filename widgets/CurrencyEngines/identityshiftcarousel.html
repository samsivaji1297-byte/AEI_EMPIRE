<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cinematic Identity Carousel Engine</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif;
}

body{
  position:relative;
}

/* Cinematic drifting background */
.bg{
  position:absolute;
  inset:-25%;
  filter:blur(60px);
  opacity:0.85;
  animation:drift 22s ease-in-out infinite alternate;
}

@keyframes drift{
  from{transform:scale(1) translate(0,0);}
  to{transform:scale(1.22) translate(-40px,-50px);}
}

.bgStyle{
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.10), transparent 30%),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,.06), transparent 30%),
    linear-gradient(180deg,#050505,#000);
}

/* Subtle glass + noise */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(255,255,255,.04),transparent);
  backdrop-filter:blur(18px);
}

.noise{
  position:absolute;
  inset:0;
  opacity:.04;
  background-image:radial-gradient(circle, white 1px, transparent 1px);
  background-size:4px 4px;
}

/* Slide container */
.slide{
  position:absolute;
  inset:0;
  padding:0 8vw;
  display:flex;
  flex-direction:column;
  justify-content:center;
  opacity:0;
  transform:translateY(40px);
  transition:opacity .8s ease, transform .8s ease;
}

.slide.active{
  opacity:1;
  transform:translateY(0);
}

/* Typography */
.main{
  font-size:clamp(38px,8vw,86px);
  line-height:1.05;
  font-weight:680;
  letter-spacing:-1.5px;
  max-width:92%;
  text-wrap:balance;
  margin-bottom:28px;
}

.body{
  font-size:clamp(20px,4.4vw,34px);
  line-height:1.32;
  color:rgba(255,255,255,.78);
  max-width:90%;
  text-wrap:balance;
}

/* CTA slide */
.cta{
  font-size:clamp(22px,5vw,40px);
  line-height:1.25;
  font-weight:600;
  color:#fff;
  max-width:90%;
}

/* Navigation */
.nav{
  position:absolute;
  bottom:6vh;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:8px;
  z-index:10;
}

.dot{
  width:7px;
  height:7px;
  border-radius:999px;
  background:rgba(255,255,255,.25);
  transition:all .25s ease;
}

.dot.active{
  width:22px;
  background:#fff;
}

/* Tap zones */
.tap-left, .tap-right{
  position:absolute;
  top:0;
  bottom:0;
  width:50%;
  z-index:20;
}

.tap-left{ left:0; }
.tap-right{ right:0; }
</style>
</head>
<body>

<div id="bg" class="bg bgStyle"></div>
<div class="overlay"></div>
<div class="noise"></div>

<!-- Slides injected here -->
<div id="slides"></div>

<!-- Tap navigation -->
<div class="tap-left" id="prev"></div>
<div class="tap-right" id="next"></div>

<!-- Bottom nav dots -->
<div class="nav" id="navDots"></div>

<script>
/* ---------------------------------------------------------
   CINEMATIC IDENTITY CAROUSEL ENGINE — v1.0
   --------------------------------------------------------- */

const data = [
  {
    main: "How I turned my scroll into something that actually builds my life instead of draining it.",
    body: "Same apps. Same phone. Same hours in the day. The only thing that changed was the identity I was operating from."
  },
  {
    main: "I used to scroll for hours with nothing to show for it.",
    body: "It wasn’t laziness. It wasn’t lack of discipline. It was that I was living as a version of myself who didn’t believe my time meant anything."
  },
  {
    main: "One night it hit me.",
    body: "I wasn’t addicted to my phone — I was addicted to avoiding the version of me I knew I could become. That realisation broke something open."
  },
  {
    main: "So I changed the way I used the exact same scroll.",
    body: "I stopped consuming to escape. I started consuming to observe. Patterns. Offers. Behaviour. Identity. What works. What doesn’t. Everything became data."
  },
  {
    main: "And slowly, the identity shifted.",
    body: "I stopped being the person who wasted hours. I became the person who turns minutes into momentum. The scroll didn’t change — I did."
  },
  {
    main: "If this hit you, comment 777.",
    body: "Not for luck — but as a signal that you’re done operating from the version of you who keeps falling behind."
  }
];

/* ---------------------------------------------------------
   RENDER ENGINE
   --------------------------------------------------------- */

const slidesContainer = document.getElementById("slides");
const navDots = document.getElementById("navDots");

let index = 0;

function renderSlides(){
  slidesContainer.innerHTML = "";
  navDots.innerHTML = "";

  data.forEach((s, i) => {
    const slide = document.createElement("div");
    slide.className = "slide" + (i === index ? " active" : "");
    slide.innerHTML = `
      <div class="main">${s.main}</div>
      <div class="body">${s.body}</div>
    `;
    slidesContainer.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "dot" + (i === index ? " active" : "");
    navDots.appendChild(dot);
  });
}

function next(){
  index = (index + 1) % data.length;
  renderSlides();
}

function prev(){
  index = (index - 1 + data.length) % data.length;
  renderSlides();
}

document.getElementById("next").onclick = next;
document.getElementById("prev").onclick = prev;

renderSlides();
</script>

</body>
</html>
