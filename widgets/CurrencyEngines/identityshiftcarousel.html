<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Identity-Shift Carousel Widget</title>
  <style>
    :root {
      --bg-dark: #050509;
      --bg-light: #f7f7fb;
      --accent: #7b5cff;
      --accent-soft: rgba(123, 92, 255, 0.18);
      --text-main: #f5f5ff;
      --text-muted: #a0a0c0;
      --text-dark: #11111a;
      --radius: 18px;
      --transition: 200ms ease-out;
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #171727 0, #050509 55%, #020208 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      color: var(--text-main);
    }

    .widget-shell {
      width: 360px;
      max-width: 100vw;
      background: linear-gradient(145deg, #0b0b14, #050509);
      border-radius: 24px;
      padding: 18px 18px 22px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255, 255, 255, 0.04);
      position: relative;
      overflow: hidden;
    }

    .widget-shell::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0%, rgba(123, 92, 255, 0.25), transparent 55%),
        radial-gradient(circle at 90% 100%, rgba(0, 255, 200, 0.18), transparent 55%);
      opacity: 0.7;
      pointer-events: none;
      z-index: -1;
    }

    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .widget-title {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .widget-pill {
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(5, 5, 12, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .widget-pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.9);
    }

    .carousel-shell {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: radial-gradient(circle at top, #1b1b2b 0, #050509 55%, #020208 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .slide {
      display: none;
      padding: 22px 20px 20px;
      min-height: 260px;
    }

    .slide.active {
      display: block;
    }

    .slide-tag {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .slide-heading {
      font-size: 22px;
      line-height: 1.25;
      font-weight: 650;
      margin-bottom: 10px;
    }

    .slide-sub {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .slide-meta {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(255, 255, 255, 0.45);
    }

    .slide-cta {
      font-size: 14px;
      font-weight: 600;
      margin-top: 6px;
      color: #fefce8;
    }

    .slide-cta span {
      color: #facc15;
    }

    .slide-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.35);
      font-size: 11px;
      color: #e5e7eb;
      margin-top: 10px;
    }

    .slide-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(123, 92, 255, 0.9);
    }

    .carousel-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      background: radial-gradient(circle at bottom, rgba(15, 23, 42, 0.85), rgba(2, 6, 23, 0.95));
    }

    .nav-buttons {
      display: flex;
      gap: 6px;
    }

    .nav-btn {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      transition: background var(--transition), transform var(--transition), border-color var(--transition);
    }

    .nav-btn:hover {
      background: rgba(30, 64, 175, 0.9);
      border-color: rgba(191, 219, 254, 0.9);
      transform: translateY(-1px);
    }

    .nav-btn:active {
      transform: translateY(0);
    }

    .progress-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.45);
      transition: background var(--transition), transform var(--transition), width var(--transition);
    }

    .dot.active {
      background: #e5e7eb;
      width: 14px;
      transform: translateY(-0.5px);
    }

    .footer-meta {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(148, 163, 184, 0.9);
    }

    .footer-meta span {
      color: #facc15;
    }

    @media (max-width: 420px) {
      .widget-shell {
        border-radius: 0;
        height: 100vh;
        max-width: 100vw;
      }
    }
  </style>
</head>
<body>
  <div class="widget-shell">
    <div class="widget-header">
      <div class="widget-title">Identity-shift carousel</div>
      <div class="widget-pill">
        <span class="widget-pill-dot"></span>
        Engine: v1.0
      </div>
    </div>

    <div class="carousel-shell" id="carousel">
      <!-- Slides will be injected here -->
    </div>
  </div>

  <script>
    // -----------------------------
    // CONFIG: IDENTITY-SHIFT ORGANISM
    // -----------------------------
    const carouselConfig = {
      overlay: "Money",
      rootNode: "I’m tired of scrolling for hours and having nothing to show for it.",
      personaBefore: "I used to scroll for hours with nothing to show for it.",
      incitingIncident: "One night while scrolling, I realised my screen time was higher than my income.",
      keyAction: "I turned my scroll into a research tool instead of an escape.",
      experiment: "I started documenting what actually worked, then built a simple offer around it.",
      outcome: "Now I barely scroll—and the time I do spend online compounds into income.",
      ctaKeyword: "777",
      ctaLine: "Comment 777 and I’ll send you the breakdown.",
      cluster: "Identity-shift",
      baseNeeds: ["Progress", "Competence", "Recognition", "Identity", "Belonging"]
    };

    // -----------------------------
    // SLIDE GENERATION LOGIC
    // -----------------------------
    function buildSlides(config) {
      return [
        {
          tag: "Hook",
          heading: "How I turned my scroll into income",
          sub: "Same apps. Same phone. Completely different identity.",
          meta: `${config.overlay} · ${config.cluster}`
        },
        {
          tag: "Pain",
          heading: config.personaBefore,
          sub: config.rootNode,
          meta: "Root node: Pattern-fatigue · Shame"
        },
        {
          tag: "Catalyst",
          heading: config.incitingIncident,
          sub: "There was a moment where “this is just how it is” stopped being acceptable.",
          meta: "Trigger: Identity-shift"
        },
        {
          tag: "Action",
          heading: config.keyAction,
          sub: "I stopped treating my feed like entertainment and started treating it like data.",
          meta: "Base need: Competence · Autonomy"
        },
        {
          tag: "Transformation",
          heading: config.experiment,
          sub: config.outcome,
          meta: "Base need: Progress"
        },
        {
          tag: "CTA",
          heading: config.ctaLine,
          sub: "If you see yourself in the “before” version, this is your signal to stop being average.",
          meta: "Belonging · Identity",
          isCTA: true,
          ctaKeyword: config.ctaKeyword
        }
      ];
    }

    // -----------------------------
    // RENDER ENGINE
    // -----------------------------
    const slides = buildSlides(carouselConfig);
    let currentIndex = 0;

    function renderCarousel() {
      const container = document.getElementById("carousel");
      container.innerHTML = "";

      // Slides
      slides.forEach((slide, index) => {
        const slideEl = document.createElement("div");
        slideEl.className = "slide" + (index === currentIndex ? " active" : "");

        slideEl.innerHTML = `
          <div class="slide-tag">${slide.tag}</div>
          <div class="slide-heading">${slide.heading}</div>
          <div class="slide-sub">${slide.sub}</div>
          <div class="slide-meta">${slide.meta}</div>
          ${
            slide.isCTA
              ? `<div class="slide-cta">Type <span>${slide.ctaKeyword}</span> in the comments if this hit a nerve.</div>
                 <div class="slide-badge">
                   <span class="slide-badge-dot"></span>
                   Identity mechanic: Belonging signal
                 </div>`
              : ""
          }
        `;

        container.appendChild(slideEl);
      });

      // Footer
      const footer = document.createElement("div");
      footer.className = "carousel-footer";

      const nav = document.createElement("div");
      nav.className = "nav-buttons";
      nav.innerHTML = `
        <button class="nav-btn" id="prevBtn">&#8592;</button>
        <button class="nav-btn" id="nextBtn">&#8594;</button>
      `;

      const progress = document.createElement("div");
      progress.className = "progress-dots";
      slides.forEach((_, i) => {
        const dot = document.createElement("div");
        dot.className = "dot" + (i === currentIndex ? " active" : "");
        progress.appendChild(dot);
      });

      const meta = document.createElement("div");
      meta.className = "footer-meta";
      meta.innerHTML = `Slide ${currentIndex + 1}/${slides.length} · <span>${carouselConfig.overlay}</span> overlay`;

      footer.appendChild(nav);
      footer.appendChild(progress);
      footer.appendChild(meta);
      container.appendChild(footer);

      document.getElementById("prevBtn").onclick = () => {
        currentIndex = (currentIndex - 1 + slides.length) % slides.length;
        renderCarousel();
      };
      document.getElementById("nextBtn").onclick = () => {
        currentIndex = (currentIndex + 1) % slides.length;
        renderCarousel();
      };
    }

    renderCarousel();
  </script>
</body>
</html>
