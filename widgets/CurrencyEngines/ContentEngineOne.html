<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cinematic Content Engine One</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    color: #f2f2f7;
  }

  /* CAMERA MOVEMENT (subtle zoom + drift) */
  .camera {
    position: absolute;
    inset: 0;
    transform-origin: center;
    animation: camZoom 22s ease-in-out infinite alternate,
               camDrift 18s ease-in-out infinite alternate;
  }

  @keyframes camZoom {
    0% { transform: scale(1); }
    100% { transform: scale(1.06); }
  }

  @keyframes camDrift {
    0% { transform: translate(0,0); }
    50% { transform: translate(-12px, 8px); }
    100% { transform: translate(6px, -6px); }
  }

  /* BACKGROUND GRADIENT FOG */
  .bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.08), transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(255,255,255,0.05), transparent 60%),
                linear-gradient(180deg, #0a0a0c 0%, #000 100%);
    filter: blur(40px);
    opacity: 0.9;
  }

  /* PARALLAX PARTICLES */
  .particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    filter: blur(2px);
    animation: float 14s ease-in-out infinite alternate;
  }

  @keyframes float {
    0% { transform: translateY(0) translateX(0); opacity: 0.4; }
    50% { opacity: 0.7; }
    100% { transform: translateY(-40px) translateX(20px); opacity: 0.4; }
  }

  /* TEXT CONTAINER */
  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 900px;
    text-align: center;
  }

  .line {
    opacity: 0;
    font-size: 2.2rem; /* reduced for premium balance */
    line-height: 1.34; /* increased breathing room */
    font-weight: 500;
    letter-spacing: -0.01em;
    transform: translateY(22px);
    transition: opacity 1.4s cubic-bezier(0.25, 0.1, 0.25, 1),
                transform 1.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    color: #f2f2f7;
    text-shadow: 0 0 18px rgba(255,255,255,0.08);
    margin: 22px 0; /* optical spacing */
  }

  .visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Apple‑style glow pulse */
  .pulse {
    animation: pulse 6s ease-in-out infinite;
  }

  @keyframes pulse {
    0% { text-shadow: 0 0 12px rgba(255,255,255,0.05); }
    50% { text-shadow: 0 0 22px rgba(255,255,255,0.12); }
    100% { text-shadow: 0 0 12px rgba(255,255,255,0.05); }
  }
</style>
</head>
<body>

<div class="camera">
  <div class="bg"></div>
  <div class="particles" id="particles"></div>

  <div class="center">
    <div id="hook" class="line pulse"></div>
    <div id="tension" class="line"></div>
    <div id="relief" class="line"></div>
    <div id="gap" class="line"></div>
    <div id="trigger" class="line"></div>
  </div>
</div>

<script>
/* TEXT SEQUENCES */
const sequences = [
  {
    hook: "You’re not failing because your ideas are bad.",
    tension: "You’re failing because your ideas never survive the scroll.",
    relief: "Once you see content as physics, everything behaves differently.",
    gap: "Right now, your content has no gravity.",
    trigger: "Fix the physics and distribution becomes inevitable."
  },
  {
    hook: "Most creators don’t have a strategy.",
    tension: "They have a coping mechanism for being ignored.",
    relief: "That’s why everything feels loud but weightless.",
    gap: "If your content leaves no residue, it can’t compound.",
    trigger: "Design for residue and people start orbiting you."
  },
  {
    hook: "You don’t need more reach.",
    tension: "You need more people who can’t stop thinking about one line you said.",
    relief: "That comes from engineered emotional residue.",
    gap: "If your content lets them stay the same, it can’t move money.",
    trigger: "Write for the version of them that’s already outgrown their life."
  }
];

const seq = sequences[Math.floor(Math.random() * sequences.length)];

hook.textContent = seq.hook;
tension.textContent = seq.tension;
relief.textContent = seq.relief;
gap.textContent = seq.gap;
trigger.textContent = seq.trigger;

/* CINEMATIC TIMING */
setTimeout(() => hook.classList.add("visible"), 300);
setTimeout(() => tension.classList.add("visible"), 2000);
setTimeout(() => relief.classList.add("visible"), 3600);
setTimeout(() => gap.classList.add("visible"), 5200);
setTimeout(() => trigger.classList.add("visible"), 6800);

/* PARTICLE GENERATION */
const particleContainer = document.getElementById("particles");

for (let i = 0; i < 40; i++) {
  const p = document.createElement("div");
  p.classList.add("particle");
  p.style.left = Math.random() * 100 + "%";
  p.style.top = Math.random() * 100 + "%";
  p.style.animationDuration = 10 + Math.random() * 12 + "s";
  p.style.animationDelay = Math.random() * 6 + "s";
  p.style.opacity = 0.3 + Math.random() * 0.4;
  particleContainer.appendChild(p);
}
</script>

</body>
</html>
