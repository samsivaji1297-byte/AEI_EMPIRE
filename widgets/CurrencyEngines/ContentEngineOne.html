<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Content Physics Ritual Engine</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #050509;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    color: #f5f5f7;
  }

  /* Cinematic fog */
  .fog {
    position: absolute;
    inset: 0;
    background: url('https://i.imgur.com/8fKQZ5C.png');
    background-size: cover;
    opacity: 0.18;
    animation: drift 22s linear infinite;
    filter: blur(12px);
  }

  @keyframes drift {
    0% { transform: scale(1.1) translate(0,0); }
    50% { transform: scale(1.15) translate(20px, -10px); }
    100% { transform: scale(1.1) translate(0,0); }
  }

  /* Centered text container */
  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 900px;
    text-align: center;
  }

  .line {
    opacity: 0;
    font-size: 2.4rem;
    line-height: 1.3;
    font-weight: 500;
    letter-spacing: -0.01em;
    transform: translateY(20px);
    transition: opacity 1.2s ease, transform 1.2s ease;
  }

  .visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Color coding for phases */
  .hook { color: #ffffff; }
  .tension { color: #ff9b9b; }
  .relief { color: #b8ffcf; }
  .gap { color: #ffe7b3; }
  .trigger { color: #c7c7ff; }

</style>
</head>
<body>

<div class="fog"></div>

<div class="center">
  <div id="hook" class="line hook"></div>
  <div id="tension" class="line tension"></div>
  <div id="relief" class="line relief"></div>
  <div id="gap" class="line gap"></div>
  <div id="trigger" class="line trigger"></div>
</div>

<script>
const sequences = [
  {
    hook: "You’re not failing because your ideas are bad.",
    tension: "You’re failing because your ideas never survive the scroll.",
    relief: "Once you see content as physics, everything behaves differently.",
    gap: "Right now, your content has no gravity.",
    trigger: "Fix the physics and distribution becomes inevitable."
  },
  {
    hook: "Most creators don’t have a strategy.",
    tension: "They have a coping mechanism for being ignored.",
    relief: "That’s why everything feels loud but weightless.",
    gap: "If your content leaves no residue, it can’t compound.",
    trigger: "Design for residue and people start orbiting you."
  },
  {
    hook: "You don’t need more reach.",
    tension: "You need more people who can’t stop thinking about one line you said.",
    relief: "That comes from engineered emotional residue.",
    gap: "If your content lets them stay the same, it can’t move money.",
    trigger: "Write for the version of them that’s already outgrown their life."
  }
];

const seq = sequences[Math.floor(Math.random() * sequences.length)];

document.getElementById("hook").textContent = seq.hook;
document.getElementById("tension").textContent = seq.tension;
document.getElementById("relief").textContent = seq.relief;
document.getElementById("gap").textContent = seq.gap;
document.getElementById("trigger").textContent = seq.trigger;

/* Timed cinematic reveal */
setTimeout(() => document.getElementById("hook").classList.add("visible"), 200);
setTimeout(() => document.getElementById("tension").classList.add("visible"), 1800);
setTimeout(() => document.getElementById("relief").classList.add("visible"), 3400);
setTimeout(() => document.getElementById("gap").classList.add("visible"), 5000);
setTimeout(() => document.getElementById("trigger").classList.add("visible"), 6600);
</script>

</body>
</html>
