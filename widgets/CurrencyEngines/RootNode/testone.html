<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Identity Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --fg:#f5f5f7;--muted:#a1a1aa;--line:rgba(255,255,255,.12);
  --glass:rgba(255,255,255,.06);--bg1:#050509;--bg2:#020308;--bg3:#000000;--accent:#38bdf8
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{
  margin:0;height:100%;overflow:hidden;background:#000;color:var(--fg);
  font-family:"Space Grotesk",-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
}
body{
  background:radial-gradient(circle at top,var(--bg1) 0%,var(--bg2) 42%,var(--bg3) 100%);
  transition:background 1.2s ease,color 1.2s ease;
}
.wrap{position:relative;height:100%;overflow:hidden}

/* Atmosphere */
.bg,.bg2,.bg3,.beam,.gridGlow{position:absolute;border-radius:50%;pointer-events:none}
.bg,.bg2,.bg3{filter:blur(90px);opacity:.32;animation:float 10s ease-in-out infinite alternate}
.bg{width:320px;height:320px;background:#ffffff18;top:4%;left:-18%}
.bg2{width:260px;height:260px;background:color-mix(in srgb, var(--accent) 26%, transparent);
  right:-12%;bottom:10%;animation-duration:14s}
.bg3{width:200px;height:200px;background:#38bdf822;left:32%;bottom:22%;animation-duration:11s}
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.8);
  opacity:.25;animation:drift linear infinite}
@keyframes drift{from{transform:translateY(110vh) scale(.6)}to{transform:translateY(-10vh) scale(1.2)}}
.noise{
  position:absolute;inset:0;opacity:.035;mix-blend-mode:overlay;pointer-events:none;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.9"/></svg>');
  animation:noiseShift .2s steps(2) infinite;
}
@keyframes noiseShift{from{transform:translateX(0)}to{transform:translateX(-2px)}}
.beam{
  width:140%;height:120px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  filter:blur(18px);
  transform:rotate(-12deg);
  animation:beamMove 7s linear infinite;
  opacity:.7;
}
.gridGlow{
  inset:-20%;
  background:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(circle at center, black 35%, transparent 80%);
  animation:gridShift 16s linear infinite;
  opacity:.22;
}
@keyframes float{to{transform:translateY(45px) translateX(20px)}}
@keyframes beamMove{from{transform:translateX(-40%) rotate(-12deg)}to{transform:translateX(40%) rotate(-12deg)}}
@keyframes gridShift{from{transform:translateY(0)}to{transform:translateY(40px)}}

/* Stage */
.viewport{position:absolute;inset:0;overflow:hidden}
.feed{position:absolute;inset:0;transition:transform .75s cubic-bezier(.22,1,.36,1)}
.stage{
  position:absolute;inset:18px;border-radius:32px;border:1px solid var(--line);
  padding:26px 26px 24px;
  display:flex;flex-direction:column;justify-content:space-between;
  background:linear-gradient(180deg,rgba(15,23,42,.9),rgba(15,23,42,.4));
  backdrop-filter:blur(26px);
  box-shadow:0 26px 90px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.06);
  transform-style:preserve-3d;transition:transform .2s ease;
}
.headerRow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.brand{
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);opacity:.9;
}
.slideIndex{
  font-size:11px;color:var(--muted);opacity:.8;
}
h1{
  margin:18px 0 0;
  font-size:34px;line-height:1.05;letter-spacing:-1.2px;
  max-width:92%;font-weight:600;
}
.sub{
  margin-top:12px;font-size:16px;line-height:1.5;color:#d7d7dc;max-width:92%;
}
.quote{
  margin-top:18px;font-size:20px;line-height:1.35;letter-spacing:-.3px;
  max-width:92%;color:#e5e5f0;
}
.footer{
  display:flex;justify-content:space-between;align-items:center;gap:14px;margin-top:22px;
}
.pill{
  padding:9px 16px;border-radius:999px;
  border:1px solid var(--line);background:var(--glass);
  font-size:12px;color:#e5e7eb;display:inline-flex;align-items:center;gap:8px;
}
.dot{
  width:7px;height:7px;border-radius:50%;background:#38bdf8;
  box-shadow:0 0 16px #38bdf8;animation:pulse 2s infinite;
}
@keyframes pulse{50%{opacity:.45;transform:scale(.8)}}
.tag{
  font-size:12px;color:var(--muted);text-align:right;max-width:40%;
}

/* Scan + ring */
.scan{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent,rgba(148,163,184,.12),transparent);
  animation:scan 5s linear infinite;pointer-events:none;mix-blend-mode:screen;
}
.pulseRing{
  position:absolute;width:220px;height:220px;border-radius:50%;
  border:1px solid rgba(148,163,184,.35);
  left:50%;top:50%;transform:translate(-50%,-50%);
  animation:ring 4.2s ease-out infinite;pointer-events:none;
}
@keyframes ring{
 0%{transform:translate(-50%,-50%) scale(.7);opacity:.0}
 30%{opacity:.4}
 100%{transform:translate(-50%,-50%) scale(1.7);opacity:0}
}
@keyframes scan{from{transform:translateY(-100%)}to{transform:translateY(100%)}}

/* Animations */
.fade{animation:fade .7s ease}
@keyframes fade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* Nav dots (minimal, no labels) */
.navDots{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;justify-content:center;
}
.navDot{
  width:6px;height:6px;border-radius:999px;
  background:rgba(148,163,184,.4);
  transition:background .25s ease,transform .25s ease;
}
.navDot.active{
  background:#e5e7eb;transform:scale(1.2);
}
</style>
</head>
<body>
<div class="wrap">
  <div class="gridGlow"></div>
  <div class="noise"></div>
  <div class="particles" id="particles"></div>
  <div class="beam"></div>
  <div class="bg"></div><div class="bg2"></div><div class="bg3"></div>

  <div class="viewport">
    <div class="feed" id="feed">
      <div class="stage" id="stage">
        <div>
          <div class="headerRow">
            <div class="brand">MENTAL SOVEREIGNTY</div>
            <div class="slideIndex" id="slideIndex"></div>
          </div>
          <h1 id="title"></h1>
          <div class="sub" id="sub"></div>
          <div class="quote" id="quote"></div>
        </div>
        <div class="footer">
          <div class="pill" id="pill"><span class="dot"></span><span></span></div>
          <div class="tag" id="tag"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="scan"></div>
  <div class="pulseRing"></div>
  <div class="navDots" id="navDots"></div>
</div>

<script>
// THEMES
const themes=[
 {bg1:'#020617',bg2:'#020617',bg3:'#000000',accent:'#38bdf8'},
 {bg1:'#020617',bg2:'#020617',bg3:'#020617',accent:'#22c55e'},
 {bg1:'#020617',bg2:'#020617',bg3:'#000000',accent:'#f97316'},
 {bg1:'#020617',bg2:'#020617',bg3:'#000000',accent:'#a855f7'},
 {bg1:'#020617',bg2:'#020617',bg3:'#000000',accent:'#e5e7eb'}
];
function applyTheme(){
  const t=themes[Math.floor(Math.random()*themes.length)];
  document.documentElement.style.setProperty('--bg1',t.bg1);
  document.documentElement.style.setProperty('--bg2',t.bg2);
  document.documentElement.style.setProperty('--bg3',t.bg3);
  document.documentElement.style.setProperty('--accent',t.accent);
}

// CONTENT ENGINE — HYBRID IDENTITY DOPAMINE
const transmissions=[
  {
    id:'identity_pressure',
    slides:[
      {
        title:'You’re not unmotivated.<br>You’re living below your identity.',
        sub:'Your mind shuts down when your life doesn’t match who you know you could be.',
        quote:'Ambition dies in environments that insult it.',
        cta:'Rise to your level',
        tag:'Identity Architecture'
      },
      {
        title:'Your future self is losing patience.',
        sub:'You feel “behind” because a bigger version of you has been ready for a while.',
        quote:'The gap between who you are and who you know you could be is where your anxiety lives.',
        cta:'Close the gap',
        tag:'Future Self Protocol'
      },
      {
        title:'You’re not lazy.<br>You’re misaligned.',
        sub:'When your goals don’t feel like they belong to you, your effort will always collapse.',
        quote:'Identity drives behaviour. Not willpower.',
        cta:'Realign your targets',
        tag:'Internal Alignment'
      },
      {
        title:'Your standards are too low<br>for the life you want.',
        sub:'You keep trying to build a high‑end future on low‑end habits.',
        quote:'Your life will never rise above what you tolerate from yourself.',
        cta:'Raise the floor',
        tag:'Standard Upgrade'
      }
    ]
  },
  {
    id:'future_pull',
    slides:[
      {
        title:'Your next level is already built.<br>You’re just not in it yet.',
        sub:'You’ve seen glimpses of the person you could be. That wasn’t a fantasy. That was a preview.',
        quote:'Your future self is not a dream. It’s a version of you waiting for a decision.',
        cta:'Step into it',
        tag:'Future Self Online'
      },
      {
        title:'You’re not stuck.<br>You’re resisting who you’re becoming.',
        sub:'Part of you wants to stay familiar. The rest of you is done pretending.',
        quote:'Growth feels like loss when you’re still attached to your old identity.',
        cta:'Let the old version go',
        tag:'Identity Shedding'
      },
      {
        title:'Your life feels wrong<br>because your identity is outdated.',
        sub:'You’re running new desires on old self‑concept code.',
        quote:'An upgraded life requires an upgraded identity first.',
        cta:'Update the script',
        tag:'Self‑Concept Rewrite'
      },
      {
        title:'You’re not behind.<br>You’re under‑expressed.',
        sub:'There’s nothing wrong with your potential. It’s your expression that’s throttled.',
        quote:'Your life changes the moment you stop hiding from your own capacity.',
        cta:'Turn yourself up',
        tag:'Full Expression'
      }
    ]
  },
  {
    id:'self_trust',
    slides:[
      {
        title:'You don’t need more discipline.<br>You need self‑trust.',
        sub:'You can’t follow a plan you secretly believe you’ll abandon.',
        quote:'Consistency is just proof that you trust yourself.',
        cta:'Rebuild that trust',
        tag:'Internal Integrity'
      },
      {
        title:'You’re exhausted because you keep negotiating with yourself.',
        sub:'Every time you break a promise to yourself, your energy drops.',
        quote:'Self‑betrayal drains more power than any hard work ever will.',
        cta:'Stop renegotiating',
        tag:'Non‑Negotiable Standards'
      },
      {
        title:'Your habits don’t match the person you say you want to be.',
        sub:'Your identity is watching every choice you make and adjusting its belief in you.',
        quote:'You’re teaching your future self what to expect from you.',
        cta:'Send a different signal',
        tag:'Behavioural Signal'
      }
    ]
  }
];

// STATE
let currentTransmissionIndex=0;
let currentSlideIndex=0;
let autoTimer=null;
let longPressTimer=null;

// DOM
const titleEl=document.getElementById('title');
const subEl=document.getElementById('sub');
const quoteEl=document.getElementById('quote');
const pillEl=document.getElementById('pill').querySelector('span:last-child');
const tagEl=document.getElementById('tag');
const slideIndexEl=document.getElementById('slideIndex');
const feed=document.getElementById('feed');
const stage=document.getElementById('stage');
const navDotsContainer=document.getElementById('navDots');

// NAV DOTS
function renderNavDots(){
  navDotsContainer.innerHTML='';
  const slides=transmissions[currentTransmissionIndex].slides;
  slides.forEach((_,idx)=>{
    const d=document.createElement('div');
    d.className='navDot'+(idx===currentSlideIndex?' active':'');
    navDotsContainer.appendChild(d);
  });
}

// RENDER
function renderSlide(){
  const t=transmissions[currentTransmissionIndex];
  const s=t.slides[currentSlideIndex];
  applyTheme();

  titleEl.innerHTML=s.title;
  subEl.textContent=s.sub;
  quoteEl.textContent=s.quote;
  pillEl.textContent=s.cta;
  tagEl.textContent=s.tag;
  slideIndexEl.textContent=`${currentSlideIndex+1} / ${t.slides.length}`;

  document.querySelectorAll('h1,.sub,.quote,.footer,.headerRow')
    .forEach(el=>{
      el.classList.remove('fade');
      void el.offsetWidth;
      el.classList.add('fade');
    });

  renderNavDots();
}

// TRANSITIONS
function flash(){
  const f=document.createElement('div');
  f.style.position='absolute';
  f.style.inset='0';
  f.style.background='rgba(148,163,184,.12)';
  f.style.backdropFilter='blur(10px)';
  f.style.animation='fadeFlash .45s ease forwards';
  document.querySelector('.wrap').appendChild(f);
  setTimeout(()=>f.remove(),450);
}
const style=document.createElement('style');
style.innerHTML='@keyframes fadeFlash{from{opacity:.6}to{opacity:0}}';
document.head.appendChild(style);

function swipeTransition(cb){
  feed.style.transform='translateY(-8%) scale(.98)';
  setTimeout(()=>{
    feed.style.transition='none';
    feed.style.transform='translateY(100%) scale(1.02)';
    cb && cb();
    requestAnimationFrame(()=>{
      feed.style.transition='transform .9s cubic-bezier(.22,1,.36,1)';
      feed.style.transform='translateY(0%) scale(1)';
    });
  },200);
}

// CONTROLS
function nextSlide(){
  const t=transmissions[currentTransmissionIndex];
  if(currentSlideIndex < t.slides.length-1){
    currentSlideIndex++;
  }else{
    currentTransmissionIndex=(currentTransmissionIndex+1)%transmissions.length;
    currentSlideIndex=0;
  }
  flash();
  swipeTransition(()=>renderSlide());
}
function prevSlide(){
  if(currentSlideIndex>0){
    currentSlideIndex--;
  }else{
    currentTransmissionIndex=(currentTransmissionIndex-1+transmissions.length)%transmissions.length;
    currentSlideIndex=transmissions[currentTransmissionIndex].slides.length-1;
  }
  flash();
  swipeTransition(()=>renderSlide());
}

// INTERACTIONS
function bindInteractions(){
  let startY=0,startX=0;
  document.body.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    startY=t.clientY;startX=t.clientX;
    longPressTimer=setTimeout(()=>{
      autoTimer=setInterval(nextSlide,3500);
    },500);
  },{passive:true});

  document.body.addEventListener('touchend',e=>{
    clearTimeout(longPressTimer);
    clearInterval(autoTimer);
    const t=e.changedTouches[0]||{};
    const dy=startY-(t.clientY||0);
    const dx=Math.abs((t.clientX||0)-startX);
    if(dy>40){nextSlide();}
    else if(dy<-40){prevSlide();}
    else if(dx<12){nextSlide();}
  },{passive:true});

  document.body.addEventListener('click',nextSlide);
}
bindInteractions();

// PARTICLES
const particles=document.getElementById('particles');
for(let p=0;p<45;p++){
  const el=document.createElement('div');
  el.className='particle';
  el.style.left=Math.random()*100+'%';
  el.style.animationDuration=(6+Math.random()*12)+'s';
  el.style.animationDelay=(-Math.random()*12)+'s';
  el.style.opacity=(.08+Math.random()*.35);
  particles.appendChild(el);
}

// PARALLAX
window.addEventListener('deviceorientation',e=>{
  const x=(e.gamma||0)/8,y=(e.beta||0)/20;
  stage.style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;
});

// INIT
renderSlide();
</script>
</body>
</html>
