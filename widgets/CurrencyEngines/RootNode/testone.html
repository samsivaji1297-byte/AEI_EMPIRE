<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sovereign Money-Overlay Engine</title>
<style>
:root{
  --fg:#f5f5f7;--muted:#a1a1aa;--line:rgba(255,255,255,.12);
  --glass:rgba(255,255,255,.06);--bg1:#111;--bg2:#050505;--bg3:#000;--accent:#d4af37
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#000;color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif}
body{
  background:radial-gradient(circle at top,var(--bg1) 0%,var(--bg2) 42%,var(--bg3) 100%);
  transition:background 1.2s ease,color 1.2s ease
}
.wrap{position:relative;height:100%;overflow:hidden}
.bg,.bg2,.bg3,.beam,.gridGlow{position:absolute;border-radius:50%;pointer-events:none}
.bg,.bg2,.bg3{filter:blur(90px);opacity:.32;animation:float 10s ease-in-out infinite alternate}
.bg{width:300px;height:300px;background:#ffffff22;top:6%;left:-15%}
.bg2{width:260px;height:260px;background:color-mix(in srgb, var(--accent) 22%, transparent);
  right:-10%;bottom:8%;animation-duration:14s}
.bg3{width:180px;height:180px;background:#5c7cff22;left:30%;bottom:20%;animation-duration:11s}
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.8);
  opacity:.25;animation:drift linear infinite}
@keyframes drift{from{transform:translateY(110vh) scale(.6)}to{transform:translateY(-10vh) scale(1.2)}}
.noise{
  position:absolute;inset:0;opacity:.035;mix-blend-mode:overlay;pointer-events:none;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.9"/></svg>');
  animation:noiseShift .2s steps(2) infinite;
}
@keyframes noiseShift{from{transform:translateX(0)}to{transform:translateX(-2px)}}
.beam{
  width:140%;height:120px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  filter:blur(18px);
  transform:rotate(-12deg);
  animation:beamMove 7s linear infinite;
  opacity:.7;
}
.gridGlow{
  inset:-20%;
  background:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(circle at center, black 35%, transparent 80%);
  animation:gridShift 16s linear infinite;
  opacity:.25;
}
@keyframes float{to{transform:translateY(45px) translateX(20px)}}
@keyframes beamMove{from{transform:translateX(-40%) rotate(-12deg)}to{transform:translateX(40%) rotate(-12deg)}}
@keyframes gridShift{from{transform:translateY(0)}to{transform:translateY(40px)}}
.viewport{position:absolute;inset:0;overflow:hidden}
.feed{position:absolute;inset:0;transition:transform .75s cubic-bezier(.22,1,.36,1)}
.stage{
  position:absolute;inset:18px;border:1px solid var(--line);border-radius:36px;padding:24px 24px 26px;
  display:flex;flex-direction:column;justify-content:space-between;
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
  backdrop-filter:blur(28px);
  box-shadow:0 25px 100px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.08);
  transform-style:preserve-3d;transition:transform .2s ease
}
.headerRow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.kicker{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.moneyTag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.moneyTag span{opacity:.7}
h1{margin:14px 0 0;font-size:34px;line-height:1.02;letter-spacing:-1.4px;max-width:92%}
.sub{margin-top:12px;font-size:16px;line-height:1.45;color:#d7d7dc;max-width:92%}
.overlayMeta{margin-top:10px;font-size:12px;color:var(--muted);max-width:92%}
.slideIndex{font-size:11px;color:var(--muted);margin-top:6px}
.quote{font-size:22px;line-height:1.2;letter-spacing:-.6px;max-width:92%;margin-top:10px}
.footer{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-top:18px}
.pill{padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:var(--glass);font-size:12px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#fff;
  box-shadow:0 0 18px #fff;margin-right:8px;animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.45;transform:scale(.8)}}
.scan{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.03),transparent);
  animation:scan 5s linear infinite;pointer-events:none;mix-blend-mode:screen}
.pulseRing{
  position:absolute;width:240px;height:240px;border-radius:50%;
  border:1px solid rgba(255,255,255,.08);
  left:50%;top:50%;transform:translate(-50%,-50%);
  animation:ring 4s ease-out infinite;pointer-events:none;
}
@keyframes ring{
 0%{transform:translate(-50%,-50%) scale(.7);opacity:.0}
 30%{opacity:.4}
 100%{transform:translate(-50%,-50%) scale(1.8);opacity:0}
}
@keyframes scan{from{transform:translateY(-100%)}to{transform:translateY(100%)}}
.fade{animation:fade .7s ease}@keyframes fade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.hint{
  position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
  font-size:11px;color:#7c7c84;letter-spacing:1px;text-align:center
}
.hint span{opacity:.7}
.navDots{display:flex;gap:6px;justify-content:center;margin-top:6px}
.navDot{
  width:6px;height:6px;border-radius:999px;background:rgba(255,255,255,.16);
  transition:background .25s ease,transform .25s ease
}
.navDot.active{background:#fff;transform:scale(1.2)}
</style>
</head>
<body>
<div class="wrap">
  <div class="gridGlow"></div>
  <div class="noise"></div>
  <div class="particles" id="particles"></div>
  <div class="beam"></div>
  <div class="bg"></div><div class="bg2"></div><div class="bg3"></div>

  <div class="viewport">
    <div class="feed" id="feed">
      <div class="stage" id="stage">
        <div>
          <div class="headerRow">
            <div>
              <div class="kicker" id="kicker">Mental Sovereignty</div>
              <div class="moneyTag" id="moneyTag"></div>
            </div>
            <div class="slideIndex" id="slideIndex"></div>
          </div>
          <h1 id="title"></h1>
          <div class="sub" id="sub"></div>
          <div class="overlayMeta" id="overlayMeta"></div>
          <div class="quote" id="quote"></div>
        </div>
        <div class="footer">
          <div class="pill" id="pill"></div>
          <div style="font-size:12px;color:var(--muted)" id="tag"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="scan"></div>
  <div class="pulseRing"></div>
  <div class="hint">
    TAP / SWIPE UP TO ADVANCE<br/>
    <span>Long‑press to auto‑cycle • Tilt device to shift perspective</span>
    <div class="navDots" id="navDots"></div>
  </div>
</div>

<script>
// THEME ENGINE
const themes=[
 {bg1:'#111111',bg2:'#050505',bg3:'#000000',accent:'#d4af37'},
 {bg1:'#1a1a2e',bg2:'#0f172a',bg3:'#020617',accent:'#7c3aed'},
 {bg1:'#1a120b',bg2:'#0b0907',bg3:'#000000',accent:'#ff8a00'},
 {bg1:'#101820',bg2:'#050b14',bg3:'#000000',accent:'#00c2ff'},
 {bg1:'#18181b',bg2:'#09090b',bg3:'#000000',accent:'#ffffff'},
 {bg1:'#1c0f13',bg2:'#0a0507',bg3:'#000000',accent:'#ff4d6d'}
];
function applyTheme(){
  const t=themes[Math.floor(Math.random()*themes.length)];
  document.documentElement.style.setProperty('--bg1',t.bg1);
  document.documentElement.style.setProperty('--bg2',t.bg2);
  document.documentElement.style.setProperty('--bg3',t.bg3);
  document.documentElement.style.setProperty('--accent',t.accent);
}

// MONEY-OVERLAY + MULTI-SLIDE ENGINE

// Each "transmission" is a full multi-slide sequence.
// Each slide carries a money-psychology overlay (but applied to internal architecture).
const transmissions=[
  {
    id:'internal_leverage',
    kicker:'Internal Leverage',
    moneyOverlayLabel:'Scarcity • Leverage • Identity',
    slides:[
      {
        role:'hook',
        title:'You don’t have a money problem.',
        sub:'You have an internal leverage problem.',
        overlay:'This is scarcity, but not of cash — of clarity, conviction, and self‑direction.',
        quote:'A fragmented identity cannot compound.',
        cta:'Enter through the bio',
        tag:'Internal ROI'
      },
      {
        role:'scarcity',
        title:'Most people are running<br>on borrowed conviction.',
        sub:'They outsource their beliefs, then wonder why their life feels rented.',
        overlay:'This is psychological scarcity: no owned perspective, no owned direction.',
        quote:'If your mind is leased, your future is too.',
        cta:'Reclaim the architecture',
        tag:'Mental sovereignty'
      },
      {
        role:'leverage',
        title:'Leverage is not followers.<br>Leverage is self‑alignment.',
        sub:'When your nervous system trusts you, every decision carries more force.',
        overlay:'This is internal leverage: one aligned move replaces a hundred anxious ones.',
        quote:'A trusted self prints better outcomes than any strategy.',
        cta:'Build nervous system trust',
        tag:'Psychological leverage'
      },
      {
        role:'identity',
        title:'Money follows identity,<br>not effort.',
        sub:'You cannot out‑work a self‑concept that doesn’t believe it deserves more.',
        overlay:'Identity is the real balance sheet. Everything else is a reflection.',
        quote:'Change the self that is earning, not just the way it earns.',
        cta:'Enter through the bio',
        tag:'Identity architecture'
      },
      {
        role:'integration',
        title:'Treat your mind<br>like an asset class.',
        sub:'Clarity, self‑trust, and internal order are the highest‑yield investments you can make.',
        overlay:'This is the money‑overlay: same mechanics, different battlefield.',
        quote:'When your inner world compounds, the outer world has no choice.',
        cta:'Step into the framework',
        tag:'Sovereign engine'
      }
    ]
  },
  {
    id:'escape_velocity',
    kicker:'Escape Velocity',
    moneyOverlayLabel:'Escape • Trajectory • Inevitability',
    slides:[
      {
        role:'hook',
        title:'You don’t need more hacks.<br>You need escape velocity.',
        sub:'Most people are improving a life they secretly want to leave.',
        overlay:'This is the “better cage” trap — optimisation without liberation.',
        quote:'You can’t compound inside a reality you resent.',
        cta:'See the architecture',
        tag:'Trajectory design'
      },
      {
        role:'scarcity',
        title:'Time is your only<br>non‑refundable currency.',
        sub:'But you spend it like it renews every scroll.',
        overlay:'This is temporal scarcity — the real cost basis of your life.',
        quote:'Every distraction is a quiet liquidation of your future.',
        cta:'Audit your attention',
        tag:'Attention economics'
      },
      {
        role:'inevitability',
        title:'Escape is not a moment.<br>It’s a trajectory.',
        sub:'You don’t “get out” one day. You angle out, degree by degree.',
        overlay:'This is inevitability: small, aligned moves that cannot help but compound.',
        quote:'When the path is aligned, consistency stops feeling like discipline.',
        cta:'Lock in the angle',
        tag:'Inevitable outcomes'
      },
      {
        role:'identity',
        title:'You can’t leave a life<br>you still identify with.',
        sub:'If your self‑image is built from the cage, freedom will feel unsafe.',
        overlay:'Identity must escape first. Behaviour follows.',
        quote:'Upgrade the self that chooses, not just the choices.',
        cta:'Enter through the bio',
        tag:'Self‑concept rewiring'
      }
    ]
  }
];

// ENGINE STATE
let currentTransmissionIndex=0;
let currentSlideIndex=0;
let autoTimer=null;
let longPressTimer=null;

// DOM REFS
const titleEl=document.getElementById('title');
const subEl=document.getElementById('sub');
const quoteEl=document.getElementById('quote');
const pillEl=document.getElementById('pill');
const tagEl=document.getElementById('tag');
const kickerEl=document.getElementById('kicker');
const moneyTagEl=document.getElementById('moneyTag');
const overlayMetaEl=document.getElementById('overlayMeta');
const slideIndexEl=document.getElementById('slideIndex');
const feed=document.getElementById('feed');
const stage=document.getElementById('stage');
const navDotsContainer=document.getElementById('navDots');

// NAV DOTS
function renderNavDots(){
  navDotsContainer.innerHTML='';
  const slides=transmissions[currentTransmissionIndex].slides;
  slides.forEach((_,idx)=>{
    const d=document.createElement('div');
    d.className='navDot'+(idx===currentSlideIndex?' active':'');
    navDotsContainer.appendChild(d);
  });
}

// RENDER ENGINE
function renderSlide(){
  const t=transmissions[currentTransmissionIndex];
  const s=t.slides[currentSlideIndex];
  applyTheme();

  kickerEl.textContent=t.kicker;
  moneyTagEl.innerHTML=`<span>${t.moneyOverlayLabel}</span>`;
  titleEl.innerHTML=s.title;
  subEl.textContent=s.sub;
  overlayMetaEl.textContent=s.overlay;
  quoteEl.textContent=s.quote;
  pillEl.innerHTML=`<span class="dot"></span>${s.cta}`;
  tagEl.textContent=s.tag;
  slideIndexEl.textContent=`${currentSlideIndex+1} / ${t.slides.length}`;

  document.querySelectorAll('h1,.sub,.quote,.footer,.overlayMeta,.headerRow')
    .forEach(el=>{
      el.classList.remove('fade');
      void el.offsetWidth;
      el.classList.add('fade');
    });

  renderNavDots();
}

// TRANSITIONS
function flash(){
  const f=document.createElement('div');
  f.style.position='absolute';
  f.style.inset='0';
  f.style.background='rgba(255,255,255,.03)';
  f.style.backdropFilter='blur(8px)';
  f.style.animation='fadeFlash .45s ease forwards';
  document.querySelector('.wrap').appendChild(f);
  setTimeout(()=>f.remove(),450);
}
const style=document.createElement('style');
style.innerHTML='@keyframes fadeFlash{from{opacity:.6}to{opacity:0}}';
document.head.appendChild(style);

function swipeTransition(cb){
  feed.style.transform='translateY(-8%) scale(.98)';
  setTimeout(()=>{
    feed.style.transition='none';
    feed.style.transform='translateY(100%) scale(1.02)';
    cb && cb();
    requestAnimationFrame(()=>{
      feed.style.transition='transform .9s cubic-bezier(.22,1,.36,1)';
      feed.style.transform='translateY(0%) scale(1)';
    });
  },200);
}

// ENGINE CONTROLS
function nextSlide(){
  const t=transmissions[currentTransmissionIndex];
  if(currentSlideIndex < t.slides.length-1){
    currentSlideIndex++;
  }else{
    // move to next transmission
    currentTransmissionIndex=(currentTransmissionIndex+1)%transmissions.length;
    currentSlideIndex=0;
  }
  flash();
  swipeTransition(()=>renderSlide());
}

function prevSlide(){
  if(currentSlideIndex>0){
    currentSlideIndex--;
  }else{
    currentTransmissionIndex=(currentTransmissionIndex-1+transmissions.length)%transmissions.length;
    currentSlideIndex=transmissions[currentTransmissionIndex].slides.length-1;
  }
  flash();
  swipeTransition(()=>renderSlide());
}

// INTERACTIONS
function bindInteractions(){
  let startY=0,startX=0;
  document.body.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    startY=t.clientY;startX=t.clientX;
    longPressTimer=setTimeout(()=>{
      autoTimer=setInterval(nextSlide,3500);
    },500);
  },{passive:true});

  document.body.addEventListener('touchend',e=>{
    clearTimeout(longPressTimer);
    clearInterval(autoTimer);
    const t=e.changedTouches[0]||{};
    const dy=startY-(t.clientY||0);
    const dx=Math.abs((t.clientX||0)-startX);
    if(dy>40){nextSlide();}
    else if(dy<-40){prevSlide();}
    else if(dx<12){nextSlide();}
  },{passive:true});

  document.body.addEventListener('click',nextSlide);
}
bindInteractions();

// PARTICLES
const particles=document.getElementById('particles');
for(let p=0;p<45;p++){
  const el=document.createElement('div');
  el.className='particle';
  el.style.left=Math.random()*100+'%';
  el.style.animationDuration=(6+Math.random()*12)+'s';
  el.style.animationDelay=(-Math.random()*12)+'s';
  el.style.opacity=(.08+Math.random()*.35);
  particles.appendChild(el);
}

// PARALLAX
window.addEventListener('deviceorientation',e=>{
  const x=(e.gamma||0)/8,y=(e.beta||0)/20;
  stage.style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;
});

// INIT
renderSlide();
</script>
</body>
</html>
