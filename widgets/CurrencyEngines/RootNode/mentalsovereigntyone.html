<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mental Sovereignty Transmission Engine</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif;
}

body{
  position:relative;
}

/* Apple-grade drifting background */
.bg{
  position:absolute;
  inset:-30%;
  filter:blur(70px);
  opacity:0.75;
  animation:drift 26s ease-in-out infinite alternate;
}

@keyframes drift{
  from{transform:scale(1) translate(0,0);}
  to{transform:scale(1.25) translate(-50px,-60px);}
}

.bgStyle{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.12), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,.06), transparent 40%),
    linear-gradient(180deg,#050505,#000);
}

/* Subtle glass + noise */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(255,255,255,.03),transparent);
  backdrop-filter:blur(18px);
}

.noise{
  position:absolute;
  inset:0;
  opacity:.035;
  background-image:radial-gradient(circle, white 1px, transparent 1px);
  background-size:4px 4px;
}

/* Slide container */
.slide{
  position:absolute;
  inset:0;
  padding:0 10vw;
  padding-top:12vh;
  padding-bottom:14vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  opacity:0;
  transform:translateY(40px);
  transition:opacity .8s ease, transform .8s ease;
}

.slide.active{
  opacity:1;
  transform:translateY(0);
}

/* Typography */
.main{
  font-size:clamp(40px,8vw,90px);
  line-height:1.05;
  font-weight:680;
  letter-spacing:-1.5px;
  max-width:92%;
  text-wrap:balance;
  margin-bottom:32px;
}

.body{
  font-size:clamp(22px,4.6vw,36px);
  line-height:1.32;
  color:rgba(255,255,255,.78);
  max-width:90%;
  text-wrap:balance;
}

/* Navigation */
.nav{
  position:absolute;
  bottom:5vh;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:8px;
  z-index:10;
}

.dot{
  width:7px;
  height:7px;
  border-radius:999px;
  background:rgba(255,255,255,.25);
  transition:all .25s ease;
}

.dot.active{
  width:22px;
  background:#fff;
}

/* Tap zones */
.tap-left, .tap-right{
  position:absolute;
  top:0;
  bottom:0;
  width:50%;
  z-index:20;
}

.tap-left{ left:0; }
.tap-right{ right:0; }

/* Controls */
.controls{
  position:absolute;
  bottom:3vh;
  left:8vw;
  right:8vw;
  z-index:40;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:space-between;
  align-items:center;
  pointer-events:auto;
}

select,button{
  appearance:none;
  border:none;
  color:#fff;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
  padding:8px 12px;
  border-radius:999px;
  font-size:11px;
}

label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.16em;
  opacity:.6;
}

.top{
  position:absolute;
  top:4vh;
  left:8vw;
  right:8vw;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:30;
  pointer-events:none;
}

.brand{
  font-size:11px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  opacity:.55;
}

.mode-pill{
  font-size:11px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(18px);
  opacity:.75;
  pointer-events:auto;
  border:none;
  color:#fff;
}
</style>
</head>
<body>

<div id="bg" class="bg bgStyle"></div>
<div class="overlay"></div>
<div class="noise"></div>

<div class="top">
  <div class="brand">MENTAL SOVEREIGNTY</div>
  <button id="toggleControls" class="mode-pill">Simple</button>
</div>

<div id="slides"></div>

<div class="tap-left" id="prev"></div>
<div class="tap-right" id="next"></div>

<div class="nav" id="navDots"></div>

<div class="controls" id="controls" style="display:none;">
  <div>
    <label for="theme">Transmission Theme</label><br>
    <select id="theme">
      <option value="selftrust">Self‑Trust</option>
      <option value="identity">Identity Collapse</option>
      <option value="inevitability">Inevitability</option>
      <option value="pattern">Pattern‑Fatigue</option>
    </select>
  </div>
  <button id="generate">Generate</button>
</div>

<script>
/* ---------------------------------------------------------
   TRANSMISSION DATABASE
   --------------------------------------------------------- */

const TRANSMISSIONS = {
  selftrust: [
    "You rebuild your life the moment you stop outsourcing your self‑trust.",
    "Most people don’t fail because they’re incapable. They fail because they keep returning to the version of themselves who expects to break their own word.",
    "Self‑trust isn’t built through discipline. It’s built through identity — through becoming the person who no longer negotiates with their own potential.",
    "When you stop collapsing into the weaker version of you, your entire system recalibrates.",
    "If this hit you, comment 777."
  ],
  identity: [
    "Identity collapse isn’t a crisis. It’s a clearing.",
    "You’re not losing yourself — you’re shedding the version of you that was built for survival, not sovereignty.",
    "The confusion you feel is just your system letting go of an identity that can’t hold the life you’re stepping into.",
    "When the old self dies, the new one doesn’t arrive with fireworks — it arrives with clarity.",
    "If this hit you, comment 777."
  ],
  inevitability: [
    "Inevitability isn’t confidence. It’s identity.",
    "You move differently when you’re no longer trying to ‘earn’ the life you want — you’re simply aligning with the version of you who already holds it.",
    "The moment you stop doubting your trajectory, your behaviour stops leaking momentum.",
    "Life responds to the identity you’re willing to hold.",
    "If this hit you, comment 777."
  ],
  pattern: [
    "Pattern‑fatigue isn’t failure — it’s a signal.",
    "Your system is tired of running loops that no longer match the identity you’re growing into.",
    "You’re not stuck. You’re misaligned with the version of you who can hold the next level.",
    "Break the identity, and the pattern breaks with it.",
    "If this hit you, comment 777."
  ]
};

/* ---------------------------------------------------------
   GENERATOR
   --------------------------------------------------------- */

function generateSlides(theme){
  const lines = TRANSMISSIONS[theme];
  return lines.map((text, i) => ({
    main: i === 0 ? text : "",
    body: i === 0 ? "" : text
  }));
}

/* ---------------------------------------------------------
   RENDER ENGINE
   --------------------------------------------------------- */

const slidesContainer = document.getElementById("slides");
const navDots = document.getElementById("navDots");
let currentSlides = [];
let index = 0;

function renderSlides(){
  slidesContainer.innerHTML = "";
  navDots.innerHTML = "";

  currentSlides.forEach((s, i) => {
    const slide = document.createElement("div");
    slide.className = "slide" + (i === index ? " active" : "");
    slide.innerHTML = `
      <div class="main">${s.main}</div>
      <div class="body">${s.body}</div>
    `;
    slidesContainer.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "dot" + (i === index ? " active" : "");
    navDots.appendChild(dot);
  });
}

function next(){
  index = (index + 1) % currentSlides.length;
  renderSlides();
}

function prev(){
  index = (index - 1 + currentSlides.length) % currentSlides.length;
  renderSlides();
}

document.getElementById("next").onclick = next;
document.getElementById("prev").onclick = prev;

/* ---------------------------------------------------------
   CONTROLS
   --------------------------------------------------------- */

const themeSelect = document.getElementById("theme");
const generateBtn = document.getElementById("generate");
const toggleControlsBtn = document.getElementById("toggleControls");
const controls = document.getElementById("controls");

let advanced = false;

generateBtn.onclick = () => {
  currentSlides = generateSlides(themeSelect.value);
  index = 0;
  renderSlides();
};

toggleControlsBtn.onclick = () => {
  advanced = !advanced;
  controls.style.display = advanced ? "flex" : "none";
  toggleControlsBtn.textContent = advanced ? "Advanced" : "Simple";
};

/* Simple mode: tap anywhere to regenerate */
document.body.addEventListener("click",(e)=>{
  if (e.target.closest(".controls") || e.target === toggleControlsBtn) return;
  if (advanced) return;
  const themes = Object.keys(TRANSMISSIONS);
  const randomTheme = themes[Math.floor(Math.random()*themes.length)];
  themeSelect.value = randomTheme;
  currentSlides = generateSlides(randomTheme);
  index = 0;
  renderSlides();
});

/* Initial load */
currentSlides = generateSlides("selftrust");
renderSlides();
</script>

</body>
</html>
