<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sovereign Content Engine</title>
<style>
:root{--fg:#f5f5f7;--muted:#a1a1aa;--line:rgba(255,255,255,.12);--glass:rgba(255,255,255,.06)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#000;color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif}
body{background:radial-gradient(circle at top,#111 0%,#050505 42%,#000 100%)}
.wrap{position:relative;height:100%;overflow:hidden}
.bg,.bg2,.bg3{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3;animation:float 10s ease-in-out infinite alternate}
.bg{width:300px;height:300px;background:#ffffff22;top:6%;left:-15%}
.bg2{width:260px;height:260px;background:#d4af3722;right:-10%;bottom:8%;animation-duration:14s}
.bg3{width:180px;height:180px;background:#5c7cff22;left:30%;bottom:20%;animation-duration:11s}
@keyframes float{to{transform:translateY(45px) translateX(20px)}}
.stage{position:absolute;inset:18px;border:1px solid var(--line);border-radius:36px;padding:28px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));backdrop-filter:blur(28px);box-shadow:0 25px 100px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.08);transform-style:preserve-3d;transition:transform .2s ease}
.kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
h1{margin:18px 0 0;font-size:46px;line-height:.96;letter-spacing:-2px;max-width:92%}
.sub{margin-top:18px;font-size:19px;line-height:1.45;color:#d7d7dc;max-width:90%}
.quote{font-size:29px;line-height:1.15;letter-spacing:-1px;max-width:92%}
.footer{display:flex;justify-content:space-between;align-items:center;gap:14px}
.pill{padding:10px 16px;border-radius:999px;border:1px solid var(--line);background:var(--glass);font-size:13px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 18px #fff;margin-right:10px;animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.45;transform:scale(.8)}}
.scan{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.03),transparent);animation:scan 5s linear infinite;pointer-events:none}
@keyframes scan{from{transform:translateY(-100%)}to{transform:translateY(100%)}}
.fade{animation:fade .8s ease}@keyframes fade{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:12px;color:#7c7c84;letter-spacing:1px}
</style>
</head>
<body>
<div class='wrap'>
<div class='bg'></div><div class='bg2'></div><div class='bg3'></div>
<div class='stage' id='stage'>
<div><div class='kicker'>Mental Sovereignty</div><h1></h1><div class='sub'></div></div>
<div class='quote'></div>
<div class='footer'><div class='pill'></div><div class='tag' style='font-size:13px;color:var(--muted)'></div></div>
</div>
<div class='scan'></div>
<div class='hint'>tap • next &nbsp;&nbsp; hold • autoplay</div>
</div>
<script>
const bank=[
['Most people<br>are mentally outsourced.','Their goals aren’t theirs. Their attention is rented. Their identity is inherited.','A fragmented mind cannot build an empire.','Reclaim your mind','Become who you are'],
['Attention is<br>your real currency.','Every distraction weakens you. Every borrowed opinion fragments you.','Where attention goes, identity follows.','Take it back','Guard your focus'],
['Clarity is<br>luxury now.','Most people are drowning in noise while calling it ambition.','A clear mind compounds faster than talent.','Find your center','Internal leverage'],
['Become someone<br>your nervous system trusts.','No masks. No shapeshifting. No performance. Just alignment.','Authenticity creates force.','Build self-command','Psychological freedom'],
['Freedom is not external.<br>It is psychological.','The strongest prison is invisible conditioning mistaken for self.','Mental sovereignty is true wealth.','Break conditioning','Return home'],
['Your exhaustion is<br>borrowed ambition.','You are carrying goals that were handed to you, not chosen by you.','Drop what was never yours.','Release weight','Choose deliberately'],
['A distracted mind<br>cannot become powerful.','Fragmented attention creates fragmented identity.','Focus is self-respect.','Own attention','Quiet the noise']
];
let i=Math.floor(Math.random()*bank.length), timer;
function render(){const b=bank[i];document.querySelector('h1').innerHTML=b[0];document.querySelector('.sub').textContent=b[1];document.querySelector('.quote').textContent=b[2];document.querySelector('.pill').innerHTML='<span class="dot"></span>'+b[3];document.querySelector('.tag').textContent=b[4];document.querySelectorAll('h1,.sub,.quote,.footer').forEach(el=>{el.classList.remove('fade');void el.offsetWidth;el.classList.add('fade');});}
function next(){i=(i+1)%bank.length;render();}
render();
window.addEventListener('click',next);
let press;window.addEventListener('touchstart',()=>{press=setTimeout(()=>{timer=setInterval(next,3500)},500)});
window.addEventListener('touchend',()=>{clearTimeout(press);clearInterval(timer)});
window.addEventListener('deviceorientation',e=>{const x=(e.gamma||0)/8,y=(e.beta||0)/20;document.getElementById('stage').style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;});
</script>
</body>
</html>
