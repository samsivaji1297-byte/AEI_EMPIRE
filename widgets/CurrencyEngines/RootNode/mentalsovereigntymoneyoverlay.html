<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FinalMindset — V4.2 Stable Engine</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif;
  color:#fff;
}

/* Soft gradient black background */
body{
  background:linear-gradient(180deg, #000 0%, #0d0d0d 100%);
}

/* Top bar */
.top{
  position:absolute;
  top:4vh;
  left:8vw;
  right:8vw;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:40; /* above tap zones */
}

.brand{
  font-size:12px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  opacity:.75;
}

.mode-pill{
  font-size:11px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:none;
  color:#fff;
  pointer-events:auto;
}

/* Slide container */
#slides{
  position:absolute;
  top:50%;
  left:0;
  right:0;
  transform:translateY(-45%);
  padding:0 10vw;
  z-index:10;
}

/* Individual slide */
.slide{
  display:none;
}

.slide.active{
  display:block;
}

/* Typography */
.main{
  font-size:clamp(40px,8vw,90px);
  font-weight:680;
  line-height:1.05;
  letter-spacing:-1.4px;
  margin-bottom:32px;
  opacity:0;
  animation:fadeIn .6s ease forwards;
}

.body{
  font-size:clamp(22px,4.6vw,36px);
  line-height:1.32;
  color:rgba(255,255,255,.85);
  opacity:0;
  animation:fadeIn .9s ease forwards;
}

/* Safe fade-in animation */
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

/* Tap zones (below top bar) */
.tap-left, .tap-right{
  position:absolute;
  top:0;
  bottom:0;
  width:50%;
  z-index:20;
}

.tap-left{ left:0; }
.tap-right{ right:0; }

/* Navigation dots */
.nav{
  position:absolute;
  bottom:5vh;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:8px;
  z-index:10;
}

.dot{
  width:7px;
  height:7px;
  border-radius:999px;
  background:rgba(255,255,255,.25);
}

.dot.active{
  width:22px;
  background:#fff;
}

/* Top-drawer controls (FME) */
.controls{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:10px 8vw 12px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:10px;
  z-index:50;
  background:linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
  transform:translateY(-100%);
  transition:transform .25s ease;
}

.controls.open{
  transform:translateY(0);
}

.controls-inner{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select,button{
  appearance:none;
  border:none;
  color:#fff;
  background:rgba(255,255,255,.09);
  padding:8px 12px;
  border-radius:999px;
  font-size:11px;
}

label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.16em;
  opacity:.6;
}
</style>
</head>
<body>

<div class="top">
  <div class="brand">FinalMindset</div>
  <button id="toggleControls" class="mode-pill">FM</button>
</div>

<div id="slides"></div>

<div class="tap-left" id="prev"></div>
<div class="tap-right" id="next"></div>

<div class="nav" id="navDots"></div>

<div class="controls" id="controls">
  <div class="controls-inner">
    <div>
      <label for="theme">Theme</label><br>
      <select id="theme">
        <option value="selftrust">Self‑Trust & Execution</option>
        <option value="identity">Identity Collapse & Money</option>
        <option value="inevitability">Inevitability & Results</option>
        <option value="pattern">Pattern‑Fatigue & Stagnation</option>
      </select>
    </div>
    <div>
      <label for="mechanic">Overlay Style</label><br>
      <select id="mechanic">
        <option value="auto">Auto</option>
        <option value="changed">What changed everything</option>
        <option value="nobody">Nobody talks about this</option>
        <option value="stop">If you want X, stop doing Y</option>
        <option value="stuck">This is why you're stuck</option>
      </select>
    </div>
  </div>
  <button id="generate">Generate</button>
</div>

<script>
/* ---------------------------------------------------------
   CONTENT LIBRARY
   --------------------------------------------------------- */

const THEMES = {
  selftrust: {
    x: ["consistent results","momentum that doesn’t collapse","execution that sticks"],
    y: ["second‑guessing every move","breaking your own word","starting over every month"],
    product: "Mental Sovereignty Framework"
  },
  identity: {
    x: ["a life that matches your standards","aligned results","decisions that don’t drain you"],
    y: ["building things you don’t want","chasing goals that aren’t yours","identity collapse"],
    product: "Mental Sovereignty Framework"
  },
  inevitability: {
    x: ["results that feel inevitable","wins that don’t feel accidental","momentum that compounds"],
    y: ["treating wins like flukes","waiting for collapse","operating from doubt"],
    product: "Mental Sovereignty Framework"
  },
  pattern: {
    x: ["clean forward momentum","patterns that break","progress that sticks"],
    y: ["circling the same outcomes","repeating cycles","defaulting to old behaviours"],
    product: "Mental Sovereignty Framework"
  }
};

const MECHANICS = ["changed","nobody","stop","stuck"];

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function pickMechanic(themeKey, mechanicChoice){
  if (mechanicChoice !== "auto") return mechanicChoice;
  if (themeKey === "pattern") return "stuck";
  if (themeKey === "selftrust") return "changed";
  if (themeKey === "identity") return "nobody";
  if (themeKey === "inevitability") return "stop";
  return pick(MECHANICS);
}

function pickSlideCount(mechanic){
  if (mechanic === "changed") return 5;
  if (mechanic === "stop") return 6;
  if (mechanic === "nobody" || mechanic === "stuck") return 7;
  return 6;
}

function generateSlides(themeKey, mechanicChoice){
  const theme = THEMES[themeKey];
  const mechanic = pickMechanic(themeKey, mechanicChoice);
  const slideCount = pickSlideCount(mechanic);
  const slides = [];

  const x = pick(theme.x);
  const y = pick(theme.y);
  const product = theme.product;

  if (mechanic === "changed"){
    slides.push({
      main:`Here’s what actually changed everything for me.`,
      body:`Not a new strategy. Not a new niche. Not a new offer. It was fixing the way my mind was wired around execution and self‑trust.`
    });
  } else if (mechanic === "nobody"){
    slides.push({
      main:`Nobody talks about this part.`,
      body:`Everyone shows the numbers. Almost nobody shows the mental architecture required to hold results without collapsing.`
    });
  } else if (mechanic === "stop"){
    slides.push({
      main:`If you want ${x}, stop doing this.`,
      body:`Stop treating your mind like a background process and then wondering why your results feel random.`
    });
  } else {
    slides.push({
      main:`This is why you're stuck — and it's not what you think.`,
      body:`It’s not your offer. It’s not the algorithm. It’s the version of you that keeps running the show.`
    });
  }

  slides.push({
    main:``,
    body:`The real bottleneck was never tactics. It was the identity I was operating from — the one that expected ${y} as normal.`
  });

  slides.push({
    main:``,
    body:`Once I started treating my mental architecture as the primary system — not an afterthought — everything downstream shifted.`
  });

  if (slideCount >= 4){
    slides.push({
      main:``,
      body:`The more I cleaned up my internal defaults, the less “luck” I needed. Results stopped feeling fragile. Momentum stopped leaking.`
    });
  }

  if (slideCount >= 5){
    slides.push({
      main:``,
      body:`At some point you have to decide: build from the version of you that expects ${y}, or from the version of you for whom ${x} is standard.`
    });
  }

  if (slideCount >= 6){
    slides.push({
      main:``,
      body:`That’s why I built ${product} — to give you the mental operating system I wish I had when I was still trying to out‑work a misaligned identity.`
    });
  }

  if (slideCount >= 7){
    slides.push({
      main:``,
      body:`If you're done pretending it’s “just strategy”, comment 777 and I’ll send you the link to ${product}.`
    });
  } else {
    slides.push({
      main:``,
      body:`If this landed, comment 777 and I’ll send you the link to ${product}.`
    });
  }

  return slides;
}

/* ---------------------------------------------------------
   RENDER ENGINE
   --------------------------------------------------------- */

const slidesContainer = document.getElementById("slides");
const navDots = document.getElementById("navDots");
let currentSlides = [];
let index = 0;

function renderSlides(){
  slidesContainer.innerHTML = "";
  navDots.innerHTML = "";

  currentSlides.forEach((s,i)=>{
    const slide = document.createElement("div");
    slide.className = "slide" + (i===index ? " active" : "");
    slide.innerHTML = `
      <div class="main">${s.main}</div>
      <div class="body">${s.body}</div>
    `;
    slidesContainer.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "dot" + (i===index ? " active" : "");
    navDots.appendChild(dot);
  });
}

function next(){
  index = (index + 1) % currentSlides.length;
  renderSlides();
}

function prev(){
  index = (index - 1 + currentSlides.length) % currentSlides.length;
  renderSlides();
}

document.getElementById("next").onclick = next;
document.getElementById("prev").onclick = prev;

/* ---------------------------------------------------------
   CONTROLS + FM / FME MODE
   --------------------------------------------------------- */

const themeSelect = document.getElementById("theme");
const mechanicSelect = document.getElementById("mechanic");
const generateBtn = document.getElementById("generate");
const toggleControlsBtn = document.getElementById("toggleControls");
const controls = document.getElementById("controls");

let advanced = false;

function regenerate(){
  const themeKey = themeSelect.value;
  const mechanicChoice = mechanicSelect.value;
  currentSlides = generateSlides(themeKey, mechanicChoice);
  index = 0;
  renderSlides();
}

generateBtn.onclick = regenerate;

toggleControlsBtn.onclick = () => {
  advanced = !advanced;
  controls.classList.toggle("open", advanced);
  toggleControlsBtn.textContent = advanced ? "FME" : "FM";
};

/* Simple mode: tap anywhere to regenerate */
document.body.addEventListener("click",(e)=>{
  if (e.target.closest(".controls") || e.target===toggleControlsBtn) return;
  if (advanced) return;
  const keys = Object.keys(THEMES);
  themeSelect.value = pick(keys);
  mechanicSelect.value = "auto";
  regenerate();
});

/* ---------------------------------------------------------
   INITIAL LOAD
   --------------------------------------------------------- */

currentSlides = generateSlides("selftrust","auto");
renderSlides();
</script>

</body>
</html>
