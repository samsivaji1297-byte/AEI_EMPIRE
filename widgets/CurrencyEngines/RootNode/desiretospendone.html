<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Desire-to-Spend Activation Widget</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif;
}

body{
  position:relative;
}

/* Apple-grade drifting background */
.bg{
  position:absolute;
  inset:-30%;
  filter:blur(70px);
  opacity:0.75;
  animation:drift 26s ease-in-out infinite alternate;
}

@keyframes drift{
  from{transform:scale(1) translate(0,0);}
  to{transform:scale(1.25) translate(-50px,-60px);}
}

.bgStyle{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.12), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,.06), transparent 40%),
    linear-gradient(180deg,#050505,#000);
}

/* Subtle glass + noise */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(255,255,255,.03),transparent);
  backdrop-filter:blur(18px);
}

.noise{
  position:absolute;
  inset:0;
  opacity:.035;
  background-image:radial-gradient(circle, white 1px, transparent 1px);
  background-size:4px 4px;
}

/* Slide container */
.slide{
  position:absolute;
  inset:0;
  padding:0 10vw;
  padding-top:12vh; /* iPhone safe zone */
  padding-bottom:12vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  opacity:0;
  transform:translateY(40px);
  transition:opacity .8s ease, transform .8s ease;
}

.slide.active{
  opacity:1;
  transform:translateY(0);
}

/* Typography */
.main{
  font-size:clamp(40px,8vw,90px);
  line-height:1.05;
  font-weight:680;
  letter-spacing:-1.5px;
  max-width:92%;
  text-wrap:balance;
  margin-bottom:32px;
}

.body{
  font-size:clamp(22px,4.6vw,36px);
  line-height:1.32;
  color:rgba(255,255,255,.78);
  max-width:90%;
  text-wrap:balance;
}

/* CTA slide */
.cta{
  font-size:clamp(26px,6vw,42px);
  line-height:1.25;
  font-weight:600;
  color:#fff;
  max-width:90%;
}

/* Navigation */
.nav{
  position:absolute;
  bottom:5vh;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:8px;
  z-index:10;
}

.dot{
  width:7px;
  height:7px;
  border-radius:999px;
  background:rgba(255,255,255,.25);
  transition:all .25s ease;
}

.dot.active{
  width:22px;
  background:#fff;
}

/* Tap zones */
.tap-left, .tap-right{
  position:absolute;
  top:0;
  bottom:0;
  width:50%;
  z-index:20;
}

.tap-left{ left:0; }
.tap-right{ right:0; }
</style>
</head>
<body>

<div id="bg" class="bg bgStyle"></div>
<div class="overlay"></div>
<div class="noise"></div>

<!-- Slides injected here -->
<div id="slides"></div>

<!-- Tap navigation -->
<div class="tap-left" id="prev"></div>
<div class="tap-right" id="next"></div>

<!-- Bottom nav dots -->
<div class="nav" id="navDots"></div>

<script>
/* ---------------------------------------------------------
   DESIRE-TO-SPEND ACTIVATION WIDGET
   Behavioural recognition + ego-coded money-energy
   --------------------------------------------------------- */

/* HOOK POOL (behavioural recognition) */
const hookPool = [
  "How I stopped restarting my whole life every Sunday night.",
  "How I stopped planning the “perfect week” I never actually lived.",
  "How I stopped pretending tomorrow would be the day everything changed.",
  "How I stopped doing full resets instead of real progress.",
  "How I stopped trying to become a new person overnight.",
  "How I stopped doing those dramatic life overhauls that never lasted.",
  "How I stopped waiting for the “right moment” to finally start.",
  "How I stopped convincing myself I needed a fresh start every week.",
  "How I stopped doing the “new me” routine that never stuck.",
  "How I stopped trying to fix everything at once."
];

/* BODY POOL (behavioural recognition) */
const bodyPool = [
  "You know that pattern where you promise yourself you’ll “start fresh” tomorrow… and then tomorrow feels exactly the same.",
  "You ever notice how you plan the perfect week in your head, but never actually live it.",
  "You know that thing where you wait for the right moment to change… even though it never comes.",
  "You ever catch yourself doing a full life reset at 11pm for no reason.",
  "You know that feeling where you’re convinced one big shift will fix everything.",
  "You ever realise you’ve been trying to overhaul your entire life instead of just taking one step.",
  "You know that loop where you restart every Monday like the last week didn’t happen.",
  "You ever notice how you keep trying to become a new person overnight.",
  "You know that moment where you swear “this time it’s different”… even though nothing actually changed.",
  "You ever catch yourself planning a whole new routine instead of doing the smallest thing right now.",
  "You know that habit where you convince yourself you need a full reset before you can begin.",
  "You ever notice how you wait for the perfect conditions to finally start.",
  "You know that pattern where you think one dramatic change will solve everything.",
  "You ever realise you’ve been preparing to start more than you’ve actually started.",
  "You know that feeling where you’re always “about to” become the person you want to be."
];

/* CTA POOL (MSF + link in bio, sovereign tone) */
const ctaPool = [
  "If this hit you, comment MSF — then go to the link in my bio.",
  "Comment MSF if you feel this — and check the link in my bio for the next step.",
  "If this exposed you a little, drop MSF and head to the link in my bio.",
  "Comment MSF to lock this in — then go to the link in my bio to align properly.",
  "If this feels like your truth, comment MSF and go to the link in my bio.",
  "Drop MSF if you’re done playing small — the link in my bio is where you go next.",
  "Comment MSF to claim this identity — then hit the link in my bio.",
  "If this is you, comment MSF. The link in my bio will make the rest obvious.",
  "Comment MSF to step into this — then go to the link in my bio.",
  "If this landed, drop MSF and check the link in my bio."
];

/* ---------------------------------------------------------
   RANDOM CAROUSEL GENERATOR
   --------------------------------------------------------- */

function pickRandom(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickRandomDistinct(arr, count){
  const copy = [...arr];
  const result = [];
  for(let i = 0; i < count && copy.length > 0; i++){
    const idx = Math.floor(Math.random() * copy.length);
    result.push(copy[idx]);
    copy.splice(idx,1);
  }
  return result;
}

/* Build one random carousel:
   - 1 hook slide
   - 2–3 body slides
   - 1 CTA slide
*/
function buildCarouselData(){
  const hook = pickRandom(hookPool);
  const bodyCount = Math.floor(Math.random() * 2) + 2; // 2 or 3
  const bodies = pickRandomDistinct(bodyPool, bodyCount);
  const cta = pickRandom(ctaPool);

  const slides = [];

  // Hook slide
  slides.push({
    type: "hook",
    main: hook,
    body: ""
  });

  // Body slides
  bodies.forEach(text => {
    slides.push({
      type: "body",
      main: "",
      body: text
    });
  });

  // CTA slide
  slides.push({
    type: "cta",
    main: "",
    body: cta
  });

  return slides;
}

/* ---------------------------------------------------------
   RENDER ENGINE
   --------------------------------------------------------- */

const slidesContainer = document.getElementById("slides");
const navDots = document.getElementById("navDots");

let index = 0;
let currentSlides = buildCarouselData();

function renderSlides(){
  slidesContainer.innerHTML = "";
  navDots.innerHTML = "";

  currentSlides.forEach((s, i) => {
    const slide = document.createElement("div");
    slide.className = "slide" + (i === index ? " active" : "");

    let inner = "";

    if(s.type === "hook"){
      inner = `
        <div class="main">${s.main}</div>
      `;
    } else if(s.type === "body"){
      inner = `
        <div class="body">${s.body}</div>
      `;
    } else if(s.type === "cta"){
      inner = `
        <div class="cta">${s.body}</div>
      `;
    }

    slide.innerHTML = inner;
    slidesContainer.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "dot" + (i === index ? " active" : "");
    navDots.appendChild(dot);
  });
}

function next(){
  index = (index + 1) % currentSlides.length;
  renderSlides();
}

function prev(){
  index = (index - 1 + currentSlides.length) % currentSlides.length;
  renderSlides();
}

document.getElementById("next").onclick = next;
document.getElementById("prev").onclick = prev;

/* Initial render */
renderSlides();
</script>

</body>
</html>
