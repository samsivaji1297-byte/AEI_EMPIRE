<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sovereign Content Engine</title>
<style>
:root{--fg:#f5f5f7;--muted:#a1a1aa;--line:rgba(255,255,255,.12);--glass:rgba(255,255,255,.06);--bg1:#111;--bg2:#050505;--bg3:#000;--accent:#d4af37}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#000;color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif}
body{background:radial-gradient(circle at top,var(--bg1) 0%,var(--bg2) 42%,var(--bg3) 100%);transition:background 1.2s ease, color 1.2s ease}
.wrap{position:relative;height:100%;overflow:hidden}
.bg,.bg2,.bg3,.beam,.gridGlow{position:absolute;border-radius:50%;pointer-events:none}
.bg,.bg2,.bg3{filter:blur(90px);opacity:.32;animation:float 10s ease-in-out infinite alternate}
.bg{width:300px;height:300px;background:#ffffff22;top:6%;left:-15%}
.bg2{width:260px;height:260px;background:color-mix(in srgb, var(--accent) 22%, transparent);right:-10%;bottom:8%;animation-duration:14s}
.bg3{width:180px;height:180px;background:#5c7cff22;left:30%;bottom:20%;animation-duration:11s}
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.8);opacity:.25;animation:drift linear infinite}
@keyframes drift{from{transform:translateY(110vh) scale(.6)}to{transform:translateY(-10vh) scale(1.2)}}
.noise{
position:absolute;inset:0;opacity:.035;mix-blend-mode:overlay;pointer-events:none;
background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.9"/></svg>');
animation:noiseShift .2s steps(2) infinite;
}
@keyframes noiseShift{from{transform:translateX(0)}to{transform:translateX(-2px)}}
.beam{
width:140%;height:120px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
filter:blur(18px);
transform:rotate(-12deg);
animation:beamMove 7s linear infinite;
opacity:.7;
}
.gridGlow{
inset:-20%;
background:
linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
background-size:40px 40px;
mask-image:radial-gradient(circle at center, black 35%, transparent 80%);
animation:gridShift 16s linear infinite;
opacity:.25;
}
@keyframes float{to{transform:translateY(45px) translateX(20px)}}
@keyframes beamMove{from{transform:translateX(-40%) rotate(-12deg)}to{transform:translateX(40%) rotate(-12deg)}}
@keyframes gridShift{from{transform:translateY(0)}to{transform:translateY(40px)}}
.stage{position:absolute;inset:18px;border:1px solid var(--line);border-radius:36px;padding:28px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));backdrop-filter:blur(28px);box-shadow:0 25px 100px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.08);transform-style:preserve-3d;transition:transform .2s ease}
.kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
h1{margin:18px 0 0;font-size:46px;line-height:.96;letter-spacing:-2px;max-width:92%}
.sub{margin-top:18px;font-size:19px;line-height:1.45;color:#d7d7dc;max-width:90%}
.quote{font-size:29px;line-height:1.15;letter-spacing:-1px;max-width:92%}
.footer{display:flex;justify-content:space-between;align-items:center;gap:14px}
.pill{padding:10px 16px;border-radius:999px;border:1px solid var(--line);background:var(--glass);font-size:13px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 18px #fff;margin-right:10px;animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.45;transform:scale(.8)}}
.scan{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.03),transparent);animation:scan 5s linear infinite;pointer-events:none;mix-blend-mode:screen}
.pulseRing{
position:absolute;
width:240px;height:240px;border-radius:50%;
border:1px solid rgba(255,255,255,.08);
left:50%;top:50%;transform:translate(-50%,-50%);
animation:ring 4s ease-out infinite;
pointer-events:none;
}
@keyframes ring{
0%{transform:translate(-50%,-50%) scale(.7);opacity:.0}
30%{opacity:.4}
100%{transform:translate(-50%,-50%) scale(1.8);opacity:0}
}
@keyframes scan{from{transform:translateY(-100%)}to{transform:translateY(100%)}}
.fade{animation:fade .8s ease}@keyframes fade{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:12px;color:#7c7c84;letter-spacing:1px}
</style>
</head>
<body>
<div class='wrap'>
<div class='gridGlow'></div>
<div class='noise'></div>
<div class='particles' id='particles'></div>
<div class='beam'></div>
<div class='bg'></div><div class='bg2'></div><div class='bg3'></div>
<div class='stage' id='stage'>
<div><div class='kicker'>Mental Sovereignty</div><h1></h1><div class='sub'></div></div>
<div class='quote'></div>
<div class='footer'><div class='pill'></div><div class='tag' style='font-size:13px;color:var(--muted)'></div></div>
</div>
<div class='scan'></div>
<div class='pulseRing'></div>

</div>
<script>
const themes=[
{bg1:'#111111',bg2:'#050505',bg3:'#000000',accent:'#d4af37'},
{bg1:'#1a1a2e',bg2:'#0f172a',bg3:'#020617',accent:'#7c3aed'},
{bg1:'#1a120b',bg2:'#0b0907',bg3:'#000000',accent:'#ff8a00'},
{bg1:'#101820',bg2:'#050b14',bg3:'#000000',accent:'#00c2ff'},
{bg1:'#18181b',bg2:'#09090b',bg3:'#000000',accent:'#ffffff'},
{bg1:'#1c0f13',bg2:'#0a0507',bg3:'#000000',accent:'#ff4d6d'}
];

const bank=[
['Most people<br>are mentally outsourced.','Their goals aren’t theirs. Their attention is rented. Their identity is inherited.','A fragmented mind cannot build an empire.','Reclaim your mind','Become who you are'],
['Attention is<br>your real currency.','Every distraction weakens you. Every borrowed opinion fragments you.','Where attention goes, identity follows.','Take it back','Guard your focus'],
['Clarity is<br>luxury now.','Most people are drowning in noise while calling it ambition.','A clear mind compounds faster than talent.','Find your center','Internal leverage'],
['Become someone<br>your nervous system trusts.','No masks. No shapeshifting. No performance. Just alignment.','Authenticity creates force.','Build self-command','Psychological freedom'],
['Freedom is not external.<br>It is psychological.','The strongest prison is invisible conditioning mistaken for self.','Mental sovereignty is true wealth.','Break conditioning','Return home'],
['Your exhaustion is<br>borrowed ambition.','You are carrying goals that were handed to you, not chosen by you.','Drop what was never yours.','Release weight','Choose deliberately'],
['A distracted mind<br>cannot become powerful.','Fragmented attention creates fragmented identity.','Focus is self-respect.','Own attention','Quiet the noise']
];
let i=Math.floor(Math.random()*bank.length), timer;
function applyTheme(){
 const t=themes[Math.floor(Math.random()*themes.length)];
 document.documentElement.style.setProperty('--bg1',t.bg1);
 document.documentElement.style.setProperty('--bg2',t.bg2);
 document.documentElement.style.setProperty('--bg3',t.bg3);
 document.documentElement.style.setProperty('--accent',t.accent);
}

function render(){
 const b=bank[i];
 applyTheme();
 document.querySelector('h1').innerHTML=b[0];
 document.querySelector('.sub').textContent=b[1];
 document.querySelector('.quote').textContent=b[2];
 document.querySelector('.pill').innerHTML='<span class="dot"></span>'+b[3];
 document.querySelector('.tag').textContent=b[4];
 document.querySelectorAll('h1,.sub,.quote,.footer').forEach(el=>{
  el.classList.remove('fade');
  void el.offsetWidth;
  el.classList.add('fade');
 });
}
function flash(){
  const f=document.createElement('div');
  f.style.position='absolute';
  f.style.inset='0';
  f.style.background='rgba(255,255,255,.03)';
  f.style.backdropFilter='blur(8px)';
  f.style.animation='fadeFlash .45s ease forwards';
  document.querySelector('.wrap').appendChild(f);
  setTimeout(()=>f.remove(),450);
}
const style=document.createElement('style');
style.innerHTML='@keyframes fadeFlash{from{opacity:.6}to{opacity:0}}';
document.head.appendChild(style);

function next(){i=(i+1)%bank.length;flash();render();}
render();
function bindInteractions(){
  let touchStartX=0;
  document.body.addEventListener('touchstart',(e)=>{
    touchStartX=e.touches[0].clientX;
    press=setTimeout(()=>{ timer=setInterval(next,3500); },500);
  }, {passive:true});

  document.body.addEventListener('touchend',(e)=>{
    clearTimeout(press);
    clearInterval(timer);
    const dx=Math.abs((e.changedTouches[0]?.clientX||0)-touchStartX);
    if(dx < 12) next();
  }, {passive:true});

  document.body.addEventListener('click', next);
}
bindInteractions();

const particles=document.getElementById('particles');
for(let p=0;p<45;p++){
 const el=document.createElement('div');
 el.className='particle';
 el.style.left=Math.random()*100+'%';
 el.style.animationDuration=(6+Math.random()*12)+'s';
 el.style.animationDelay=(-Math.random()*12)+'s';
 el.style.opacity=(.08+Math.random()*.35);
 particles.appendChild(el);
}

window.addEventListener('deviceorientation',e=>{
 const x=(e.gamma||0)/8,y=(e.beta||0)/20;
 document.getElementById('stage').style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;
});
</script>
</body>
</html>
