<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Mental Sovereignty Engine</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif;
}

body{
    position:relative;
}

/* background layers */
.bg{
    position:absolute;
    inset:-20%;
    background:
    radial-gradient(circle at 20% 20%, rgba(80,120,255,.28), transparent 35%),
    radial-gradient(circle at 75% 25%, rgba(255,255,255,.08), transparent 20%),
    radial-gradient(circle at 60% 70%, rgba(0,180,255,.18), transparent 30%),
    radial-gradient(circle at 25% 75%, rgba(255,180,80,.10), transparent 30%),
    linear-gradient(180deg,#030303,#000);
    filter:blur(40px);
    animation:float 16s ease-in-out infinite alternate;
}

@keyframes float{
    from{ transform:scale(1) translateY(0) translateX(0);}
    to{ transform:scale(1.18) translateY(-40px) translateX(-20px);}
}

.noise{
    position:absolute;
    inset:0;
    opacity:.06;
    background-image:
    radial-gradient(circle, white 1px, transparent 1px);
    background-size:4px 4px;
    mix-blend-mode:soft-light;
}

.sweep{
    position:absolute;
    inset:-50%;
    background:linear-gradient(
        90deg,
        transparent 40%,
        rgba(255,255,255,.05) 50%,
        transparent 60%
    );
    transform:rotate(12deg);
    animation:sweep 8s linear infinite;
}

@keyframes sweep{
    from{ transform:translateX(-40%) rotate(12deg);}
    to{ transform:translateX(40%) rotate(12deg);}
}

.vignette{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at center, transparent 35%, rgba(0,0,0,.35) 100%);
}

.top{
    position:absolute;
    top:6vh;
    left:7vw;
    right:7vw;
    z-index:5;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    letter-spacing:2px;
    opacity:.65;
}

.mode{
    padding:8px 14px;
    border:1px solid rgba(255,255,255,.14);
    border-radius:999px;
    backdrop-filter:blur(20px);
}

.center{
    position:absolute;
    inset:0;
    z-index:3;
    padding:0 8vw;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.kicker{
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    opacity:.5;
    margin-bottom:24px;
}

.main{
    font-size:clamp(40px,8vw,82px);
    line-height:1.02;
    letter-spacing:-2px;
    font-weight:680;
    max-width:90%;
    text-wrap:balance;
    opacity:0;
    transform:translateY(30px);
    animation:in .9s cubic-bezier(.2,.8,.2,1) forwards;
}

.sub{
    margin-top:26px;
    font-size:clamp(20px,4vw,34px);
    line-height:1.3;
    color:rgba(255,255,255,.72);
    max-width:88%;
    text-wrap:balance;
    opacity:0;
    transform:translateY(25px);
    animation:in .9s .18s cubic-bezier(.2,.8,.2,1) forwards;
}

.bottom{
    position:absolute;
    left:7vw;
    right:7vw;
    bottom:7vh;
    z-index:5;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    opacity:.45;
}

.progress{
    position:absolute;
    left:0;
    top:0;
    height:3px;
    width:0%;
    background:linear-gradient(90deg,#fff,rgba(255,255,255,.3));
    z-index:10;
    animation:progress 12s linear forwards;
}

@keyframes progress{
    from{width:0%;}
    to{width:100%;}
}

@keyframes in{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.out{
    animation:out .35s forwards;
}

@keyframes out{
    to{
        opacity:0;
        transform:translateY(-15px);
    }
}
</style>
</head>
<body>

<div class="progress" id="progress"></div>
<div class="bg"></div>
<div class="noise"></div>
<div class="sweep"></div>
<div class="vignette"></div>

<div class="top">
    <div>MENTAL SOVEREIGNTY</div>
    <div class="mode" id="modeLabel">CINEMATIC</div>
</div>

<div class="center">
    <div class="kicker" id="kicker">Recognition</div>
    <div class="main" id="main"></div>
    <div class="sub" id="sub"></div>
</div>

<div class="bottom">
    <div>Return to yourself → link in bio</div>
    <div>tap</div>
</div>

<script>
const VIRAL = [
["3 signs you've lost yourself","Everything drains you. You overthink. Nothing feels truly yours."],
["You're not lazy","You've been living misaligned for too long."],
["Most burnout is identity friction","You're forcing a life that doesn't fit."],
["You feel tired because...","Pretending is exhausting."],
["Stop ignoring this feeling","Your mind knows when life isn't yours."]
];

const SIGNATURE = [
["You were never lost.","Only buried."],
["Become who you were","before the world told you who to be."],
["Silence reveals","what noise hides."],
["What is truly yours","will energise you."],
["Return.","To yourself."]
];

const CINEMATIC = [
["3 signs you're disconnected","Everything feels heavy."],
["You're mentally exhausted","Even after rest."],
["That's not weakness","That's misalignment."],
["You already know","What aligns—and what doesn't."],
["Return to yourself","Mental Sovereignty →"]
];

const pools = { VIRAL, SIGNATURE, CINEMATIC };
const modes = ["VIRAL","SIGNATURE","CINEMATIC"];
let modeIndex = 2;

const main = document.getElementById("main");
const sub = document.getElementById("sub");
const modeLabel = document.getElementById("modeLabel");
const progress = document.getElementById("progress");

function restartProgress(){
    progress.style.animation = "none";
    progress.offsetHeight;
    progress.style.animation = "progress 12s linear forwards";
}

function render(){
    const pool = pools[modes[modeIndex]];
    const [a,b] = pool[Math.floor(Math.random()*pool.length)];

    main.classList.add("out");
    sub.classList.add("out");

    setTimeout(()=>{
        main.className="main";
        sub.className="sub";
        main.textContent = a;
        sub.textContent = b;
        modeLabel.textContent = modes[modeIndex];
        restartProgress();
    },300);
}

function nextMode(){
    modeIndex = (modeIndex+1)%modes.length;
    render();
}

document.body.addEventListener("click", render);
document.body.addEventListener("dblclick", nextMode);

render();
setInterval(render,12000);
</script>

</body>
</html>
