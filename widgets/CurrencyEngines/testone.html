<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM · Money‑Adjacent Transmission Engine</title>
<style>
    body {
        margin: 0;
        padding: 20px;
        background: #050505;
        color: #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }
    .shell {
        max-width: 980px;
        margin: 0 auto;
        background: #0a0a0a;
        border: 1px solid #1a1a1a;
        border-radius: 12px;
        padding: 20px;
    }
    .header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
    }
    .title {
        font-size: 18px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }
    .subtitle {
        font-size: 11px;
        color: #777;
        letter-spacing: 0.16em;
        text-transform: uppercase;
    }
    .tiles {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
    }
    .tile {
        padding: 12px;
        background: #0f0f0f;
        border: 1px solid #222;
        border-radius: 8px;
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        color: #777;
    }
    .tile.active {
        border-color: #f5f5f5;
        color: #f5f5f5;
        background: #151515;
    }
    .slide-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }
    @media (max-width: 780px) {
        .slide-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }
    .slide-card {
        background: #0f0f0f;
        border: 1px solid #222;
        border-radius: 8px;
        padding: 10px;
    }
    .slide-label {
        font-size: 10px;
        color: #777;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 6px;
    }
    textarea {
        width: 100%;
        min-height: 60px;
        background: #0a0a0a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #e5e5e5;
        padding: 8px;
        font-size: 13px;
        resize: vertical;
    }
    .controls {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
    }
    .btn {
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid #333;
        background: #111;
        color: #e5e5e5;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        cursor: pointer;
    }
    .btn-primary {
        background: #f5f5f5;
        color: #050505;
        border-color: #f5f5f5;
    }
    .output {
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 8px;
        padding: 16px;
        white-space: pre-wrap;
        font-size: 13px;
        line-height: 1.5;
    }
</style>
</head>
<body>

<div class="shell">

    <div class="header">
        <div>
            <div class="title">Money‑Adjacent Transmission Engine</div>
            <div class="subtitle">FM Media Enterprises · Internal</div>
        </div>
        <div class="subtitle">Sovereign Node</div>
    </div>

    <div class="tiles" id="modeTiles"></div>

    <div class="slide-grid" id="slides"></div>

    <div class="controls">
        <button class="btn" id="defaultsBtn">Auto‑Fill Defaults</button>
        <button class="btn btn-primary" id="generateBtn">Generate</button>
    </div>

    <div class="output" id="output">Select an archetype to begin.</div>

</div>

<script>
const modes = {
    "Hidden Cost": [
        "You’re leaking energy in ways you don’t notice.",
        "Micro‑hesitation every time you feel a pull to move.",
        "Saying yes to low‑leverage noise.",
        "Letting your environment decide your focus.",
        "You’re not behind — you’re leaking power in places you stopped noticing."
    ],
    "Identity Flex": [
        "People who rise fast don’t have more time — they have a different identity.",
        "They remove noise faster than they remove apps.",
        "They decide once, then let the decision govern their day.",
        "They don’t negotiate with their non‑negotiables.",
        "Sovereign people build identity that makes action automatic."
    ],
    "System Reveal": [
        "Your life is a system — the issue isn’t effort, it’s architecture.",
        "Your identity is outdated.",
        "You wait for clarity, but clarity follows movement.",
        "Your environment is optimised for comfort, not momentum.",
        "Upgrade the root → the system obeys."
    ],
    "Behaviour Reframe": [
        "If you feel stuck, it’s not fate — it’s behaviour.",
        "You consume instead of commit.",
        "You react instead of design.",
        "You let mood decide momentum.",
        "When you stop outsourcing direction, clarity stops feeling fragile."
    ],
    "Momentum Trigger": [
        "Momentum isn’t magic — it’s mechanics.",
        "Shorten the distance between decision and action.",
        "Remove friction instead of adding hacks.",
        "Repeat the same loop until it becomes identity.",
        "Momentum = clarity × repetition."
    ],
    "Silent Flex": [
        "I don’t chase motivation — my systems don’t care how I feel.",
        "I don’t wait for the right time — I create inevitability.",
        "I don’t need pressure — my standards are loud enough.",
        "Sovereignty is the flex no one can screenshot.",
        "The loudest flex is a life that runs on your terms."
    ],
    "Pattern Interrupt": [
        "You’re not stuck — you’re looping.",
        "You feel behind → you avoid starting.",
        "You wait to feel ready → readiness follows action.",
        "You numb discomfort instead of decoding it.",
        "Break the loop → the chapter unlocks."
    ],
    "Reality Upgrade": [
        "Your reality mirrors your identity.",
        "You’re not behind — you’re incubating.",
        "You don’t lack discipline — you lack alignment.",
        "Your environment is louder than your goals.",
        "When identity updates, reality stops arguing."
    ],
    "Sovereign Checklist": [
        "If these describe you, you’re levelling up.",
        "You’re intolerant of your old self.",
        "You feel restless in old rooms.",
        "You crave structure over escape.",
        "This isn’t a crisis — it’s an upgrade loading."
    ],
    "Root Node": [
        "Your life has a root node — and it’s not your to‑do list.",
        "Identity: the story you run.",
        "Environment: the defaults that shape you.",
        "Structure: the loops you repeat.",
        "Upgrade the root → everything aligns."
    ]
};

let currentMode = null;

const tiles = document.getElementById("modeTiles");
const slides = document.getElementById("slides");
const output = document.getElementById("output");

Object.keys(modes).forEach(name => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = name;
    tile.onclick = () => selectMode(name, tile);
    tiles.appendChild(tile);
});

function selectMode(name, tile) {
    currentMode = name;
    [...tiles.children].forEach(t => t.classList.remove("active"));
    tile.classList.add("active");

    slides.innerHTML = "";
    for (let i = 0; i < 5; i++) {
        const card = document.createElement("div");
        card.className = "slide-card";
        card.innerHTML = `
            <div class="slide-label">Slide ${i + 1}</div>
            <textarea data-slide="${i}"></textarea>
        `;
        slides.appendChild(card);
    }

    output.textContent = `Mode selected: ${name}`;
}

document.getElementById("defaultsBtn").onclick = () => {
    if (!currentMode) return;
    const defaults = modes[currentMode];
    [...slides.querySelectorAll("textarea")].forEach((t, i) => t.value = defaults[i]);
};

document.getElementById("generateBtn").onclick = () => {
    if (!currentMode) return;

    const values = [...slides.querySelectorAll("textarea")].map(t => t.value.trim());
    const reel = values.join(" ");
    const caption = values[4] + " · You’re not behind — you’re under‑activated.";

    output.textContent =
        `SLIDES\n` +
        values.map((v, i) => `Slide ${i + 1}: ${v}`).join("\n") +
        `\n\nREEL SCRIPT\n${reel}\n\nCAPTION\n${caption}`;
};
</script>

</body>
</html>
