<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CTA Engine Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #000000;
      --fg: #f5f5f5;
      --accent: #ffffff;
      --muted: #888888;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "SF Pro Display", "Segoe UI", sans-serif;
      --transition-speed: 0.6s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Ambient animated glow */
    .ambient {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08), transparent 60%);
      animation: pulse 6s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes pulse {
      0% {
        opacity: 0.25;
        transform: scale(1);
      }
      100% {
        opacity: 0.45;
        transform: scale(1.15);
      }
    }

    .frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: 6vh 6vw;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .inner {
      max-width: 720px;
      width: 100%;
      text-align: center;
    }

    .cta-shell {
      min-height: 18vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cta-text {
      font-weight: 500;
      font-size: min(6vw, 30px);
      line-height: 1.25;
      color: var(--accent);
      letter-spacing: 0.01em;
    }

    .cta-sub {
      margin-top: 1.4vh;
      font-size: min(3.4vw, 14px);
      color: var(--muted);
    }

    /* Centered bio pill */
    .bio-center {
      margin-top: 4vh;
      display: flex;
      justify-content: center;
    }

    .bio-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.35em 0.9em;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.03);
      font-size: min(3.2vw, 13px);
      color: var(--fg);
    }

    .bio-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #ffffff;
    }

    @media (max-width: 480px) {
      .cta-text {
        font-size: min(7vw, 26px);
      }
      .cta-sub {
        font-size: min(3.8vw, 13px);
      }
    }
  </style>
</head>
<body>

  <div class="ambient"></div>

  <div class="frame">
    <div class="inner">

      <div class="cta-shell">
        <div>
          <div class="cta-text">Full shortcut is in my bio.</div>
          <div class="cta-sub">I put the fast version there so you don’t have to think.</div>
        </div>
      </div>

      <div class="bio-center">
        <span class="bio-pill">
          <span class="bio-dot"></span>
          <span>Bio is the only link that matters.</span>
        </span>
      </div>

    </div>
  </div>

</body>
</html>
