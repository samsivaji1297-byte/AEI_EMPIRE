<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sales Engine – Root Node System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <style>
    :root {
      --bg: #050507;
      --bg-soft: #0b0b10;
      --fg: #f5f5f7;
      --muted: #8b8b93;
      --accent: #ffffff;
      --accent-soft: #1f1f2a;
      --border-subtle: #1a1a22;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100vh;
      background: radial-gradient(circle at top, #151520 0, #050507 55%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .safe {
      position: relative;
      width: min(100%, 540px);
      height: min(100%, 960px);
      margin: 0 auto;
      border-radius: 32px;
      background: linear-gradient(145deg, var(--bg-soft), #050509);
      border: 1px solid var(--border-subtle);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 40px 120px rgba(0,0,0,0.85);
      padding: 24px 22px 28px 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .safe::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 55%);
      mix-blend-mode: screen;
      opacity: 0.7;
      pointer-events: none;
    }

    .chrome {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chrome-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffffff, #8888ff);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .chrome-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,18,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .body {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      padding: 8px 2px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .title {
      font-size: 26px;
      line-height: 1.18;
      letter-spacing: -0.02em;
      font-weight: 600;
    }

    .title span.accent {
      color: var(--accent);
      text-shadow: 0 0 18px rgba(255,255,255,0.35);
    }

    .subtitle {
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
      max-width: 90%;
    }

    .grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .item {
      border-radius: 14px;
      padding: 10px 11px;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 55%);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 12px;
      line-height: 1.45;
      color: #e5e5ea;
    }

    .item-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .item-main {
      font-size: 12px;
    }

    .footer {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .progress {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .bar {
      width: 14px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffffff, #8f8fff);
      transition: width 220ms ease-out;
    }

    .bar.active .bar-fill {
      width: 100%;
    }

    .hint {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .hint span {
      color: var(--fg);
    }

    @media (min-width: 700px) {
      .title {
        font-size: 30px;
      }
      .subtitle {
        font-size: 14px;
      }
      .item {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="frame" id="frame">
    <div class="safe">
      <div class="chrome">
        <div class="chrome-left">
          <div class="dot"></div>
          <div>ROOT NODE SALES ENGINE</div>
        </div>
        <div class="chrome-right">
          <div class="pill" id="pill-label">SEQUENCE</div>
        </div>
      </div>

      <div class="body">
        <div class="eyebrow" id="eyebrow"></div>
        <div class="title" id="title"></div>
        <div class="subtitle" id="subtitle"></div>
        <div class="grid" id="grid"></div>
      </div>

      <div class="footer">
        <div class="progress" id="progress"></div>
        <div class="hint"><span>TAP</span> OR PRESS →</div>
      </div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // SALES SEQUENCES – EDIT THIS ONLY
    // ─────────────────────────────────────────────
    const SLIDES = [
      // ───────────── INTRO / POSITIONING ─────────────
      {
        eyebrow: "FOR CREATORS SELLING SYSTEMS",
        pill: "POSITIONING",
        title: "If your content isn’t turning into sales, this is why.",
        subtitle: "You’re posting ideas. Your buyer is looking for a diagnosis, a mechanism, and a bridge into a system.",
        items: [
          {
            label: "Shift",
            text: "Stop posting “value”. Start posting precision pain, clear mechanisms, and direct product bridges."
          },
          {
            label: "Outcome",
            text: "Cold viewers recognise themselves, understand the system, and see your product as the obvious next step."
          }
        ]
      },

      // ───────────── PAIN SEQUENCE 1 ─────────────
      {
        eyebrow: "PAIN POINT",
        pill: "INCONSISTENCY",
        title: "You’re not inconsistent. You’re operating without a system.",
        subtitle: "Most people think they have a discipline problem. They actually have a structure problem.",
        items: [
          {
            label: "Pattern",
            text: "You start strong, fall off, feel guilty, restart, burn out, repeat. You call it “lack of willpower”."
          },
          {
            label: "Truth",
            text: "You’re trying to brute‑force behaviour without a container that makes consistency inevitable."
          }
        ]
      },
      {
        eyebrow: "PAIN POINT",
        pill: "INCONSISTENCY",
        title: "If this is you, it’s not a motivation issue.",
        subtitle: "You’ve already proven you can care. You just haven’t been given a system that holds you.",
        items: [
          {
            label: "Signals",
            text: "You binge information, save posts, buy courses, but your day‑to‑day behaviour doesn’t change."
          },
          {
            label: "Cost",
            text: "Every restart erodes self‑trust. That’s the real damage—not the missed week of output."
          }
        ]
      },

      // ───────────── PAIN SEQUENCE 2 ─────────────
      {
        eyebrow: "PAIN POINT",
        pill: "FEELING BEHIND",
        title: "You don’t feel behind because of time. You feel behind because of chaos.",
        subtitle: "“I’m behind” is usually code for “I can’t see a clear path from here to where I want to be.”",
        items: [
          {
            label: "Experience",
            text: "You scroll and see people with systems, offers, content engines. You feel like you’re improvising daily."
          },
          {
            label: "Effect",
            text: "You freeze. Not because you’re lazy, but because every move feels like a guess."
          }
        ]
      },
      {
        eyebrow: "PAIN POINT",
        pill: "FEELING BEHIND",
        title: "You don’t need more speed. You need a map.",
        subtitle: "Once the path is clear, urgency turns from anxiety into execution.",
        items: [
          {
            label: "Key",
            text: "Clarity is the real productivity hack. A system that tells you exactly what today is for."
          },
          {
            label: "Bridge",
            text: "That’s what a well‑designed framework gives you: a map that removes the feeling of being behind."
          }
        ]
      },

      // ───────────── PAIN SEQUENCE 3 ─────────────
      {
        eyebrow: "PAIN POINT",
        pill: "WASTED POTENTIAL",
        title: "You don’t lack potential. You lack a container that can hold it.",
        subtitle: "“I’m wasting my potential” is what smart people say when they’re trapped in unstructured effort.",
        items: [
          {
            label: "Reality",
            text: "You’re not underperforming because you’re incapable. You’re underperforming because your environment is random."
          },
          {
            label: "Tension",
            text: "Your brain knows you’re capable of more. Your system doesn’t give that potential anywhere to land."
          }
        ]
      },

      // ───────────── SYSTEM REVELATION 1 ─────────────
      {
        eyebrow: "SYSTEM",
        pill: "ROOT NODE FRAMEWORK",
        title: "There are only 3 reasons your content isn’t converting.",
        subtitle: "Every “content problem” is actually a system problem in disguise.",
        items: [
          {
            label: "Reason 1",
            text: "You’re not speaking to a precise emotional root node. The viewer doesn’t recognise themselves."
          },
          {
            label: "Reason 2",
            text: "You’re not revealing a clear mechanism. They don’t understand why they’re stuck or how you fix it."
          }
        ]
      },
      {
        eyebrow: "SYSTEM",
        pill: "ROOT NODE FRAMEWORK",
        title: "Reason 3: There’s no clean bridge into your product.",
        subtitle: "You drop value, then disappear. The viewer has no idea there’s a system they can step into.",
        items: [
          {
            label: "Fix",
            text: "Every piece of content should expose a problem your product solves and hint at the system inside."
          },
          {
            label: "Leverage",
            text: "Once that’s in place, your content becomes a conveyor belt into your offer—not random posts."
          }
        ]
      },

      // ───────────── SYSTEM REVELATION 2 ─────────────
      {
        eyebrow: "SYSTEM",
        pill: "MECHANISM",
        title: "If you can’t name the mechanism, you can’t sell the product.",
        subtitle: "“It helps you be more consistent” is not a mechanism. It’s a vague promise.",
        items: [
          {
            label: "Mechanism",
            text: "A mechanism is the specific way your system changes their behaviour or environment."
          },
          {
            label: "Example",
            text: "“We route every idea through an 8‑layer framework so you never stare at a blank page again.”"
          }
        ]
      },

      // ───────────── SYSTEM REVELATION 3 ─────────────
      {
        eyebrow: "SYSTEM",
        pill: "ARCHITECTURE",
        title: "Your buyer doesn’t want more information. They want a container.",
        subtitle: "Information is infinite. Containers are scarce. That’s why systems sell.",
        items: [
          {
            label: "Shift",
            text: "Stop selling knowledge. Start selling architecture: steps, layers, constraints, and repeatable flows."
          },
          {
            label: "Perception",
            text: "When they see a clear architecture, they assume you can hold their chaos better than they can."
          }
        ]
      },

      // ───────────── PRODUCT BRIDGE 1 ─────────────
      {
        eyebrow: "PRODUCT BRIDGE",
        pill: "FROM PAIN TO SYSTEM",
        title: "If this is you, you don’t need another idea. You need a system that holds you.",
        subtitle: "That’s exactly what my product is built to do.",
        items: [
          {
            label: "What It Does",
            text: "It takes your chaos—ideas, offers, content—and routes them through a stable, repeatable framework."
          },
          {
            label: "Result",
            text: "You stop improvising every day and start executing inside a container that makes consistency default."
          }
        ]
      },

      // ───────────── PRODUCT BRIDGE 2 ─────────────
      {
        eyebrow: "PRODUCT BRIDGE",
        pill: "OFFER POSITIONING",
        title: "This isn’t a course. It’s an operating system for how you create and sell.",
        subtitle: "You don’t need more lessons. You need a way of working that you can’t fall out of.",
        items: [
          {
            label: "Inside",
            text: "You get the exact architecture I use: root nodes, overlays, wrappers, formats, and product bridges."
          },
          {
            label: "Why It Sells",
            text: "Because once you see your work as a system, every piece of content becomes a sales asset."
          }
        ]
      },

      // ───────────── PRODUCT BRIDGE 3 ─────────────
      {
        eyebrow: "PRODUCT BRIDGE",
        pill: "CALL TO ACTION",
        title: "If you recognised yourself in these slides, this was not an accident.",
        subtitle: "You’re the person this system was built for.",
        items: [
          {
            label: "Next Step",
            text: "Go to the link in my bio, find the system I just described, and read the page slowly."
          },
          {
            label: "Frame",
            text: "Don’t treat it like a product. Treat it like an exit ramp out of the patterns you just saw."
          }
        ]
      },

      // ───────────── META / WHY NOTHING WORKED ─────────────
      {
        eyebrow: "META",
        pill: "WHY THIS WORKS",
        title: "The reason nothing else has worked is simple: you never had a system that could hold you.",
        subtitle: "You’ve been trying to fix systemic problems with motivational band‑aids.",
        items: [
          {
            label: "Old Way",
            text: "Random tips, scattered notes, inconsistent execution, guilt, restart, repeat."
          },
          {
            label: "New Way",
            text: "One architecture. One operating system. One decision: “I build inside this container now.”"
          }
        ]
      }
    ];

    // ─────────────────────────────────────────────
    // RUNTIME
    // ─────────────────────────────────────────────
    const eyebrowEl = document.getElementById("eyebrow");
    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    const gridEl = document.getElementById("grid");
    const progressEl = document.getElementById("progress");
    const pillEl = document.getElementById("pill-label");
    const frameEl = document.getElementById("frame");

    let index = 0;

    function renderProgress() {
      progressEl.innerHTML = "";
      SLIDES.forEach((_, i) => {
        const bar = document.createElement("div");
        bar.className = "bar" + (i === index ? " active" : "");
        const fill = document.createElement("div");
        fill.className = "bar-fill";
        bar.appendChild(fill);
        progressEl.appendChild(bar);
      });
    }

    function renderSlide() {
      const slide = SLIDES[index];
      eyebrowEl.textContent = slide.eyebrow || "";
      pillEl.textContent = slide.pill || "";
      titleEl.innerHTML = (slide.title || "").replace(
        /\*(.+?)\*/g,
        "<span class=\"accent\">$1</span>"
      );
      subtitleEl.textContent = slide.subtitle || "";

      gridEl.innerHTML = "";
      (slide.items || []).forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="item-label">${item.label || ""}</div>
          <div class="item-main">${item.text || ""}</div>
        `;
        gridEl.appendChild(div);
      });

      renderProgress();
    }

    function nextSlide() {
      if (index < SLIDES.length - 1) {
        index++;
        renderSlide();
      }
    }

    function prevSlide() {
      if (index > 0) {
        index--;
        renderSlide();
      }
    }

    frameEl.addEventListener("click", () => {
      nextSlide();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " ") {
        nextSlide();
      } else if (e.key === "ArrowLeft") {
        prevSlide();
      }
    });

    renderSlide();
  </script>
</body>
</html>
