<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FM Output Node</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #020204;
      --fg: #f5f5f5;
      --muted: #8b8f98;
      --border: #1a1b20;
      --accent: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(circle at top, #151720 0, #020204 55%);
      font-family: system-ui, -apple-system, "Inter", sans-serif;
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      user-select: none;
    }

    .widget {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9 / 16;
      border-radius: 22px;
      border: 1px solid var(--border);
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.78), rgba(0,0,0,0.97)),
        radial-gradient(circle at top, #2a2d38 0, #05060a 55%);
      padding: 20px 18px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: breathe 6s ease-in-out infinite;
      cursor: pointer;
    }

    @keyframes breathe {
      0% { box-shadow: 0 0 12px rgba(255,255,255,0.04); }
      50% { box-shadow: 0 0 26px rgba(255,255,255,0.12); }
      100% { box-shadow: 0 0 12px rgba(255,255,255,0.04); }
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.7;
      pointer-events: none;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 2px,
        transparent 2px,
        transparent 4px
      );
      animation: scan 7s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .header {
      z-index: 1;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    /* FM OUTPUT BLOCK */
    .fm-output {
      z-index: 1;
      margin-top: 26px;
      min-height: 90px;
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.55;
      color: var(--accent);
      white-space: pre-wrap;
      opacity: 0.85;
      transition: opacity 0.3s ease-out;
    }

    /* EYE */
    .eye {
      z-index: 1;
      margin-top: 20px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      margin-left: auto;
      margin-right: auto;
      position: relative;
      animation: eyePulse 4.5s ease-in-out infinite;
    }

    @keyframes eyePulse {
      0% { transform: scale(0.92); opacity: 0.6; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.92); opacity: 0.6; }
    }

    .eye::after {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      animation: eyeInner 4.5s ease-in-out infinite;
    }

    @keyframes eyeInner {
      0% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.08); opacity: 0.9; }
      100% { transform: scale(1); opacity: 0.4; }
    }

    .footer {
      z-index: 1;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="widget" id="fm-widget">
    <div class="grid"></div>
    <div class="scanlines"></div>

    <div class="header">
      <div>FM NODE</div>
      <div id="timestamp">--:--:--</div>
    </div>

    <div class="fm-output" id="fm-output">
      Tap to generate signal…
    </div>

    <div class="eye"></div>

    <div class="footer">
      <div>Node: FM‑04</div>
      <div>Classification: Sovereign</div>
    </div>
  </div>

  <script>
    let GROQ_KEY = null;

    function updateTimestamp() {
      const el = document.getElementById("timestamp");
      const now = new Date();
      el.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    setInterval(updateTimestamp, 1000);
    updateTimestamp();

    function typeText(el, text, speed = 18) {
      el.textContent = "";
      let i = 0;
      function type() {
        if (i < text.length) {
          el.textContent += text.charAt(i);
          i++;
          setTimeout(type, speed);
        }
      }
      type();
    }

    async function fetchFM() {
      if (!GROQ_KEY) {
        GROQ_KEY = prompt("Enter your Groq API key:");
        if (!GROQ_KEY) return "No API key provided.";
      }

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + GROQ_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
              { role: "system", content: "You are FM. Output cold, minimal, sovereign lines. No motivation. No advice. No friendliness. No emojis. One line only." },
              { role: "user", content: "Generate one FM output line." }
            ]
          })
        });

        const data = await response.json();
        return data.choices?.[0]?.message?.content || "No response.";
      } catch (err) {
        return "ERROR: " + err.toString();
      }
    }

    document.getElementById("fm-widget").addEventListener("click", async () => {
      const out = document.getElementById("fm-output");
      out.style.opacity = 0.4;
      out.textContent = "…";

      const line = await fetchFM();
      out.style.opacity = 1;
      typeText(out, line);
    });
  </script>

</body>
</html>
