<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>100-Hour Command Deck v4.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <style>
    :root {
      --ignition-bg: radial-gradient(circle at top, #0b1b3b 0%, #05060a 55%, #020308 100%);
      --expansion-bg: radial-gradient(circle at top, #1f2937 0%, #05060a 55%, #020308 100%);
      --consolidation-bg: radial-gradient(circle at top, #05060a 0%, #020308 60%, #000000 100%);
      --surge-bg: radial-gradient(circle at top, #3b0008 0%, #120008 45%, #000000 100%);

      --ignition-accent: #4fd1ff;
      --expansion-accent: #8bc34a;
      --consolidation-accent: #ffeb3b;
      --surge-accent: #ff5252;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0 14px;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      color: #f5f5f5;
      background: var(--ignition-bg);
      -webkit-font-smoothing: antialiased;
      transition: background 1s ease;
      overflow: hidden;
      position: relative;
    }

    /* Ambient scan + grid */
    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: 0.35;
      pointer-events: none;
      mix-blend-mode: soft-light;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 2px,
        transparent 2px,
        transparent 4px
      );
      opacity: 0.25;
      pointer-events: none;
      animation: scan 9s linear infinite;
      mix-blend-mode: soft-light;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    /* Identity spine */
    .spine {
      position: fixed;
      left: 10px;
      top: 10px;
      bottom: 10px;
      width: 2px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(255,255,255,0.6), rgba(255,255,255,0.1));
      opacity: 0.7;
      border-radius: 999px;
      overflow: hidden;
    }

    .spine-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      background: linear-gradient(to top, #ffffff, rgba(255,255,255,0.2));
      transition: height 0.4s ease-out;
    }

    .deck {
      position: relative;
      width: 100%;
      max-width: 480px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at top, rgba(255,255,255,0.06), rgba(0,0,0,0.96));
      padding: 18px 18px 20px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: space-between;
      box-shadow: 0 0 26px rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      animation: deckBreathe 6s ease-in-out infinite;
      overflow: hidden;
    }

    @keyframes deckBreathe {
      0% { transform: translateY(0); box-shadow: 0 0 18px rgba(0,0,0,0.7); }
      50% { transform: translateY(-1px); box-shadow: 0 0 30px rgba(0,0,0,0.95); }
      100% { transform: translateY(0); box-shadow: 0 0 18px rgba(0,0,0,0.7); }
    }

    .deck-inner {
      position: relative;
      z-index: 1;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 10px;
    }

    .pill {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 0.65rem;
    }

    .pill-right {
      opacity: 0.7;
    }

    .phase-sigil {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sigil-shape {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.7);
      position: relative;
      overflow: hidden;
    }

    .sigil-core {
      position: absolute;
      inset: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.3);
      opacity: 0.8;
      animation: sigilPulse 4s ease-in-out infinite;
    }

    @keyframes sigilPulse {
      0% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); opacity: 0.5; }
    }

    .phase-text-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .phase-label {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    #phase {
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Countdown core */
    #countdown {
      margin-top: 18px;
      font-size: clamp(3.4rem, 10vw, 5.6rem);
      font-weight: 650;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.1;
      animation: countdownBreathe 4.5s ease-in-out infinite;
    }

    @keyframes countdownBreathe {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.01); opacity: 0.95; }
      100% { transform: scale(1); opacity: 1; }
    }

    .countdown-label {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-top: 4px;
    }

    #countup {
      margin-top: 10px;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    #percent {
      margin-top: 6px;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    #endtime {
      margin-top: 4px;
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* Progress bar */
    #progress-container {
      margin-top: 18px;
      width: 100%;
      height: 14px;
      background: rgba(0,0,0,0.8);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 0 16px rgba(0,0,0,0.8);
      position: relative;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4fd1ff, #8bc34a, #ffeb3b, #ff5252);
      background-size: 300% 100%;
      animation: progressFlow 6s linear infinite;
      transition: width 0.2s linear;
    }

    @keyframes progressFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* Today velocity bar */
    .velocity-row {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .velocity-bar {
      margin-top: 6px;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: #0d0e12;
      overflow: hidden;
      position: relative;
    }

    .velocity-fill {
      position: absolute;
      inset: 0;
      width: 0%;
      background: linear-gradient(to right, #ffffff, rgba(255,255,255,0.4));
      transition: width 0.4s ease-out;
    }

    /* Meta row */
    .meta-row {
      margin-top: 12px;
      font-size: 0.8rem;
      opacity: 0.75;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #milestone-label {
      font-size: 0.8rem;
    }

    .mode-hint {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    /* Milestone shockwave */
    .milestone-pulse {
      animation: milestonePulse 0.7s ease-out;
    }

    @keyframes milestonePulse {
      0% { transform: scale(1); box-shadow: 0 0 0 rgba(255,255,255,0.0); }
      40% { transform: scale(1.02); box-shadow: 0 0 26px rgba(255,255,255,0.35); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(255,255,255,0.0); }
    }

    /* Cinematic ritual mode */
    .cinematic .header-row,
    .cinematic .phase-sigil,
    .cinematic #countup,
    .cinematic #percent,
    .cinematic #endtime,
    .cinematic #progress-container,
    .cinematic .velocity-row,
    .cinematic .velocity-bar,
    .cinematic .meta-row {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .cinematic #countdown {
      font-size: clamp(4.5rem, 16vw, 7.5rem);
      margin-top: 26px;
    }

    .cinematic .countdown-label {
      opacity: 0.5;
    }

    .cinematic .deck {
      animation: deckBreathe 7s ease-in-out infinite;
    }

    .cinematic .spine-fill {
      transition: height 1.2s ease-out;
    }

  </style>
</head>

<body>
  <div class="grid"></div>
  <div class="scanlines"></div>
  <div class="spine">
    <div class="spine-fill" id="spine-fill"></div>
  </div>

  <div class="deck" id="deck">
    <div class="deck-inner">
      <div class="header-row">
        <div class="pill">100-HOUR COMMAND DECK</div>
        <div class="pill pill-right" id="phase-tag">IGNITION</div>
      </div>

      <div class="phase-sigil">
        <div class="sigil-shape">
          <div class="sigil-core" id="sigil-core"></div>
        </div>
        <div class="phase-text-block">
          <div class="phase-label">Current Phase</div>
          <div id="phase">Phase I — Ignition</div>
        </div>
      </div>

      <div id="countdown">--:--:--</div>
      <div class="countdown-label">HOURS · MINUTES · SECONDS REMAINING</div>

      <div id="countup">00:00:00 elapsed</div>
      <div id="percent">0.00% complete</div>
      <div id="endtime"></div>

      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>

      <div class="velocity-row">
        <div>Time conquered today</div>
        <div id="velocity-label">0.0h</div>
      </div>
      <div class="velocity-bar">
        <div class="velocity-fill" id="velocity-fill"></div>
      </div>

      <div class="meta-row">
        <span id="milestone-label">Next milestone: 10h</span>
        <span class="mode-hint">Tap anywhere · Ritual mode</span>
      </div>
    </div>
  </div>

  <script>
    // Fixed start time: 8 April 2026, 09:00 AEST (UTC+10)
    const start = new Date("2026-04-08T09:00:00+10:00").getTime();
    const end = start + (100 * 60 * 60 * 1000);

    const countdownEl = document.getElementById("countdown");
    const countupEl = document.getElementById("countup");
    const percentEl = document.getElementById("percent");
    const phaseEl = document.getElementById("phase");
    const endtimeEl = document.getElementById("endtime");
    const progressBarEl = document.getElementById("progress-bar");
    const deckEl = document.getElementById("deck");
    const milestoneLabelEl = document.getElementById("milestone-label");
    const phaseTagEl = document.getElementById("phase-tag");
    const sigilCoreEl = document.getElementById("sigil-core");
    const spineFillEl = document.getElementById("spine-fill");
    const velocityFillEl = document.getElementById("velocity-fill");
    const velocityLabelEl = document.getElementById("velocity-label");

    endtimeEl.textContent = "Ends: " + new Date(end).toLocaleString();

    let lastMilestoneBlock = -1;

    function setAtmosphere(pct) {
      let bg, accent;
      if (pct < 25) {
        bg = getComputedStyle(document.documentElement).getPropertyValue('--ignition-bg');
        accent = getComputedStyle(document.documentElement).getPropertyValue('--ignition-accent');
        phaseTagEl.textContent = "IGNITION";
      } else if (pct < 50) {
        bg = getComputedStyle(document.documentElement).getPropertyValue('--expansion-bg');
        accent = getComputedStyle(document.documentElement).getPropertyValue('--expansion-accent');
        phaseTagEl.textContent = "EXPANSION";
      } else if (pct < 75) {
        bg = getComputedStyle(document.documentElement).getPropertyValue('--consolidation-bg');
        accent = getComputedStyle(document.documentElement).getPropertyValue('--consolidation-accent');
        phaseTagEl.textContent = "CONSOLIDATION";
      } else {
        bg = getComputedStyle(document.documentElement).getPropertyValue('--surge-bg');
        accent = getComputedStyle(document.documentElement).getPropertyValue('--surge-accent');
        phaseTagEl.textContent = "SURGE";
      }
      document.body.style.background = bg;
      countdownEl.style.color = accent;
      sigilCoreEl.style.background = accent.trim() ? accent.replace(')', ',0.3)').replace('rgb', 'rgba') : 'rgba(255,255,255,0.3)';
    }

    function updatePhaseText(pct) {
      let phase = "";
      if (pct < 25) phase = "Phase I — Ignition";
      else if (pct < 50) phase = "Phase II — Expansion";
      else if (pct < 75) phase = "Phase III — Consolidation";
      else phase = "Phase IV — Surge";
      phaseEl.textContent = phase;
    }

    function toggleMode() {
      document.body.classList.toggle("cinematic");
      deckEl.classList.toggle("cinematic");
    }

    document.body.addEventListener("click", toggleMode);

    function getTodayHours(elapsedMs) {
      const now = Date.now();
      const startOfDay = new Date();
      startOfDay.setHours(0,0,0,0);
      const dayStart = Math.max(start, startOfDay.getTime());
      const dayElapsed = Math.max(0, Math.min(now, end) - dayStart);
      return dayElapsed / (1000 * 60 * 60);
    }

    function updateAll() {
      const now = Date.now();

      let remaining = end - now;
      if (remaining < 0) remaining = 0;
      const totalSecondsRem = Math.floor(remaining / 1000);
      const hoursRem = String(Math.floor(totalSecondsRem / 3600)).padStart(2, '0');
      const minutesRem = String(Math.floor((totalSecondsRem % 3600) / 60)).padStart(2, '0');
      const secondsRem = String(totalSecondsRem % 60).padStart(2, '0');
      countdownEl.textContent = `${hoursRem}:${minutesRem}:${secondsRem}`;

      let elapsed = now - start;
      if (elapsed < 0) elapsed = 0;
      const totalSecondsEl = Math.floor(elapsed / 1000);
      const hoursEl = Math.floor(totalSecondsEl / 3600);
      const hoursElStr = String(hoursEl).padStart(2, '0');
      const minutesEl = String(Math.floor((totalSecondsEl % 3600) / 60)).padStart(2, '0');
      const secondsEl = String(totalSecondsEl % 60).padStart(2, '0');
      countupEl.textContent = `${hoursElStr}:${minutesEl}:${secondsEl} elapsed`;

      const total = end - start;
      const pctRaw = (elapsed / total) * 100;
      const pct = Math.min(Math.max(pctRaw, 0), 100);
      percentEl.textContent = pct.toFixed(2) + "% complete";
      progressBarEl.style.width = pct + "%";

      updatePhaseText(pct);
      setAtmosphere(pct);

      // Spine fill = overall arc completion
      spineFillEl.style.height = pct + "%";

      // Today velocity
      const todayHours = getTodayHours(elapsed);
      const todayPct = Math.min(todayHours / 16 * 100, 100); // 16h cap visual
      velocityFillEl.style.width = todayPct + "%";
      velocityLabelEl.textContent = `${todayHours.toFixed(1)}h`;

      // Milestone shockwave every 10h
      const milestoneBlock = Math.floor(hoursEl / 10);
      if (milestoneBlock !== lastMilestoneBlock && hoursEl > 0 && hoursEl <= 100) {
        lastMilestoneBlock = milestoneBlock;
        deckEl.classList.remove("milestone-pulse");
        void deckEl.offsetWidth;
        deckEl.classList.add("milestone-pulse");
      }

      const nextMilestoneHours = Math.min(Math.ceil((hoursEl + 0.0001) / 10) * 10, 100);
      if (hoursEl >= 100) milestoneLabelEl.textContent = "Arc complete at 100h";
      else milestoneLabelEl.textContent = `Next milestone: ${nextMilestoneHours}h`;

      if (remaining === 0) {
        countdownEl.textContent = "00:00:00";
        phaseEl.textContent = "ARC COMPLETE";
        phaseTagEl.textContent = "COMPLETE";
        document.body.style.background = "#000000";
        deckEl.classList.remove("milestone-pulse");
        deckEl.classList.add("milestone-pulse");
        return;
      }

      requestAnimationFrame(updateAll);
    }

    updateAll();
  </script>
</body>
</html>
