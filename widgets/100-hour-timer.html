<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>100-Hour Command Deck v4.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<style>
  :root {
    --ignition-bg: radial-gradient(circle at top, #0b1b3b 0%, #05060a 55%, #020308 100%);
    --expansion-bg: radial-gradient(circle at top, #1f2937 0%, #05060a 55%, #020308 100%);
    --consolidation-bg: radial-gradient(circle at top, #05060a 0%, #020308 60%, #000000 100%);
    --surge-bg: radial-gradient(circle at top, #3b0008 0%, #120008 45%, #000000 100%);

    --ignition-accent: #4fd1ff;
    --expansion-accent: #8bc34a;
    --consolidation-accent: #ffeb3b;
    --surge-accent: #ff5252;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0 14px;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f5f5f5;
    background: var(--ignition-bg);
    -webkit-font-smoothing: antialiased;
    transition: background 1s ease;
    overflow: hidden;
    position: relative;
  }

  /* Live timestamp */
  .system-clock {
    position: fixed;
    top: 12px;
    right: 14px;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    opacity: 0.65;
    text-transform: uppercase;
    font-family: "SF Mono", monospace;
    z-index: 20;
  }

  /* Grid + scanlines */
  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 34px 34px;
    opacity: 0.35;
    pointer-events: none;
    mix-blend-mode: soft-light;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 2px,
      transparent 2px,
      transparent 4px
    );
    opacity: 0.25;
    pointer-events: none;
    animation: scan 9s linear infinite;
    mix-blend-mode: soft-light;
  }

  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  /* Identity spine */
  .spine {
    position: fixed;
    left: 10px;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(255,255,255,0.6), rgba(255,255,255,0.1));
    opacity: 0.7;
    border-radius: 999px;
    overflow: hidden;
  }

  .spine-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 0%;
    background: linear-gradient(to top, #ffffff, rgba(255,255,255,0.2));
    transition: height 0.4s ease-out;
  }

  /* Deck */
  .deck {
    position: relative;
    width: 100%;
    max-width: 480px;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.12);
    background: radial-gradient(circle at top, rgba(255,255,255,0.06), rgba(0,0,0,0.96));
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: space-between;
    box-shadow: 0 0 26px rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    animation: deckBreathe 6s ease-in-out infinite;
    overflow: hidden;
    z-index: 10;
  }

  @keyframes deckBreathe {
    0% { transform: translateY(0); box-shadow: 0 0 18px rgba(0,0,0,0.7); }
    50% { transform: translateY(-1px); box-shadow: 0 0 30px rgba(0,0,0,0.95); }
    100% { transform: translateY(0); box-shadow: 0 0 18px rgba(0,0,0,0.7); }
  }

  .deck-inner { position: relative; z-index: 1; }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 10px;
  }

  .pill {
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.18);
    font-size: 0.65rem;
  }

  .phase-sigil {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sigil-shape {
    width: 26px;
    height: 26px;
    border-radius: 999px;
    border: 2px solid rgba(255,255,255,0.7);
    position: relative;
    overflow: hidden;
  }

  .sigil-core {
    position: absolute;
    inset: 7px;
    border-radius: 999px;
    background: rgba(255,255,255,0.3);
    opacity: 0.8;
    animation: sigilPulse 4s ease-in-out infinite;
  }

  @keyframes sigilPulse {
    0% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 0.5; }
  }

  #countdown {
    margin-top: 18px;
    font-size: clamp(3.4rem, 10vw, 5.6rem);
    font-weight: 650;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.1;
    animation: countdownBreathe 4.5s ease-in-out infinite;
  }

  @keyframes countdownBreathe {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.01); opacity: 0.95; }
    100% { transform: scale(1); opacity: 1; }
  }

  .countdown-label {
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 4px;
  }

  #countup, #percent, #endtime {
    text-align: center;
    margin-top: 6px;
    opacity: 0.85;
  }

  #progress-container {
    margin-top: 18px;
    width: 100%;
    height: 14px;
    background: rgba(0,0,0,0.8);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 0 16px rgba(0,0,0,0.8);
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4fd1ff, #8bc34a, #ffeb3b, #ff5252);
    background-size: 300% 100%;
    animation: progressFlow 6s linear infinite;
    transition: width 0.2s linear;
  }

  @keyframes progressFlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  .velocity-row {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .velocity-bar {
    margin-top: 6px;
    width: 100%;
    height: 6px;
    border-radius: 999px;
    background: #0d0e12;
    overflow: hidden;
  }

  .velocity-fill {
    position: absolute;
    inset: 0;
    width: 0%;
    background: linear-gradient(to right, #ffffff, rgba(255,255,255,0.4));
    transition: width 0.4s ease-out;
  }

  .meta-row {
    margin-top: 12px;
    font-size: 0.8rem;
    opacity: 0.75;
    display: flex;
    justify-content: space-between;
  }

  /* Slide-up start panel */
  .start-panel {
    position: fixed;
    left: 0;
    right: 0;
    bottom: -260px;
    background: rgba(0,0,0,0.92);
    border-top: 1px solid rgba(255,255,255,0.12);
    padding: 22px 20px 28px;
    box-shadow: 0 -8px 22px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    transition: bottom 0.45s ease;
    z-index: 30;
  }

  .start-panel.visible {
    bottom: 0;
  }

  .panel-title {
    font-size: 0.75rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 14px;
  }

  .input-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }

  input {
    width: 100%;
    padding: 10px 12px;
    background: #0d0e12;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px;
    color: #ffffff;
    font-size: 0.95rem;
    outline: none;
  }

  input:focus {
    border-color: rgba(255,255,255,0.35);
  }

  .init-btn {
    width: 100%;
    padding: 12px;
    background: #ffffff;
    color: #000000;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
  }

  .init-btn:active {
    transform: scale(0.98);
  }

</style>
</head>

<body>

<div class="system-clock" id="systemClock">--:--:--</div>

<div class="grid"></div>
<div class="scanlines"></div>

<div class="spine">
  <div class="spine-fill" id="spine-fill"></div>
</div>

<div class="deck" id="deck">
  <div class="deck-inner">

    <div class="header-row">
      <div class="pill">100-HOUR COMMAND DECK</div>
      <div class="pill" id="phase-tag">IGNITION</div>
    </div>

    <div class="phase-sigil">
      <div class="sigil-shape">
        <div class="sigil-core" id="sigil-core"></div>
      </div>
      <div>
        <div style="font-size:0.7rem;opacity:0.7;letter-spacing:0.16em;">Current Phase</div>
        <div id="phase" style="font-size:0.85rem;font-weight:500;">Phase I — Ignition</div>
      </div>
    </div>

    <div id="countdown">--:--:--</div>
    <div class="countdown-label">HOURS · MINUTES · SECONDS REMAINING</div>

    <div id="countup">00:00:00 elapsed</div>
    <div id="percent">0.00% complete</div>
    <div id="endtime"></div>

    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>

    <div class="velocity-row">
      <div>Time conquered today</div>
      <div id="velocity-label">0.0h</div>
    </div>
    <div class="velocity-bar">
      <div class="velocity-fill" id="velocity-fill"></div>
    </div>

    <div class="meta-row">
      <span id="milestone-label">Next milestone: 10h</span>
      <span style="opacity:0.55;font-size:0.7rem;letter-spacing:0.16em;">Tap anywhere · Ritual mode</span>
    </div>

  </div>
</div>

<!-- Slide-up start panel -->
<div class="start-panel" id="startPanel">
  <div class="panel-title">Initialise 100‑Hour Arc</div>

  <div class="input-row">
    <input type="date" id="startDate" />
    <input type="time" id="startTime" />
  </div>

  <button class="init-btn" id="initBtn">Init Arc</button>
</div>

<script>
  const systemClockEl = document.getElementById("systemClock");
  const startPanel = document.getElementById("startPanel");
  const initBtn = document.getElementById("initBtn");

  const countdownEl = document.getElementById("countdown");
  const countupEl = document.getElementById("countup");
  const percentEl = document.getElementById("percent");
  const phaseEl = document.getElementById("phase");
  const endtimeEl = document.getElementById("endtime");
  const progressBarEl = document.getElementById("progress-bar");
  const deckEl = document.getElementById("deck");
  const milestoneLabelEl = document.getElementById("milestone-label");
  const phaseTagEl = document.getElementById("phase-tag");
  const sigilCoreEl = document.getElementById("sigil-core");
  const spineFillEl = document.getElementById("spine-fill");
  const velocityFillEl = document.getElementById("velocity-fill");
  const velocityLabelEl = document.getElementById("velocity-label");

  let start = null;
  let end = null;
  let lastMilestoneBlock = -1;

  function updateClock() {
    const now = new Date();
    const date = now.toLocaleDateString("en-AU", { day: "2-digit", month: "short", year: "numeric" }).toUpperCase();
    const time = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    systemClockEl.textContent = `${date} • ${time}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  function showStartPanel() {
    startPanel.classList.add("visible");
  }

  function hideStartPanel() {
    startPanel.classList.remove("visible");
  }

  function loadStartTime() {
    const saved = localStorage.getItem("fm_arc_start");
    if (saved) {
      start = parseInt(saved);
      end = start + 100 * 60 * 60 * 1000;
      hideStartPanel();
      return true;
    }
    return false;
  }

  function initArc() {
    const date = document.getElementById("startDate").value;
    const time = document.getElementById("startTime").value;

    if (!date || !time) {
      alert("Select both date and time.");
      return;
    }

    start = new Date(`${date}T${time}`).getTime();
    end = start + 100 * 60 * 60 * 1000;

    localStorage.setItem("fm_arc_start", start);
    hideStartPanel();
  }

  initBtn.addEventListener("click", initArc);

  function setAtmosphere(pct) {
    let bg, accent;
    if (pct < 25) {
      bg = getComputedStyle(document.documentElement).getPropertyValue('--ignition-bg');
      accent = getComputedStyle(document.documentElement).getPropertyValue('--ignition-accent');
      phaseTagEl.textContent = "IGN
