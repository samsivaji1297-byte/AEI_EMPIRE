<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sigil Recording Mode</title>
<style>
    body {
        margin: 0;
        background: #000;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: sans-serif;
    }

    /* Centered sigil container */
    #sigil {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        animation: breathe 4s ease-in-out infinite;
    }

    /* Inner rotating symbol */
    #inner {
        width: 70px;
        height: 70px;
        border: 2px solid rgba(255,255,255,0.4);
        border-radius: 50%;
        position: absolute;
        animation: rotate 12s linear infinite;
    }

    /* Subtle glow ring */
    #glow {
        position: absolute;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
        filter: blur(20px);
        opacity: 0.35;
        animation: pulse 5s ease-in-out infinite;
    }

    /* Micro distortion overlay */
    #grain {
        pointer-events: none;
        position: fixed;
        inset: 0;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.12"/></svg>');
        mix-blend-mode: overlay;
        opacity: 0.18;
    }

    @keyframes breathe {
        0% { transform: scale(1); border-color: rgba(255,255,255,0.25); }
        50% { transform: scale(1.06); border-color: rgba(255,255,255,0.45); }
        100% { transform: scale(1); border-color: rgba(255,255,255,0.25); }
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes pulse {
        0% { opacity: 0.25; }
        50% { opacity: 0.45; }
        100% { opacity: 0.25; }
    }
</style>
</head>
<body>

<div id="glow"></div>
<div id="sigil">
    <div id="inner"></div>
</div>
<div id="grain"></div>

</body>
</html>
