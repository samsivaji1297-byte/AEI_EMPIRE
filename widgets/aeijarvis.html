<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Gemini Test Widget</title>
  <style>
    body {
      background:#0b0d14;
      color:#e8ecf7;
      font-family:system-ui, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      margin:0;
      gap:12px;
    }
    input, button {
      padding:10px 14px;
      border-radius:8px;
      border:1px solid #2a2f3d;
      background:#11141d;
      color:#e8ecf7;
      font-size:14px;
    }
    button {
      cursor:pointer;
      border-color:#6cf0ff;
    }
    #output {
      width:90%;
      max-width:480px;
      min-height:120px;
      border:1px solid #2a2f3d;
      padding:12px;
      border-radius:8px;
      background:#0f121b;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>

  <h2>Gemini API Test</h2>

  <input id="userInput" placeholder="Ask something..." style="width:90%;max-width:480px;" />

  <button onclick="runTest()">Send</button>

  <div id="output">Response will appear here.</div>

<script>
  // ----------------------------------------------------
  //  ONLY EDIT THIS LINE ↓↓↓
  const GEMINI_API_KEY = "AIzaSyCElEjlXAS0470B6tJBKvcH2AH4ItSq0T8";
  // ----------------------------------------------------

  const MODEL = "gemini-2.0-flash";

  async function runTest() {
    const prompt = document.getElementById("userInput").value.trim();
    if (!prompt) return;

    document.getElementById("output").textContent = "Thinking...";

    const url =
      "https://generativelanguage.googleapis.com/v1beta/models/" +
      MODEL +
      ":generateContent?key=" + GEMINI_API_KEY;

    const body = {
      contents: [{ role: "user", parts: [{ text: prompt }] }]
    };

    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      const text =
        data?.candidates?.[0]?.content?.parts?.[0]?.text ||
        "(No response returned)";

      document.getElementById("output").textContent = text;

    } catch (err) {
      document.getElementById("output").textContent =
        "Error: " + err.message;
    }
  }
</script>

</body>
</html>
