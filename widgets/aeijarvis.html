<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Gemini Diagnostic Widget</title>
  <style>
    body {
      background:#0b0d14;
      color:#e8ecf7;
      font-family:system-ui, sans-serif;
      padding:20px;
    }
    input, button {
      padding:10px 14px;
      border-radius:8px;
      border:1px solid #2a2f3d;
      background:#11141d;
      color:#e8ecf7;
      font-size:14px;
    }
    button { cursor:pointer; border-color:#6cf0ff; }
    #output {
      margin-top:20px;
      white-space:pre-wrap;
      background:#0f121b;
      padding:14px;
      border-radius:8px;
      border:1px solid #2a2f3d;
    }
  </style>
</head>
<body>

<h2>Gemini Diagnostic Widget</h2>

<input id="userInput" placeholder="Type a test prompt..." style="width:80%;" />
<button onclick="runDiag()">Run Diagnostic</button>

<div id="output">Waiting for input…</div>

<script>
  // ----------------------------------------------------
  //  ONLY EDIT THIS LINE ↓↓↓
  const GEMINI_API_KEY = "AIzaSyCElEjlXAS0470B6tJBKvcH2AH4ItSq0T8";
  // ----------------------------------------------------

  const MODEL = "gemini-1.5-flash"; // safest free-tier model

  async function runDiag() {
    const prompt = document.getElementById("userInput").value.trim() || "diagnostic test";
    const output = document.getElementById("output");
    output.textContent = "Running diagnostic...\n";

    const url =
      "https://generativelanguage.googleapis.com/v1beta/models/" +
      MODEL +
      ":generateContent?key=" + GEMINI_API_KEY;

    const body = {
      contents: [
        { role: "user", parts: [{ text: prompt }] }
      ]
    };

    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const status = res.status;
      const raw = await res.text();

      output.textContent =
        "HTTP Status: " + status + "\n\n" +
        "Raw Response:\n" + raw + "\n\n";

      let json;
      try { json = JSON.parse(raw); }
      catch { json = null; }

      if (json) {
        output.textContent +=
          "Parsed JSON:\n" + JSON.stringify(json, null, 2) + "\n\n";

        const text =
          json?.candidates?.[0]?.content?.parts?.[0]?.text;

        output.textContent +=
          "Extracted Text:\n" + (text || "(No response text)") + "\n";
      }

    } catch (err) {
      output.textContent =
        "Fetch Error:\n" + err.message;
    }
  }
</script>

</body>
</html>
