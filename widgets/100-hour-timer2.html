<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>100-Hour Command Deck v5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<style>
:root {
  --ignition-bg: radial-gradient(circle at top, #0b1b3b 0%, #05060a 55%, #020308 100%);
  --expansion-bg: radial-gradient(circle at top, #1f2937 0%, #05060a 55%, #020308 100%);
  --consolidation-bg: radial-gradient(circle at top, #05060a 0%, #020308 60%, #000000 100%);
  --surge-bg: radial-gradient(circle at top, #3b0008 0%, #120008 45%, #000000 100%);
}

* { box-sizing: border-box; }

body {
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system, system-ui;
  color:#fff;
  background:var(--ignition-bg);
  overflow:hidden;
  transition:background 1s ease;
}

/* Minimal but cinematic */
.deck {
  width:90%;
  max-width:480px;
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(0,0,0,0.8);
  text-align:center;
  transition:0.3s;
}

#countdown {
  font-size:3.5rem;
  letter-spacing:0.15em;
  margin:10px 0;
}

.meta {
  opacity:0.7;
  font-size:0.8rem;
  margin-top:6px;
}

.bar {
  margin-top:15px;
  height:10px;
  border-radius:999px;
  background:#111;
  overflow:hidden;
}

.fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4fd1ff,#8bc34a,#ffeb3b,#ff5252);
  transition:0.2s;
}

#prediction {
  margin-top:6px;
  font-size:0.75rem;
  opacity:0.7;
}

#startPanel {
  position:fixed;
  bottom:-250px;
  left:0;
  right:0;
  background:#000;
  padding:20px;
  transition:0.4s;
}

#startPanel.visible {
  bottom:0;
}

input,button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<div class="deck" id="deck">
  <div id="phase">Phase I — Ignition</div>
  <div id="countdown">--:--:--</div>
  <div class="meta" id="percent">0%</div>
  <div id="prediction">Status: --</div>

  <div class="bar"><div class="fill" id="progress"></div></div>

  <div class="meta" id="milestone">Next milestone: 10h</div>
</div>

<div id="startPanel">
  <input type="date" id="date">
  <input type="time" id="time">
  <button onclick="init()">Init Arc</button>
</div>

<script>
let start=null, end=null;
let lastInteraction=Date.now();
let inactivity=0;

const deck=document.getElementById("deck");
const countdown=document.getElementById("countdown");
const percentEl=document.getElementById("percent");
const progress=document.getElementById("progress");
const phaseEl=document.getElementById("phase");
const predictionEl=document.getElementById("prediction");
const milestoneEl=document.getElementById("milestone");

function init(){
  const d=document.getElementById("date").value;
  const t=document.getElementById("time").value;
  start=new Date(`${d}T${t}`).getTime();
  end=start+100*60*60*1000;
  localStorage.setItem("arc",start);
  document.getElementById("startPanel").classList.remove("visible");
}

function load(){
  const s=localStorage.getItem("arc");
  if(s){
    start=parseInt(s);
    end=start+100*60*60*1000;
  } else {
    document.getElementById("startPanel").classList.add("visible");
  }
}
load();

/* Activity tracking */
["click","touchstart"].forEach(e=>{
  document.addEventListener(e,()=>{lastInteraction=Date.now(); inactivity=0;});
});

function inactivityCheck(){
  let idle=(Date.now()-lastInteraction)/1000;
  if(idle>60) inactivity=1;
  if(idle>180) inactivity=2;
  if(idle>300) inactivity=3;

  deck.style.filter =
    inactivity===0 ? "none" :
    inactivity===1 ? "brightness(0.85)" :
    inactivity===2 ? "brightness(0.7) blur(1px)" :
    "brightness(0.6) blur(2px)";
}
setInterval(inactivityCheck,2000);

/* Core loop */
function loop(){
  if(!start){requestAnimationFrame(loop);return;}

  let now=Date.now();
  let elapsed=Math.max(0,now-start);
  let total=end-start;
  let pct=Math.min(100,(elapsed/total)*100);

  let remain=Math.max(0,end-now);
  let s=Math.floor(remain/1000);
  let h=String(Math.floor(s/3600)).padStart(2,'0');
  let m=String(Math.floor((s%3600)/60)).padStart(2,'0');
  let sec=String(s%60).padStart(2,'0');

  countdown.textContent=`${h}:${m}:${sec}`;
  percentEl.textContent=pct.toFixed(2)+"%";
  progress.style.width=pct+"%";

  /* Phase */
  if(pct<25) phaseEl.textContent="Ignition";
  else if(pct<50) phaseEl.textContent="Expansion";
  else if(pct<75) phaseEl.textContent="Consolidation";
  else phaseEl.textContent="Surge";

  /* Prediction */
  let expected=((now-start)/(100*60*60*1000))*100;
  let diff=pct-expected;
  let state = diff>5?"AHEAD":diff<-5?"BEHIND":"ON TRACK";
  predictionEl.textContent="Status: "+state;

  /* Intensity */
  deck.style.boxShadow=`0 0 ${20+pct*0.4}px rgba(0,0,0,0.9)`;

  /* Milestones */
  let hours=Math.floor(elapsed/3600000);
  milestoneEl.textContent=hours>=100?"Complete":"Next milestone: "+(Math.ceil(hours/10)*10)+"h";

  /* Whisper system */
  if(Math.random()<0.002){
    const w=["Stay with it","Hold the line","Don't break","Finish strong"];
    milestoneEl.textContent=w[Math.floor(Math.random()*w.length)];
  }

  /* Breathing */
  let breathe=1+Math.sin(Date.now()/4000)*0.01;
  deck.style.transform=`scale(${breathe})`;

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
