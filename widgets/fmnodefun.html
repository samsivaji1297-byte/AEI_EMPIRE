<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FM Geo-Radar Node</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #030303;
        font-family: "Inter", sans-serif;
        color: #b8e7ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Radar background */
    .radar {
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0,150,255,0.15) 0%, rgba(0,0,0,0) 70%);
        animation: rotate 12s linear infinite;
        opacity: 0.25;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* Scanline overlay */
    .scanline {
        position: absolute;
        top: 0;
        width: 100%;
        height: 3px;
        background: rgba(0,150,255,0.25);
        animation: scan 4s linear infinite;
    }

    @keyframes scan {
        0% { top: 0; opacity: 0.1; }
        50% { opacity: 0.4; }
        100% { top: 100%; opacity: 0.1; }
    }

    /* Panel */
    .panel {
        position: relative;
        width: 340px;
        padding: 22px;
        border: 1px solid #1a2a33;
        background: rgba(10,20,30,0.75);
        backdrop-filter: blur(6px);
        border-radius: 10px;
        box-shadow: 0 0 22px rgba(0,150,255,0.25);
        z-index: 10;
    }

    .title {
        font-size: 14px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #7dd3fc;
        margin-bottom: 12px;
    }

    .line {
        display: flex;
        justify-content: space-between;
        margin: 6px 0;
        font-size: 15px;
        opacity: 0;
        animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    .divider {
        height: 1px;
        background: #1f3b4d;
        margin: 14px 0;
    }
</style>
</head>

<body>

<div class="radar"></div>
<div class="scanline"></div>

<div class="panel">
    <div class="title">Geo-Radar Node</div>

    <div id="city" class="line">City: —</div>
    <div id="region" class="line">Region: —</div>
    <div id="country" class="line">Country: —</div>

    <div class="divider"></div>

    <div id="lat" class="line">Lat: —</div>
    <div id="lon" class="line">Lon: —</div>

    <div class="divider"></div>

    <div id="ip" class="line">IP: —</div>
    <div id="isp" class="line">ISP: —</div>
</div>

<script>
async function loadGeo() {
    try {
        const res = await fetch("https://ipwho.is/");
        const d = await res.json();

        document.getElementById("city").innerText = `City: ${d.city}`;
        document.getElementById("region").innerText = `Region: ${d.region}`;
        document.getElementById("country").innerText = `Country: ${d.country}`;

        document.getElementById("lat").innerText = `Lat: ${d.latitude}`;
        document.getElementById("lon").innerText = `Lon: ${d.longitude}`;

        document.getElementById("ip").innerText = `IP: ${d.ip}`;
        document.getElementById("isp").innerText = `ISP: ${d.connection.isp}`;
    } catch (e) {
        console.log("Geo lookup failed", e);
    }
}

loadGeo();
setInterval(loadGeo, 60000);
</script>

</body>
</html>
