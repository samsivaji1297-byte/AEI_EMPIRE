<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Trailer Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
/* -----------------------------------------------------------
   TRAILER ENGINE — VISUAL SYSTEM
   ----------------------------------------------------------- */

:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);

  --fg: #f5f5ff;
  --bg: #050510;
  --accent1: #7b5cff;
  --accent2: #ff4b81;
  --accent3: #00c8ff;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  color: var(--fg);
}

/* Fullscreen container */
#engine {
  position: relative;
  width: 100%;
  height: 100%;
  padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
  overflow: hidden;
}

/* Fog */
#fog {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 0%, rgba(123,92,255,0.25), transparent 60%),
    radial-gradient(circle at 80% 100%, rgba(255,75,129,0.25), transparent 60%),
    radial-gradient(circle at 50% 120%, rgba(0,200,255,0.18), transparent 70%);
  filter: blur(20px);
  opacity: 0.8;
  mix-blend-mode: screen;
  pointer-events: none;
}

/* Particle canvas */
#particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* Camera layer */
#camera {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  transition: transform 0.6s ease-out;
}

/* Scene container */
.scene {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.92) translateY(20px);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.scene.active {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* Title card */
.title {
  font-size: 32px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
  opacity: 0;
  transform: translateY(20px) scale(0.96);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.title.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* Light sweep */
.light {
  position: absolute;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(123,92,255,0.0));
  mix-blend-mode: screen;
  opacity: 0;
  transform: scale(0.6);
  transition: opacity 1.4s ease, transform 1.4s ease;
}

.light.on {
  opacity: 0.9;
  transform: scale(1.4);
}

/* Fade transition overlay */
#fade {
  position: absolute;
  inset: 0;
  background: #000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease;
}

#fade.on {
  opacity: 1;
}
</style>
</head>

<body>
<div id="engine">
  <canvas id="particles"></canvas>
  <div id="fog"></div>
  <div id="fade"></div>

  <div id="camera">

    <!-- SCENE 1 -->
    <div class="scene" id="scene1">
      <div class="light" id="light1"></div>
      <div class="title" id="title1">Awakening</div>
    </div>

    <!-- SCENE 2 -->
    <div class="scene" id="scene2">
      <div class="light" id="light2"></div>
      <div class="title" id="title2">The Shift</div>
    </div>

    <!-- SCENE 3 -->
    <div class="scene" id="scene3">
      <div class="light" id="light3"></div>
      <div class="title" id="title3">Become Inevitable</div>
    </div>

  </div>
</div>

<script>
/* -----------------------------------------------------------
   PARTICLE ENGINE
   ----------------------------------------------------------- */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
let w, h, particles;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

function initParticles() {
  particles = [];
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: 0.5 + Math.random() * 1.8,
      vx: -0.2 + Math.random() * 0.4,
      vy: -0.1 + Math.random() * 0.2,
      a: 0.1 + Math.random() * 0.4
    });
  }
}

function drawParticles() {
  ctx.clearRect(0, 0, w, h);
  ctx.globalCompositeOperation = "lighter";

  for (const p of particles) {
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
    g.addColorStop(0, `rgba(123,92,255,${p.a})`);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < -20) p.x = w + 20;
    if (p.x > w + 20) p.x = -20;
    if (p.y < -20) p.y = h + 20;
    if (p.y > h + 20) p.y = -20;
  }

  requestAnimationFrame(drawParticles);
}

initParticles();
drawParticles();

/* -----------------------------------------------------------
   CAMERA PARALLAX
   ----------------------------------------------------------- */

const camera = document.getElementById("camera");

if (window.DeviceOrientationEvent) {
  window.addEventListener("deviceorientation", (e) => {
    const x = (e.gamma || 0) / 30;
    const y = (e.beta || 0 - 45) / 30;
    camera.style.transform = `translateX(${x * 20}px) translateY(${y * 20}px)`;
  });
}

/* -----------------------------------------------------------
   TRAILER TIMELINE ENGINE
   ----------------------------------------------------------- */

const fade = document.getElementById("fade");

const scenes = [
  { id: "scene1", title: "title1", light: "light1", duration: 2600 },
  { id: "scene2", title: "title2", light: "light2", duration: 2600 },
  { id: "scene3", title: "title3", light: "light3", duration: 2600 }
];

let index = 0;

function playScene(i) {
  const s = scenes[i];
  const scene = document.getElementById(s.id);
  const title = document.getElementById(s.title);
  const light = document.getElementById(s.light);

  fade.classList.add("on");

  setTimeout(() => {
    document.querySelectorAll(".scene").forEach(sc => sc.classList.remove("active"));
    scene.classList.add("active");

    title.classList.remove("visible");
    light.classList.remove("on");

    fade.classList.remove("on");

    setTimeout(() => {
      title.classList.add("visible");
      light.classList.add("on");
    }, 400);

  }, 900);

  setTimeout(() => {
    index++;
    if (index < scenes.length) {
      playScene(index);
    }
  }, s.duration);
}

setTimeout(() => playScene(0), 600);

/* -----------------------------------------------------------
   SOUND ENGINE
   ----------------------------------------------------------- */

let audioCtx = null;
let gainNode = null;

function initSound() {
  if (audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 110;

  filter.type = "lowpass";
  filter.frequency.value = 800;

  gainNode.gain.value = 0.0;

  lfo.frequency.value = 0.06;
  lfoGain.gain.value = 300;

  lfo.connect(lfoGain);
  lfoGain.connect(filter.frequency);

  osc.connect(filter);
  filter.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  osc.start();
  lfo.start();

  gainNode.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 1.2);
}

window.addEventListener("touchstart", initSound, { once: true });
</script>
</body>
</html>
