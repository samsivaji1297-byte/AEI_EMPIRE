<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pocket Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#050510" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<style>
:root {
  --bg: #050510;
  --fg: #f5f5ff;
  --accent: #7b5cff;
  --accent-soft: rgba(123, 92, 255, 0.35);
  --accent-strong: rgba(123, 92, 255, 0.9);
  --glow: rgba(255, 255, 255, 0.12);
  --danger: #ff4b81;
  --safe-area-top: env(safe-area-inset-top);
  --safe-area-bottom: env(safe-area-inset-bottom);
  --safe-area-left: env(safe-area-inset-left);
  --safe-area-right: env(safe-area-inset-right);
}

*,
*::before,
*::after {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: radial-gradient(circle at 20% 0%, #151530 0, #050510 55%, #000000 100%);
  color: var(--fg);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

body {
  display: flex;
  align-items: stretch;
  justify-content: center;
  overflow: hidden;
}

/* Main frame */

.app {
  position: relative;
  width: 100%;
  height: 100%;
  padding: calc(10px + var(--safe-area-top)) calc(14px + var(--safe-area-right))
           calc(18px + var(--safe-area-bottom)) calc(14px + var(--safe-area-left));
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Background fog + particles */

.fog-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 10% 0%, rgba(123, 92, 255, 0.18), transparent 55%),
    radial-gradient(circle at 90% 100%, rgba(255, 75, 129, 0.18), transparent 55%),
    radial-gradient(circle at 50% 120%, rgba(0, 200, 255, 0.12), transparent 60%);
  mix-blend-mode: screen;
  filter: blur(10px);
  opacity: 0;
  animation: fogFadeIn 2.6s ease forwards 1.2s;
}

@keyframes fogFadeIn {
  to { opacity: 1; }
}

#particleCanvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  animation: particlesIn 2.4s ease forwards 1.4s;
}

@keyframes particlesIn {
  to { opacity: 0.9; }
}

/* Portal container */

.portal-shell {
  position: relative;
  width: min(360px, 90vw);
  aspect-ratio: 9 / 16;
  border-radius: 32px;
  padding: 18px 16px 20px;
  background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.08), rgba(5,5,16,0.96));
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 24px 60px rgba(0,0,0,0.85),
    0 0 80px rgba(123, 92, 255, 0.35);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
  transform: translateY(40px) scale(0.96);
  opacity: 0;
  animation: shellIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.7s;
}

@keyframes shellIn {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Top bar */

.portal-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(245,245,255,0.7);
}

.badge {
  padding: 4px 9px;
  border-radius: 999px;
  background: linear-gradient(135deg, rgba(123,92,255,0.18), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.12);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: radial-gradient(circle, #7bffb2, #00c46b);
  box-shadow: 0 0 8px rgba(0,196,107,0.9);
}

.badge-label {
  opacity: 0.9;
}

.clock {
  opacity: 0.7;
}

/* Portal core */

.portal-core {
  position: relative;
  flex: 1;
  margin: 10px 0 12px;
  border-radius: 26px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.12), transparent 55%),
    radial-gradient(circle at 0% 100%, rgba(123,92,255,0.25), transparent 60%),
    radial-gradient(circle at 100% 100%, rgba(255,75,129,0.25), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(0,0,0,0.9), rgba(0,0,0,1));
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Rings */

.portal-rings {
  position: relative;
  width: 78%;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  display: grid;
  place-items: center;
}

.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 0 40px rgba(123,92,255,0.35);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.ring.r1 {
  inset: 0;
  border-color: rgba(123,92,255,0.6);
  box-shadow:
    0 0 40px rgba(123,92,255,0.6),
    0 0 80px rgba(123,92,255,0.4);
  animation: ringPulse 6s ease-in-out infinite;
}

.ring.r2 {
  inset: 12%;
  border-style: dashed;
  border-color: rgba(255,255,255,0.25);
  opacity: 0.7;
  animation: ringSpin 18s linear infinite;
}

.ring.r3 {
  inset: 26%;
  border-color: rgba(255,255,255,0.18);
  opacity: 0.9;
  animation: ringBreath 7.5s ease-in-out infinite;
}

@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.04); opacity: 1; }
}

@keyframes ringSpin {
  to { transform: rotate(360deg); }
}

@keyframes ringBreath {
  0%, 100% { transform: scale(0.98); }
  50% { transform: scale(1.03); }
}

/* Core orb */

.portal-orb {
  position: relative;
  width: 40%;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 0%, #ffffff, #f5f5ff 20%, transparent 60%),
    radial-gradient(circle at 50% 100%, rgba(123,92,255,0.9), rgba(5,5,16,1));
  box-shadow:
    0 0 40px rgba(255,255,255,0.7),
    0 0 120px rgba(123,92,255,0.9);
  overflow: hidden;
  transform: translateZ(0);
}

.portal-orb::before {
  content: "";
  position: absolute;
  inset: -40%;
  background:
    conic-gradient(from 0deg,
      rgba(123,92,255,0.0),
      rgba(123,92,255,0.8),
      rgba(255,75,129,0.9),
      rgba(0,200,255,0.8),
      rgba(123,92,255,0.0));
  mix-blend-mode: screen;
  opacity: 0.7;
  animation: orbSweep 10s linear infinite;
}

.portal-orb::after {
  content: "";
  position: absolute;
  inset: 18%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,0,0,0.0), rgba(0,0,0,0.9));
  mix-blend-mode: multiply;
}

@keyframes orbSweep {
  to { transform: rotate(360deg); }
}

/* Touch halo */

.touch-halo {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 60%);
  opacity: 0;
  transform: scale(0.7);
  pointer-events: none;
}

/* Text area */

.portal-bottom {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 13px;
}

.title-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
}

.portal-title {
  font-size: 17px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}

.portal-mode {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(245,245,255,0.7);
}

.portal-sub {
  font-size: 12px;
  line-height: 1.4;
  color: rgba(245,245,255,0.78);
}

/* CTA */

.portal-cta {
  margin-top: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.button-main {
  flex: 1;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  background:
    radial-gradient(circle at 0% 0%, rgba(255,255,255,0.18), transparent 55%),
    linear-gradient(135deg, rgba(123,92,255,0.9), rgba(255,75,129,0.9));
  color: #ffffff;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow:
    0 0 20px rgba(123,92,255,0.7),
    0 12px 30px rgba(0,0,0,0.9);
}

.button-main span.icon {
  font-size: 15px;
}

.button-ghost {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  background: radial-gradient(circle at 30% 0%, rgba(255,255,255,0.18), transparent 60%);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: rgba(245,245,255,0.9);
}

/* State styles */

.app[data-state="idle"] .portal-shell {
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 18px 40px rgba(0,0,0,0.85),
    0 0 60px rgba(123, 92, 255, 0.25);
}

.app[data-state="deep"] .portal-shell {
  background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), rgba(5,5,16,0.98));
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 26px 70px rgba(0,0,0,0.95),
    0 0 120px rgba(255,75,129,0.6);
}

.app[data-state="deep"] .portal-orb {
  box-shadow:
    0 0 60px rgba(255,255,255,0.9),
    0 0 200px rgba(255,75,129,0.9);
}

.app[data-state="deep"] .portal-orb::before {
  animation-duration: 6s;
}

.app[data-state="deep"] .ring.r1 {
  animation-duration: 4s;
}

.app[data-state="deep"] .ring.r3 {
  animation-duration: 5s;
}

.app[data-state="deep"] .touch-halo {
  opacity: 0.9 !important;
  transform: scale(1) !important;
}

/* Intro overlay */

.intro {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at 50% 0%, #151530, #050510 60%, #000000 100%);
  color: var(--fg);
  z-index: 10;
  pointer-events: auto;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.intro.hidden {
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
}

.intro-inner {
  text-align: center;
  padding: 0 32px;
}

.intro-title {
  font-size: 22px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.intro-sub {
  font-size: 13px;
  color: rgba(245,245,255,0.8);
  margin-bottom: 22px;
}

.intro-hint {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(245,245,255,0.6);
}

.intro-orb {
  width: 80px;
  height: 80px;
  margin: 0 auto 18px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 0%, #ffffff, #f5f5ff 20%, transparent 60%),
    radial-gradient(circle at 50% 100%, rgba(123,92,255,0.9), rgba(5,5,16,1));
  box-shadow:
    0 0 40px rgba(255,255,255,0.7),
    0 0 120px rgba(123,92,255,0.9);
  position: relative;
  overflow: hidden;
}

.intro-orb::before {
  content: "";
  position: absolute;
  inset: -40%;
  background:
    conic-gradient(from 0deg,
      rgba(123,92,255,0.0),
      rgba(123,92,255,0.8),
      rgba(255,75,129,0.9),
      rgba(0,200,255,0.8),
      rgba(123,92,255,0.0));
  mix-blend-mode: screen;
  opacity: 0.7;
  animation: orbSweep 8s linear infinite;
}

/* Small helpers */

.mono {
  font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
}

/* Touch hint pulse */

@keyframes haloPulse {
  0% { opacity: 0; transform: scale(0.7); }
  40% { opacity: 0.9; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.2); }
}

.touch-halo.pulsing {
  animation: haloPulse 1.6s ease-out infinite;
}
</style>
</head>
<body>
<div class="app" data-state="idle">
  <canvas id="particleCanvas"></canvas>
  <div class="fog-layer"></div>

  <div class="portal-shell">
    <div class="portal-top">
      <div class="badge">
        <div class="badge-dot"></div>
        <div class="badge-label">Portal Online</div>
      </div>
      <div class="clock mono" id="clock"></div>
    </div>

    <div class="portal-core" id="portalCore">
      <div class="portal-rings">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="portal-orb"></div>
        <div class="touch-halo" id="touchHalo"></div>
      </div>
    </div>

    <div class="portal-bottom">
      <div class="title-row">
        <div class="portal-title">Pocket Portal</div>
        <div class="portal-mode mono" id="modeLabel">Idle Field</div>
      </div>
      <div class="portal-sub" id="portalSub">
        Touch and hold the core to drop into a deeper layer. Release to surface.
      </div>
      <div class="portal-cta">
        <button class="button-main" id="breatheButton">
          <span class="icon">◎</span>
          <span>Sync Breath</span>
        </button>
        <button class="button-ghost" id="soundToggle" aria-label="Toggle sound">
          🔈
        </button>
      </div>
    </div>
  </div>

  <div class="intro" id="intro">
    <div class="intro-inner">
      <div class="intro-orb"></div>
      <div class="intro-title">Enter</div>
      <div class="intro-sub">
        This file is its own chamber.  
        No backend. No assets. Just your device and a field.
      </div>
      <div class="intro-hint">
        Tap to arm the portal · Touch &amp; hold the core to descend
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const app = document.querySelector('.app');
  const intro = document.getElementById('intro');
  const clockEl = document.getElementById('clock');
  const modeLabel = document.getElementById('modeLabel');
  const portalSub = document.getElementById('portalSub');
  const portalCore = document.getElementById('portalCore');
  const touchHalo = document.getElementById('touchHalo');
  const breatheButton = document.getElementById('breatheButton');
  const soundToggle = document.getElementById('soundToggle');
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');

  let audioCtx = null;
  let ambientNode = null;
  let lfoNode = null;
  let soundOn = false;
  let deep = false;
  let breathing = false;
  let holdTimeout = null;

  /* Clock */

  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    clockEl.textContent = `${h}:${m}`;
  }
  updateClock();
  setInterval(updateClock, 15000);

  /* Intro */

  intro.addEventListener('click', () => {
    intro.classList.add('hidden');
    setTimeout(() => {
      intro.style.display = 'none';
    }, 900);
  }, { passive: true });

  /* Particles */

  let particles = [];
  let w = 0, h = 0;
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    w = canvas.clientWidth = window.innerWidth;
    h = canvas.clientHeight = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function createParticles(count) {
    particles = [];
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: 0.5 + Math.random() * 1.8,
        a: 0.15 + Math.random() * 0.4,
        vx: -0.2 + Math.random() * 0.4,
        vy: -0.1 + Math.random() * 0.2
      });
    }
  }

  function drawParticles() {
    ctx.clearRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles) {
      ctx.beginPath();
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
      g.addColorStop(0, `rgba(123,92,255,${p.a})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
      ctx.fill();

      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -20) p.x = w + 20;
      if (p.x > w + 20) p.x = -20;
      if (p.y < -20) p.y = h + 20;
      if (p.y > h + 20) p.y = -20;
    }
    requestAnimationFrame(drawParticles);
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    createParticles(80);
  });

  resizeCanvas();
  createParticles(80);
  requestAnimationFrame(drawParticles);

  /* Audio */

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.value = 110; // base tone
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    filter.Q.value = 0.7;

    gain.gain.value = 0.0; // start silent
    lfo.frequency.value = 0.06;
    lfoGain.gain.value = 0.35;

    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    lfo.start();

    ambientNode = gain;
    lfoNode = lfo;
  }

  function setSound(on) {
    if (!audioCtx || !ambientNode) return;
    soundOn = on;
    soundToggle.textContent = on ? '🔊' : '🔈';
    const target = on ? (deep ? 0.22 : 0.12) : 0.0;
    ambientNode.gain.cancelScheduledValues(audioCtx.currentTime);
    ambientNode.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 0.8);
  }

  soundToggle.addEventListener('click', () => {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    setSound(!soundOn);
    vibrate(10);
  });

  /* Haptics */

  function vibrate(ms) {
    if (navigator.vibrate) {
      navigator.vibrate(ms);
    }
  }

  /* State transitions */

  function enterDeep() {
    if (deep) return;
    deep = true;
    app.dataset.state = 'deep';
    modeLabel.textContent = 'Deep Layer';
    portalSub.textContent = 'Stay with the pulse. When you release, bring one thread back with you.';
    touchHalo.classList.remove('pulsing');
    touchHalo.style.opacity = '1';
    touchHalo.style.transform = 'scale(1)';
    if (soundOn) setSound(true);
    vibrate(30);
  }

  function exitDeep() {
    if (!deep) return;
    deep = false;
    app.dataset.state = 'idle';
    modeLabel.textContent = 'Idle Field';
    portalSub.textContent = 'Touch and hold the core to drop into a deeper layer. Release to surface.';
    touchHalo.style.opacity = '0';
    touchHalo.style.transform = 'scale(0.7)';
    if (soundOn) setSound(true);
    vibrate(15);
  }

  /* Touch handling */

  function startHold() {
    if (holdTimeout) clearTimeout(holdTimeout);
    holdTimeout = setTimeout(() => {
      enterDeep();
    }, 220); // short delay to feel intentional
  }

  function endHold() {
    if (holdTimeout) {
      clearTimeout(holdTimeout);
      holdTimeout = null;
    }
    exitDeep();
  }

  function onDown(e) {
    e.preventDefault();
    startHold();
  }

  function onUp(e) {
    e.preventDefault();
    endHold();
  }

  portalCore.addEventListener('touchstart', onDown, { passive: false });
  portalCore.addEventListener('touchend', onUp, { passive: false });
  portalCore.addEventListener('touchcancel', onUp, { passive: false });
  portalCore.addEventListener('mousedown', onDown);
  window.addEventListener('mouseup', onUp);

  /* Touch halo idle pulse */

  setTimeout(() => {
    touchHalo.classList.add('pulsing');
  }, 2600);

  /* Breath button */

  breatheButton.addEventListener('click', () => {
    breathing = !breathing;
    if (breathing) {
      breatheButton.querySelector('span.icon').textContent = '◉';
      portalSub.textContent = 'Inhale as the orb brightens, exhale as it dims. 4–6 cycles, then release.';
      startBreathLoop();
    } else {
      breatheButton.querySelector('span.icon').textContent = '◎';
      portalSub.textContent = deep
        ? 'Stay with the pulse. When you release, bring one thread back with you.'
        : 'Touch and hold the core to drop into a deeper layer. Release to surface.';
    }
    vibrate(12);
  });

  function startBreathLoop() {
    const orb = document.querySelector('.portal-orb');
    if (!orb) return;
    let t0 = null;
    const inhale = 4000;
    const exhale = 5000;
    const total = inhale + exhale;

    function loop(ts) {
      if (!breathing) {
        orb.style.transform = '';
        return;
      }
      if (!t0) t0 = ts;
      const elapsed = (ts - t0) % total;
      let phase;
      if (elapsed < inhale) {
        phase = elapsed / inhale; // 0 -> 1
      } else {
        phase = 1 - (elapsed - inhale) / exhale; // 1 -> 0
      }
      const scale = 0.96 + phase * 0.08;
      const glow = 0.7 + phase * 0.6;
      orb.style.transform = `scale(${scale})`;
      orb.style.boxShadow =
        `0 0 40px rgba(255,255,255,${glow}), 0 0 160px rgba(123,92,255,${glow})`;
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }

  /* Device tilt for subtle parallax */

  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', (e) => {
      const beta = e.beta || 0;  // front/back
      const gamma = e.gamma || 0; // left/right
      const maxTilt = 10;
      const x = Math.max(-maxTilt, Math.min(maxTilt, gamma));
      const y = Math.max(-maxTilt, Math.min(maxTilt, beta - 45));
      const shell = document.querySelector('.portal-shell');
      const intensity = 0.4;
      shell.style.transform =
        `translateY(${y * intensity}px) translateX(${x * intensity}px) scale(1)`;
    });
  }

})();
</script>
</body>
</html>
