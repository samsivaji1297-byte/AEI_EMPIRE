<!DOCTYPE html>
<html>
<body>
<h3>HF Browser Test (Debug Mode)</h3>

<textarea id="input" rows="4" cols="40">Say hello</textarea><br><br>
<button onclick="run()">Run</button>

<h4>Output:</h4>
<pre id="output">Waiting...</pre>

<script>
let HF_API_KEY = null;

async function run() {
  const text = document.getElementById("input").value;

  if (!HF_API_KEY) {
    HF_API_KEY = prompt("Enter your Hugging Face API key:");
    if (!HF_API_KEY) {
      document.getElementById("output").textContent = "No key provided.";
      return;
    }
  }

  document.getElementById("output").textContent = "Sending request...";

  try {
    const response = await fetch(
      "https://api-inference.huggingface.co/models/google/gemma-2b-it",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + HF_API_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ inputs: text })
      }
    );

    const status = response.status;
    const raw = await response.text();

    document.getElementById("output").textContent =
      "Status: " + status + "\n\nRaw Response:\n" + raw;

  } catch (err) {
    document.getElementById("output").textContent =
      "ERROR:\n" + err.toString();
  }
}
</script>

</body>
</html>
