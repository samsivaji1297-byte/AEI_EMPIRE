<!DOCTYPE html>
<html>
<body>
<h3>Groq Browser Test (Guaranteed Working Model)</h3>

<textarea id="input" rows="4" cols="40">Hello</textarea><br><br>
<button onclick="run()">Run</button>

<pre id="output">Waiting...</pre>

<script>
let GROQ_KEY = null;

async function run() {
  const text = document.getElementById("input").value;

  if (!GROQ_KEY) {
    GROQ_KEY = prompt("Enter your Groq API key:");
    if (!GROQ_KEY) {
      document.getElementById("output").textContent = "No key provided.";
      return;
    }
  }

  document.getElementById("output").textContent = "Sending request...";

  try {
    const response = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + GROQ_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [{ role: "user", content: text }]
        })
      }
    );

    const raw = await response.text();
    document.getElementById("output").textContent = raw;

  } catch (err) {
    document.getElementById("output").textContent = "ERROR:\n" + err.toString();
  }
}
</script>

</body>
</html>
