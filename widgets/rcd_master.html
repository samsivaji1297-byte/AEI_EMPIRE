<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>RCD // Master Switchboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root {
    --bg: #05060a;
    --panel: #0b0d14;
    --accent: #7f9dff;
    --accent-soft: rgba(127,157,255,0.18);
    --text: #f5f7ff;
    --text-soft: #9aa0c2;
    --border: #1a1d2b;
    --glow: 0 0 25px rgba(127,157,255,0.45);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: radial-gradient(circle at top, #15192a 0, #05060a 55%);
    font-family: var(--font);
    color: var(--text);
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  .frame {
    width:100%;
    max-width:1000px;
    height:85vh;
    border-radius:18px;
    border:1px solid var(--border);
    background:linear-gradient(145deg,#05060a,#090b12);
    box-shadow:0 0 0 1px rgba(255,255,255,0.02),0 40px 120px rgba(0,0,0,0.85);
    display:grid;
    grid-template-columns:220px 1fr;
    overflow:hidden;
    position:relative;
  }

  .sidebar {
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }

  .title {
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.14em;
    color:var(--text-soft);
  }

  .btn {
    padding:10px 14px;
    border-radius:10px;
    border:1px solid rgba(127,157,255,0.4);
    background:rgba(127,157,255,0.08);
    color:var(--text);
    font-size:13px;
    letter-spacing:0.08em;
    cursor:pointer;
    transition:0.2s;
  }

  .btn:hover {
    background:rgba(127,157,255,0.18);
    box-shadow:var(--glow);
  }

  .btn.active {
    background:rgba(127,157,255,0.35);
    border-color:rgba(127,157,255,0.9);
    box-shadow:var(--glow);
  }

  .viewer {
    position:relative;
    overflow:hidden;
  }

  iframe {
    width:100%;
    height:100%;
    border:none;
    opacity:0;
    transition:opacity 0.4s ease;
  }

  iframe.loaded {
    opacity:1;
  }
</style>
</head>
<body>

<div class="frame">

  <div class="sidebar">
    <div class="title">RCD // Switchboard</div>

    <button class="btn" id="btnLounge">Liminal Lounge</button>
    <button class="btn" id="btnDaemon">Curiosity Daemon</button>
  </div>

  <div class="viewer">
    <iframe id="viewerFrame"></iframe>
  </div>

</div>

<script>
  const frame = document.getElementById("viewerFrame");
  const btnLounge = document.getElementById("btnLounge");
  const btnDaemon = document.getElementById("btnDaemon");

  function setActive(btn) {
    btnLounge.classList.remove("active");
    btnDaemon.classList.remove("active");
    btn.classList.add("active");
  }

  function loadWidget(url, btn) {
    setActive(btn);
    frame.classList.remove("loaded");
    frame.src = url;

    frame.onload = () => {
      frame.classList.add("loaded");
      localStorage.setItem("rcd_mode", url);
    };
  }

  btnLounge.onclick = () =>
    loadWidget("rcdlounge.html", btnLounge);

  btnDaemon.onclick = () =>
    loadWidget("rcd.html", btnDaemon);

  // Restore last mode
  const last = localStorage.getItem("rcd_mode");
  if (last) {
    if (last.includes("lounge")) setActive(btnLounge);
    else setActive(btnDaemon);
    frame.src = last;
    frame.onload = () => frame.classList.add("loaded");
  } else {
    loadWidget("rcdlounge.html", btnLounge);
  }
</script>

</body>
</html>
