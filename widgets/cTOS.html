<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Dogs Noir UI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(90,120,150,.18), transparent 35%),
        radial-gradient(circle at bottom left, rgba(0,180,255,.08), transparent 30%),
        linear-gradient(135deg, #06080c, #0b1118 45%, #05070a);
      color: #e8f2ff;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .noise::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .05;
      background-image: repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,.15) 3px);
      mix-blend-mode: soft-light;
    }
    .panel {
      width: min(1000px, 92vw);
      padding: 48px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.1);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 30px 80px rgba(0,0,0,.55),
        0 0 60px rgba(70,140,190,.08);
      backdrop-filter: blur(22px) saturate(120%);
      position: relative;
    }
    .panel::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(120deg, rgba(255,255,255,.08), transparent 35%, transparent 65%, rgba(255,255,255,.03));
      pointer-events: none;
    }
    .eyebrow {
      color: #7db7da;
      letter-spacing: .3em;
      font-size: .75rem;
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: .95;
      margin-bottom: 20px;
      text-shadow: 0 0 25px rgba(120,190,255,.08);
    }
    p {
      max-width: 650px;
      color: #aebdcb;
      line-height: 1.7;
      font-size: 1.05rem;
    }
    .grid {
      margin-top: 36px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
    }
    .card {
      padding: 22px;
      border-radius: 22px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(140,200,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    .card small { color: #78b8df; display: block; margin-bottom: 10px; }
    .accent {
      position: absolute;
      width: 240px;
      height: 240px;
      right: -60px;
      top: -60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120,200,255,.18), transparent 65%);
      filter: blur(12px);
    }
  </style>
</head>
<body class="noise">
  <section class="panel">
    <div class="accent"></div>
    <div class="eyebrow">CT_OS / SECURE NODE</div>
    <h1>Cold.<br>Quiet.<br>Connected.</h1>
    <p>
      Premium matte glass, deep steel blacks, muted cyan glow, and subtle signal noise—built with that sleek Apple polish, but darker, colder, and unmistakably Watch Dogs 1.
    </p>
    <div class="grid">
      <div class="card"><small>NETWORK</small><strong>Encrypted Mesh</strong></div>
      <div class="card"><small>SIGNAL</small><strong>Low Frequency Pulse</strong></div>
      <div class="card"><small>ACCESS</small><strong>Silent Override</strong></div>
    </div>
  </section>
</body>
</html>
