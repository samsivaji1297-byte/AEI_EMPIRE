<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JARVIS Command OS v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system,system-ui;
  background:#020308;
  color:#fff;
  overflow-x:hidden;
}

.container {
  max-width:480px;
  margin:auto;
  padding:16px;
}

/* Deck */
.deck {
  background:rgba(0,0,0,0.85);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:18px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(0,0,0,0.8);
  margin-bottom:16px;
}

/* Timer */
#countdown {
  font-size:3rem;
  text-align:center;
  letter-spacing:0.15em;
}

.meta {
  text-align:center;
  opacity:0.7;
  font-size:0.8rem;
}

.bar {
  height:10px;
  border-radius:999px;
  background:#111;
  margin-top:10px;
}

.fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4fd1ff,#8bc34a,#ffeb3b,#ff5252);
}

/* Goals */
.goal {
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.goal.done {
  opacity:0.4;
  text-decoration:line-through;
}

/* Calendar */
.calendar {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.day {
  flex:1;
  text-align:center;
  padding:6px;
  font-size:0.7rem;
  border-radius:8px;
  opacity:0.6;
}

.day.active {
  background:#4fd1ff;
  color:#000;
  opacity:1;
}

/* Console */
.console {
  display:flex;
  margin-top:10px;
}

.console input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
}

</style>
</head>

<body>

<div class="container">

<!-- TIMER -->
<div class="deck">
  <div id="countdown">--:--:--</div>
  <div class="meta" id="percent">0%</div>
  <div class="bar"><div class="fill" id="progress"></div></div>
  <div class="meta" id="status">Status: --</div>
</div>

<!-- GOALS -->
<div class="deck">
  <div><strong>Goals</strong></div>
  <div id="goals"></div>
  <input id="goalInput" placeholder="Add goal...">
</div>

<!-- CALENDAR -->
<div class="deck">
  <div><strong>7-Day View</strong></div>
  <div class="calendar" id="calendar"></div>
</div>

<!-- COMMAND -->
<div class="deck">
  <div><strong>Command</strong></div>
  <div class="console">
    <input id="cmd" placeholder="Enter command...">
  </div>
  <div class="meta" id="response">Awaiting input</div>
</div>

</div>

<script>
let start=null,end=null;

/* SPEAK */
function speak(t){
  const u=new SpeechSynthesisUtterance(t);
  speechSynthesis.speak(u);
}

/* TIMER */
function loop(){
  if(start){
    let now=Date.now();
    let pct=((now-start)/(100*60*60*1000))*100;
    pct=Math.min(100,pct);

    let rem=Math.max(0,end-now);
    let s=Math.floor(rem/1000);
    let h=String(Math.floor(s/3600)).padStart(2,'0');
    let m=String(Math.floor((s%3600)/60)).padStart(2,'0');
    let sec=String(s%60).padStart(2,'0');

    countdown.textContent=`${h}:${m}:${sec}`;
    percent.textContent=pct.toFixed(1)+"%";
    progress.style.width=pct+"%";

    let state=pct>80?"FINAL PHASE":pct<20?"START STRONG":"ON TRACK";
    status.textContent=state;
  }
  requestAnimationFrame(loop);
}
loop();

/* INIT */
function init(){
  let now=Date.now();
  start=now;
  end=start+100*60*60*1000;
  localStorage.setItem("arc",start);
}
if(localStorage.getItem("arc")){
  start=parseInt(localStorage.getItem("arc"));
  end=start+100*60*60*1000;
}

/* GOALS */
let goals=JSON.parse(localStorage.getItem("goals")||"[]");

function renderGoals(){
  goalsEl.innerHTML="";
  goals.forEach((g,i)=>{
    let div=document.createElement("div");
    div.className="goal"+(g.done?" done":"");
    div.innerHTML=`<span>${g.text}</span>`;
    div.onclick=()=>{
      g.done=!g.done;
      saveGoals();
    };
    goalsEl.appendChild(div);
  });
}
function saveGoals(){
  localStorage.setItem("goals",JSON.stringify(goals));
  renderGoals();
}
goalInput.addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    goals.push({text:goalInput.value,done:false});
    goalInput.value="";
    saveGoals();
    speak("Goal added");
  }
});
const goalsEl=document.getElementById("goals");
renderGoals();

/* CALENDAR */
function renderCalendar(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";
  let today=new Date();

  for(let i=0;i<7;i++){
    let d=new Date();
    d.setDate(today.getDate()+i);

    let div=document.createElement("div");
    div.className="day";
    div.innerText=d.toLocaleDateString(undefined,{weekday:"short"});
    div.onclick=()=>div.classList.toggle("active");

    cal.appendChild(div);
  }
}
renderCalendar();

/* COMMAND */
cmd.addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    let c=cmd.value.toLowerCase();
    cmd.value="";

    if(c.includes("start")){
      init();
      response.textContent="Arc started";
      speak("Arc started");
    }

    else if(c.includes("status")){
      response.textContent=percent.textContent;
      speak("You are "+percent.textContent+" complete");
    }

    else if(c.includes("reset")){
      localStorage.clear();
      location.reload();
    }

    else if(c.includes("goal")){
      response.textContent="Type goal and press enter above";
    }

    else{
      response.textContent="Unknown command";
    }
  }
});
</script>

</body>
</html>
