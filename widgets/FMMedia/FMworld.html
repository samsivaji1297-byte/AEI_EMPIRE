<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FM Ambient Feed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #05060a;
      --overlay: rgba(0,0,0,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, "Inter", sans-serif;
      overflow-y: scroll;
      height: 100vh;
    }

    .frame {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.78) contrast(1.1);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay);
    }
  </style>
</head>

<body>

  <div id="feed"></div>

  <script>
    async function loadImages() {
      const folder = "ambient/";
      const feed = document.getElementById("feed");

      // GitHub Pages trick: fetch the folder as HTML and scrape filenames
      const res = await fetch(folder);
      const text = await res.text();

      // Match image files
      const matches = [...text.matchAll(/href="([^"]+\.(jpg|jpeg|png|webp|gif))"/gi)];
      const files = matches.map(m => m[1]);

      files.forEach(file => {
        const frame = document.createElement("div");
        frame.className = "frame";

        frame.innerHTML = `
          <img src="${folder}${file}" />
          <div class="overlay"></div>
        `;

        feed.appendChild(frame);
      });
    }

    loadImages();
  </script>

</body>
</html>
