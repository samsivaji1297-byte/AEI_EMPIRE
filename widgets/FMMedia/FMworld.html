<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FM Ambient Feed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #05060a;
      --overlay: rgba(0,0,0,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, "Inter", sans-serif;
      overflow-y: scroll;
      height: 100vh;
    }

    .frame {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.78) contrast(1.1);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay);
    }
  </style>
</head>

<body>

  <div id="feed"></div>

  <script>
    async function imageExists(url) {
      try {
        const res = await fetch(url, { method: "HEAD" });
        return res.ok;
      } catch {
        return false;
      }
    }

    async function loadImages() {
      const feed = document.getElementById("feed");
      const folder = "ambient/";

      // Try loading up to 200 images
      for (let i = 1; i <= 200; i++) {
        const url = `${folder}${i}.jpg`;

        if (await imageExists(url)) {
          const frame = document.createElement("div");
          frame.className = "frame";

          frame.innerHTML = `
            <img src="${url}" />
            <div class="overlay"></div>
          `;

          feed.appendChild(frame);
        }
      }
    }

    loadImages();
  </script>

</body>
</html>
