<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FM Presence Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #020204;
      --fg: #f5f5f5;
      --muted: #8b8f98;
      --border: #1a1b20;
      --accent: #ffffff;
      --pulse: rgba(255,255,255,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(circle at top, #151720 0, #020204 55%);
      font-family: system-ui, -apple-system, "Inter", sans-serif;
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .widget {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9 / 16;
      border-radius: 22px;
      border: 1px solid var(--border);
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.78), rgba(0,0,0,0.97)),
        radial-gradient(circle at top, #2a2d38 0, #05060a 55%);
      padding: 20px 18px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0% { box-shadow: 0 0 12px rgba(255,255,255,0.04); }
      50% { box-shadow: 0 0 26px rgba(255,255,255,0.12); }
      100% { box-shadow: 0 0 12px rgba(255,255,255,0.04); }
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.7;
      pointer-events: none;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 2px,
        transparent 2px,
        transparent 4px
      );
      animation: scan 7s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .header {
      z-index: 1;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .title-block {
      z-index: 1;
      margin-top: 14px;
    }

    .title-main {
      font-size: 20px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 0 12px rgba(255,255,255,0.18);
    }

    .title-sub {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .presence {
      z-index: 1;
      margin-top: 20px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--accent);
    }

    .presence span {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* PULSE BAR */
    .pulse-bar {
      margin-top: 14px;
      height: 6px;
      width: 100%;
      background: #0d0e12;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .pulse-fill {
      position: absolute;
      inset: 0;
      width: 0%;
      background: linear-gradient(to right, #ffffff, #8b8f98);
      animation: pulseFill 3.6s ease-in-out infinite;
    }

    @keyframes pulseFill {
      0% { width: 0%; opacity: 0.4; }
      40% { width: 100%; opacity: 1; }
      100% { width: 0%; opacity: 0.4; }
    }

    /* CENTRAL EYE */
    .eye {
      z-index: 1;
      margin-top: 30px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      margin-left: auto;
      margin-right: auto;
      position: relative;
      animation: eyePulse 4.5s ease-in-out infinite;
    }

    @keyframes eyePulse {
      0% { transform: scale(0.92); opacity: 0.6; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.92); opacity: 0.6; }
    }

    .eye::after {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      animation: eyeInner 4.5s ease-in-out infinite;
    }

    @keyframes eyeInner {
      0% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.08); opacity: 0.9; }
      100% { transform: scale(1); opacity: 0.4; }
    }

    .footer {
      z-index: 1;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 20px;
    }

    .timestamp {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
  </style>
</head>

<body>

  <div class="widget">
    <div class="grid"></div>
    <div class="scanlines"></div>

    <div class="header">
      <div>FM PRESENCE NODE</div>
      <div id="timestamp">--:--:--</div>
    </div>

    <div class="title-block">
      <div class="title-main">Sovereign Mode</div>
      <div class="title-sub">Identity engine: active</div>
    </div>

    <div class="presence">
      <span>Operational Field</span>
      FM is running in cold‑mode.  
      Output channels open.  
      Identity pressure rising.  
      Expansion cycle engaged.
    </div>

    <div class="pulse-bar">
      <div class="pulse-fill"></div>
    </div>

    <div class="eye"></div>

    <div class="footer">
      <div>Node: FM‑04</div>
      <div>Classification: Sovereign</div>
    </div>
  </div>

  <script>
    function updateTimestamp() {
      const el = document.getElementById("timestamp");
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      el.textContent = time;
    }

    setInterval(updateTimestamp, 1000);
    updateTimestamp();
  </script>

</body>
</html>
