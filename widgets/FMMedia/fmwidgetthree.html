<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FM System Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #020204;
      --fg: #f5f5f5;
      --muted: #8b8f98;
      --border: #1a1b20;
      --accent: #ffffff;
      --alert: #ff4d4d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(circle at top, #151720 0, #020204 55%);
      font-family: system-ui, -apple-system, "Inter", sans-serif;
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .widget {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9 / 16;
      border-radius: 22px;
      border: 1px solid var(--border);
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0.96)),
        radial-gradient(circle at top, #2a2d38 0, #05060a 55%);
      padding: 18px 16px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0% { box-shadow: 0 0 12px rgba(255,255,255,0.04); }
      50% { box-shadow: 0 0 22px rgba(255,255,255,0.09); }
      100% { box-shadow: 0 0 12px rgba(255,255,255,0.04); }
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.7;
      pointer-events: none;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 2px,
        transparent 2px,
        transparent 4px
      );
      animation: scan 6s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 1;
    }

    .pill {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }

    .pill--alert {
      border-color: var(--alert);
      color: var(--alert);
    }

    .title {
      z-index: 1;
      margin-top: 12px;
    }

    .title-main {
      font-size: 18px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .title-sub {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .body {
      z-index: 1;
      margin-top: 18px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--accent);
      max-width: 90%;
    }

    .body span {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .footer {
      z-index: 1;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .timestamp {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
  </style>
</head>

<body>

  <div class="widget">
    <div class="grid"></div>
    <div class="scanlines"></div>

    <div class="header">
      <div class="pill">FM SYSTEM NODE</div>
      <div class="pill pill--alert">LIVE FEED</div>
    </div>

    <div class="title">
      <div class="title-main">Cold Operations</div>
      <div class="title-sub">Industrial broadcast organism</div>
    </div>

    <div class="body">
      <span>Operational Field</span>
      FM Media Enterprises is running in cold‑mode:  
      clinical, hostile, non‑human.  
      Output is continuous.  
      Drift is impossible.  
      Expansion is inevitable.
    </div>

    <div class="footer">
      <div class="stack">
        <div>System Status</div>
        <div class="timestamp" id="timestamp">--:--:--</div>
      </div>
      <div class="stack" style="align-items:flex-end;">
        <div>Node: FM‑03</div>
        <div>Classification: Active</div>
      </div>
    </div>
  </div>

  <script>
    function updateTimestamp() {
      const el = document.getElementById("timestamp");
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const date = now.toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' });
      el.textContent = `${date} • ${time}`;
    }

    setInterval(updateTimestamp, 1000);
    updateTimestamp();
  </script>

</body>
</html>
