<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ghost Rail</title>

<style>
  :root {
    --bg: #05070f;
    --rail: #4fd5ff;
    --rail2: #1b9fff;
    --glow: rgba(79, 213, 255, 0.55);
    --hud: #7cf7ff;
    --accent: #ff4b6a;
  }

  body {
    margin: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: system-ui, sans-serif;
  }

  .rail {
    position: relative;
    width: min(900px, 95vw);
    height: min(520px, 70vh);
    border-radius: 16px;
    overflow: hidden;
    background: #02040a;
    box-shadow:
      0 0 0 1px rgba(124, 247, 255, 0.12),
      0 20px 60px rgba(0, 0, 0, 0.8);
  }

  /* Grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(124, 247, 255, 0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(124, 247, 255, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.25;
    mix-blend-mode: screen;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  .main {
    fill: none;
    stroke: var(--rail);
    stroke-width: 2.2;
    stroke-linecap: round;
    filter: drop-shadow(0 0 8px var(--glow));
  }

  .sec {
    fill: none;
    stroke: var(--rail2);
    stroke-width: 1.4;
    stroke-linecap: round;
    opacity: 0.8;
    filter: drop-shadow(0 0 6px var(--glow));
  }

  .dash {
    fill: none;
    stroke: rgba(124, 247, 255, 0.7);
    stroke-width: 1.2;
    stroke-dasharray: 4 6;
    opacity: 0.7;
  }

  .node {
    fill: var(--hud);
    filter: drop-shadow(0 0 6px var(--glow));
    animation: pulse 3s ease-in-out infinite;
  }

  .node.accent {
    fill: var(--accent);
    filter: drop-shadow(0 0 10px rgba(255, 75, 106, 0.9));
    animation: pulse-strong 2.4s ease-in-out infinite;
  }

  .train {
    fill: #fff;
    filter: drop-shadow(0 0 8px #fff);
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: .8; }
    50% { transform: scale(1.4); opacity: 1; }
  }

  @keyframes pulse-strong {
    0%,100% { transform: scale(1); opacity: .9; }
    50% { transform: scale(1.6); opacity: 1; }
  }

  @keyframes move {
    0% { offset-distance: 0%; }
    100% { offset-distance: 100%; }
  }

  .train {
    offset-path: path("M 0 220 C 120 180 220 260 340 220 C 460 180 560 260 700 220");
    offset-rotate: auto;
    animation: move 9s linear infinite;
  }

  /* HUD */
  .hud {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 200px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(124, 247, 255, 0.35);
    background: rgba(5, 8, 18, 0.7);
    backdrop-filter: blur(8px);
    color: #bcd2ff;
    font-size: 11px;
  }

  .hud h1 {
    margin: 0 0 6px;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--hud);
    text-transform: uppercase;
  }

  .hud-row {
    display: flex;
    justify-content: space-between;
    margin-top: 2px;
  }

  .hud-row span:last-child {
    color: #fff;
  }
</style>
</head>

<body>
<div class="rail">
  <div class="grid"></div>

  <div class="hud">
    <h1>Nexus Junction</h1>
    <div class="hud-row"><span>Track</span><span>21‑E</span></div>
    <div class="hud-row"><span>Load</span><span>68%</span></div>
    <div class="hud-row"><span>Latency</span><span>05:42:36</span></div>
  </div>

  <svg viewBox="0 0 720 320">
    <path class="main" d="M 0 220 C 120 180 220 260 340 220 C 460 180 560 260 720 220" />
    <path class="main" d="M 0 260 C 140 300 260 220 380 260 C 520 300 600 220 720 260" />
    <path class="main" d="M 0 180 C 120 140 260 140 380 180 C 520 220 620 140 720 180" />

    <path class="sec" d="M 40 300 C 120 260 200 220 260 180 C 320 140 420 120 520 110 C 620 100 680 80 720 60" />
    <path class="sec" d="M 0 80 C 80 100 160 140 220 190 C 280 240 360 260 440 250 C 520 240 620 220 720 200" />

    <path class="dash" d="M 60 300 C 160 260 260 260 340 240 C 420 220 520 220 640 200" />

    <circle class="node" cx="340" cy="220" r="4" />
    <circle class="node" cx="380" cy="180" r="4" />
    <circle class="node accent" cx="260" cy="180" r="5" />

    <circle class="train" r="5" />
  </svg>
</div>
</body>
</html>
