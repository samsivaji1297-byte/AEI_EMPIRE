<!DOCTYPE html>
<html>
<body style="background:#000;display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif;">
<button id="start" style="padding:20px 40px;font-size:20px;background:#111;border:1px solid #444;color:#fff;">
Start Ambient Field
</button>

<script>
document.getElementById("start").onclick = () => {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  // --- Warm Brown Noise Generator ---
  function brownNoise() {
    const bufferSize = 4096;
    let lastOut = 0.0;
    const node = ctx.createScriptProcessor(bufferSize, 1, 1);
    node.onaudioprocess = e => {
      const output = e.outputBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        const white = Math.random() * 2 - 1;
        lastOut = (lastOut + 0.02 * white) / 1.02;
        output[i] = lastOut * 0.3; // volume
      }
    };
    return node;
  }

  // --- Noise Source ---
  const noise = brownNoise();

  // --- Filter for softness ---
  const filter = ctx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 400; // warm, soft

  // --- Slow LFO to move the filter (emotional swell) ---
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.frequency.value = 0.05; // very slow movement
  lfoGain.gain.value = 200;   // modulation depth

  lfo.connect(lfoGain);
  lfoGain.connect(filter.frequency);

  // --- Output gain ---
  const gain = ctx.createGain();
  gain.gain.value = 0.4;

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  lfo.start();
  noise.connect(ctx.destination);
};
</script>
</body>
</html>
