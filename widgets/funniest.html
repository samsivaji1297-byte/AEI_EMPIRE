<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 0;
  background: #0a0a0a;
  font-family: "SF Mono", "Consolas", monospace;
  color: #d0d0d0;
  text-align: center;
  overflow-x: hidden;
}

/* --- Industrial Noise Overlay --- */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.08;
  z-index: 5;
}

/* --- Orb --- */
#orb {
  width: 150px;
  height: 150px;
  margin: 60px auto 30px auto;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #444 0%, #111 60%, #000 100%);
  box-shadow:
    0 0 20px rgba(255,255,255,0.05),
    inset 0 0 40px rgba(255,255,255,0.08);
  animation: mechPulse 3.8s infinite ease-in-out;
  position: relative;
}

@keyframes mechPulse {
  0% { transform: scale(1); box-shadow: inset 0 0 40px rgba(255,255,255,0.08); }
  50% { transform: scale(1.05); box-shadow: inset 0 0 60px rgba(255,255,255,0.15); }
  100% { transform: scale(1); box-shadow: inset 0 0 40px rgba(255,255,255,0.08); }
}

/* --- Input --- */
textarea {
  width: 85%;
  max-width: 500px;
  height: 90px;
  background: #111;
  border: 1px solid #333;
  color: #d0d0d0;
  padding: 12px;
  font-size: 15px;
  border-radius: 6px;
  outline: none;
}

/* --- Button --- */
button {
  margin-top: 18px;
  padding: 12px 28px;
  background: linear-gradient(90deg, #222, #444);
  border: none;
  color: #d0d0d0;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

/* --- Output --- */
#output {
  margin: 30px auto;
  width: 85%;
  max-width: 500px;
  background: #111;
  border: 1px solid #333;
  padding: 15px;
  border-radius: 6px;
  white-space: pre-wrap;
  text-align: left;
  min-height: 80px;
  color: #d0d0d0;
}
</style>
</head>

<body>

<div id="orb"></div>

<textarea id="input">Hello Jarvis</textarea><br>
<button onclick="run()">Send</button>

<pre id="output">Awaiting input...</pre>

<script>
let GROQ_KEY = null;

/* --- Fake Typing Animation --- */
function typeText(element, text, speed = 18) {
  element.textContent = "";
  let i = 0;
  function type() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      setTimeout(type, speed);
    }
  }
  type();
}

/* --- Voice Output (Industrial Female) --- */
function speak(text) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.9;
  utter.pitch = 0.7;
  utter.volume = 0.9;

  // Try to pick a female voice if available
  const voices = speechSynthesis.getVoices();
  const female = voices.find(v =>
    v.name.toLowerCase().includes("samantha") ||
    v.name.toLowerCase().includes("female") ||
    v.name.toLowerCase().includes("victoria")
  );

  if (female) utter.voice = female;

  speechSynthesis.speak(utter);
}

async function run() {
  const text = document.getElementById("input").value;

  if (!GROQ_KEY) {
    GROQ_KEY = prompt("Enter your Groq API key:");
    if (!GROQ_KEY) {
      document.getElementById("output").textContent = "No key provided.";
      return;
    }
  }

  document.getElementById("output").textContent = "Processing...";

  try {
    const response = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + GROQ_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [{ role: "user", content: text }]
        })
      }
    );

    const data = await response.json();
    const msg = data.choices?.[0]?.message?.content || "No response.";

    const output = document.getElementById("output");
    typeText(output, msg);   // Fake typing animation
    speak(msg);              // Voice output

  } catch (err) {
    document.getElementById("output").textContent = "ERROR:\n" + err.toString();
  }
}
</script>

</body>
</html>
