<!DOCTYPE html>
<html>
<head>
<style>
body {
  background: #0a0a0a;
  color: #00eaff;
  font-family: monospace;
  text-align: center;
  padding-top: 60px;
}

#orb {
  width: 140px;
  height: 140px;
  margin: 0 auto 30px auto;
  border-radius: 50%;
  background: radial-gradient(circle, #00eaff 0%, #003b47 70%, #001417 100%);
  box-shadow: 0 0 25px #00eaff;
  animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 25px #00eaff; }
  50% { transform: scale(1.08); box-shadow: 0 0 45px #00eaff; }
  100% { transform: scale(1); box-shadow: 0 0 25px #00eaff; }
}

textarea {
  width: 80%;
  height: 80px;
  background: #0f0f0f;
  border: 1px solid #00eaff;
  color: #00eaff;
  padding: 10px;
  font-family: monospace;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  background: #00eaff;
  border: none;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

#output {
  margin-top: 25px;
  white-space: pre-wrap;
  color: #00eaff;
  padding: 10px;
}
</style>
</head>

<body>

<div id="orb"></div>

<textarea id="input">Hello Jarvis</textarea><br>
<button onclick="run()">Send</button>

<pre id="output">Awaiting input...</pre>

<script>
let GROQ_KEY = null;

async function run() {
  const text = document.getElementById("input").value;

  if (!GROQ_KEY) {
    GROQ_KEY = prompt("Enter your Groq API key:");
    if (!GROQ_KEY) {
      document.getElementById("output").textContent = "No key provided.";
      return;
    }
  }

  document.getElementById("output").textContent = "Processing...";

  try {
    const response = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + GROQ_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [{ role: "user", content: text }]
        })
      }
    );

    const data = await response.json();
    const msg = data.choices?.[0]?.message?.content || "No response.";

    document.getElementById("output").textContent = msg;

  } catch (err) {
    document.getElementById("output").textContent = "ERROR:\n" + err.toString();
  }
}
</script>

</body>
</html>
