<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 0;
  background: #050505;
  font-family: "SF Mono", "Consolas", monospace;
  color: #00eaff;
  text-align: center;
  overflow-x: hidden;
}

/* --- Industrial Scanlines Overlay --- */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
  opacity: 0.15;
  z-index: 5;
}

/* --- Orb Container --- */
#orb {
  width: 160px;
  height: 160px;
  margin: 60px auto 30px auto;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #00eaff 0%, #003b47 40%, #000 100%);
  box-shadow:
    0 0 40px rgba(0, 234, 255, 0.7),
    inset 0 0 30px rgba(0, 234, 255, 0.4);
  animation: pulse 3.5s infinite ease-in-out;
  position: relative;
}

/* --- Orb Inner Glow --- */
#orb::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,234,255,0.4), transparent 70%);
  filter: blur(20px);
  animation: innerPulse 4s infinite ease-in-out;
}

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 40px rgba(0,234,255,0.7); }
  50% { transform: scale(1.08); box-shadow: 0 0 70px rgba(0,234,255,1); }
  100% { transform: scale(1); box-shadow: 0 0 40px rgba(0,234,255,0.7); }
}

@keyframes innerPulse {
  0% { opacity: 0.4; }
  50% { opacity: 0.8; }
  100% { opacity: 0.4; }
}

/* --- Input Area --- */
textarea {
  width: 85%;
  max-width: 500px;
  height: 90px;
  background: #0a0a0a;
  border: 1px solid #003b47;
  color: #00eaff;
  padding: 12px;
  font-size: 15px;
  border-radius: 6px;
  outline: none;
  box-shadow: 0 0 10px rgba(0,234,255,0.2);
}

/* --- Button --- */
button {
  margin-top: 18px;
  padding: 12px 28px;
  background: linear-gradient(90deg, #003b47, #00eaff);
  border: none;
  color: #000;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  box-shadow: 0 0 15px rgba(0,234,255,0.4);
}

/* --- Output Window --- */
#output {
  margin: 30px auto;
  width: 85%;
  max-width: 500px;
  background: #0a0a0a;
  border: 1px solid #003b47;
  padding: 15px;
  border-radius: 6px;
  white-space: pre-wrap;
  text-align: left;
  box-shadow: inset 0 0 20px rgba(0,234,255,0.15);
  min-height: 80px;
}
</style>
</head>

<body>

<div id="orb"></div>

<textarea id="input">Hello Jarvis</textarea><br>
<button onclick="run()">Send</button>

<pre id="output">Awaiting input...</pre>

<script>
let GROQ_KEY = null;

async function run() {
  const text = document.getElementById("input").value;

  if (!GROQ_KEY) {
    GROQ_KEY = prompt("Enter your Groq API key:");
    if (!GROQ_KEY) {
      document.getElementById("output").textContent = "No key provided.";
      return;
    }
  }

  document.getElementById("output").textContent = "Processing...";

  try {
    const response = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + GROQ_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [{ role: "user", content: text }]
        })
      }
    );

    const data = await response.json();
    const msg = data.choices?.[0]?.message?.content || "No response.";

    document.getElementById("output").textContent = msg;

  } catch (err) {
    document.getElementById("output").textContent = "ERROR:\n" + err.toString();
  }
}
</script>

</body>
</html>
