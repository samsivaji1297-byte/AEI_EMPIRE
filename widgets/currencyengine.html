<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remove The Drag • Reel Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root {
    --bg: #020307;
    --accent: #f5ff7a;
    --accent-soft: rgba(245,255,122,0.12);
    --text: #f7f7f7;
    --soft: #9a9fb3;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: radial-gradient(circle at top, #15192b 0%, #020307 60%, #000 100%);
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, Inter, sans-serif;
    color: var(--text);
  }

  .container {
    text-align: center;
    padding: 20px;
    width: 100%;
    max-width: 420px;
    animation: fadeIn 1.4s ease-out forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tag {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--soft);
    margin-bottom: 14px;
    opacity: 0.7;
  }

  .main {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 18px;
    background: linear-gradient(120deg, #f5ff7a, #ffb36a, #ff4b6a);
    -webkit-background-clip: text;
    color: transparent;
    animation: glow 3s ease-in-out infinite;
  }

  @keyframes glow {
    0% { filter: drop-shadow(0 0 0px rgba(245,255,122,0.2)); }
    50% { filter: drop-shadow(0 0 12px rgba(245,255,122,0.35)); }
    100% { filter: drop-shadow(0 0 0px rgba(245,255,122,0.2)); }
  }

  .sub {
    font-size: 14px;
    color: var(--soft);
    line-height: 1.45;
    max-width: 320px;
    margin: 0 auto;
    opacity: 0.85;
  }

  .cta {
    margin-top: 26px;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.04em;
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.6; }
  }
</style>
</head>

<body>
  <div class="container">
    <div class="tag">SYSTEM • DRAG REMOVAL</div>

    <div class="main">Remove the drag.</div>

    <div class="sub">
      You felt the friction in the reel.  
      This is where the shift begins.
    </div>

    <div class="cta">
      If you felt the drag, the fix is in my bio.
    </div>
  </div>
</body>
</html>
