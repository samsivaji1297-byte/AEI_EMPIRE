<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Root Node Engine — Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #050509;
      --fg: #f5f5f7;
      --muted: #8b8b93;
      --accent: #f5f0ff;
      --pill-bg: rgba(255, 255, 255, 0.06);
      --cta-bg: #ffffff;
      --cta-fg: #000000;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --radius-lg: 22px;
      --radius-pill: 999px;
      --shadow-soft: 0 18px 60px rgba(0, 0, 0, 0.65);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Inter", sans-serif;
      background: radial-gradient(circle at top, #151520 0, #050509 55%, #000 100%);
      color: var(--fg);
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    /* Bottom sheet UI */
    .sheet {
      width: 100%;
      max-width: 480px;
      background: rgba(5, 5, 9, 0.96);
      border-radius: 24px 24px 0 0;
      border-top: 1px solid var(--border-subtle);
      box-shadow: 0 -18px 60px rgba(0, 0, 0, 0.85);
      padding: 16px 18px 22px;
      backdrop-filter: blur(26px);
    }

    .sheet-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .sheet-handle {
      width: 44px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      margin: 0 auto 10px;
    }

    .sheet-title {
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sheet-main-title {
      font-size: 18px;
      font-weight: 600;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    .wrapper-input {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border-subtle);
      background: rgba(10, 10, 16, 0.96);
      color: var(--fg);
      padding: 10px 12px;
      font-size: 14px;
      resize: none;
      min-height: 52px;
    }

    .controls-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .select {
      flex: 1;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      background: rgba(10, 10, 16, 0.96);
      color: var(--fg);
      padding: 8px 12px;
      font-size: 13px;
    }

    .generate-btn {
      flex-shrink: 0;
      border-radius: 999px;
      border: none;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      background: #ffffff;
      color: #000000;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.65);
    }

    .generate-btn:active {
      transform: translateY(1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
    }

    /* Full-screen viewer */
    .viewer {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #151520 0, #050509 55%, #000 100%);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      touch-action: manipulation;
    }

    .viewer.visible {
      display: flex;
    }

    .slide-frame {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9 / 16;
      border-radius: 32px;
      background: radial-gradient(circle at top, #1b1b28 0, #050509 60%, #000 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: var(--shadow-soft);
      padding: 22px 20px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      transform: translateY(40px);
      opacity: 0;
      transition: transform 260ms ease-out, opacity 260ms ease-out;
    }

    .slide-frame.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .rn-title {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 14px;
    }

    .rn-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
    }

    .rn-list-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .rn-list-item-bullet {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #ffffff;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .rn-list-item-text {
      flex: 1;
    }

    .rn-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .rn-cta {
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      background: var(--cta-bg);
      color: var(--cta-fg);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .rn-bio-pill {
      padding: 7px 12px;
      border-radius: var(--radius-pill);
      background: var(--pill-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 11px;
      color: var(--muted);
    }

    .viewer-hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">Root Node Engine</div>
      <div class="sheet-main-title">Generate IG‑ready content</div>
    </div>

    <div class="field-group">
      <div class="field-label">Wrapper</div>
      <textarea
        id="wrapperInput"
        class="wrapper-input"
        placeholder="e.g. 5 signs your identity is outdated."
      ></textarea>
    </div>

    <div class="controls-row">
      <select id="formatSelect" class="select">
        <option value="auto">Auto format (wrapper‑aware)</option>
        <option value="listicle">Force listicle</option>
        <option value="carousel">Force carousel</option>
      </select>
      <button id="generateBtn" class="generate-btn">Generate</button>
    </div>

    <div class="hint">
      <span>Use numbers in wrapper to trigger listicles.</span>
      <span>Tap slide to advance · two fingers to exit.</span>
    </div>
  </div>

  <!-- Full-screen viewer -->
  <div id="viewer" class="viewer">
    <div id="slideFrame" class="slide-frame">
      <div>
        <div id="slideTitle" class="rn-title"></div>
        <ul id="slideList" class="rn-list"></ul>
      </div>
      <div class="rn-footer">
        <div id="slideCta" class="rn-cta"></div>
        <div id="slideBio" class="rn-bio-pill"></div>
      </div>
      <div class="viewer-hint">Tap to advance · Two fingers to exit</div>
    </div>
  </div>

  <script type="module">
    import { generateIR } from "./RootNodeEngine/ContentEngine/IR/generateIR.js";
    import { renderContent } from "./RootNodeEngine/Renderers/rendererPipeline.js";

    const viewerEl = document.getElementById("viewer");
    const slideFrameEl = document.getElementById("slideFrame");
    const titleEl = document.getElementById("slideTitle");
    const listEl = document.getElementById("slideList");
    const ctaEl = document.getElementById("slideCta");
    const bioEl = document.getElementById("slideBio");

    const wrapperInput = document.getElementById("wrapperInput");
    const formatSelect = document.getElementById("formatSelect");
    const generateBtn = document.getElementById("generateBtn");

    let currentSlides = [];
    let currentIndex = 0;

    function openViewer(slides) {
      currentSlides = slides || [];
      currentIndex = 0;
      if (!currentSlides.length) return;

      renderSlide(currentSlides[currentIndex]);

      viewerEl.classList.add("visible");
      requestAnimationFrame(() => {
        slideFrameEl.classList.add("visible");
      });
    }

    function closeViewer() {
      slideFrameEl.classList.remove("visible");
      setTimeout(() => {
        viewerEl.classList.remove("visible");
      }, 200);
    }

    function renderSlide(slide) {
      titleEl.textContent = slide.title || "";

      listEl.innerHTML = "";
      if (Array.isArray(slide.items)) {
        slide.items.forEach((item) => {
          const li = document.createElement("li");
          li.className = "rn-list-item";

          const dot = document.createElement("div");
          dot.className = "rn-list-item-bullet";

          const text = document.createElement("div");
          text.className = "rn-list-item-text";
          text.textContent = item;

          li.appendChild(dot);
          li.appendChild(text);
          listEl.appendChild(li);
        });
      }

      ctaEl.textContent = slide.cta || "";
      bioEl.textContent = slide.bio || "";
      bioEl.style.display = slide.bio ? "inline-flex" : "none";
    }

    function nextSlide() {
      if (!currentSlides.length) return;
      if (currentIndex < currentSlides.length - 1) {
        currentIndex += 1;
        slideFrameEl.classList.remove("visible");
        setTimeout(() => {
          renderSlide(currentSlides[currentIndex]);
          requestAnimationFrame(() => {
            slideFrameEl.classList.add("visible");
          });
        }, 160);
      } else {
        closeViewer();
      }
    }

    // Tap handling: 1 finger → next, 2 fingers → exit
    viewerEl.addEventListener("pointerdown", (e) => {
      if (e.pointerType !== "touch" && e.pointerType !== "pen") {
        nextSlide();
        return;
      }
    });

    let activeTouches = new Set();

    viewerEl.addEventListener("touchstart", (e) => {
      for (const t of e.touches) activeTouches.add(t.identifier);
      if (activeTouches.size >= 2) {
        activeTouches.clear();
        closeViewer();
      }
    });

    viewerEl.addEventListener("touchend", (e) => {
      for (const t of e.changedTouches) activeTouches.delete(t.identifier);
    });

    // Generate button wiring
    generateBtn.addEventListener("click", () => {
      const wrapper = (wrapperInput.value || "").trim();
      if (!wrapper) {
        wrapperInput.focus();
        return;
      }

      const ir = generateIR();

      // Let pipeline decide mode, but allow override from dropdown
      let output = renderContent({ wrapper, ir });

      const forced = formatSelect.value;
      if (forced === "listicle" && output.type !== "listicle") {
        // crude override: treat as listicle with default count 5
        const { interpretWrapper } = await import(
          "./RootNodeEngine/Renderers/Listicle/wrapperInterpreter.js"
        );
        const { generateListicleItems } = await import(
          "./RootNodeEngine/Renderers/Listicle/listicleGenerator.js"
        );
        const { renderListicle } = await import(
          "./RootNodeEngine/Renderers/Listicle/listicleRenderer.js"
        );

        const interp = interpretWrapper(wrapper);
        const count = interp.count || 5;
        const title = interp.title || wrapper;
        const items = generateListicleItems(ir, count, title);
        output = renderListicle({
          title,
          items,
          cta: "Follow for daily identity upgrades",
          bio: "@yourhandle"
        });
      }

      if (forced === "carousel" && output.type !== "carousel") {
        const { renderCarousel } = await import(
          "./RootNodeEngine/Renderers/Carousel/carouselRenderer.js"
        );
        output = renderCarousel(ir);
      }

      openViewer(output.slides);
    });
  </script>
</body>
</html>
