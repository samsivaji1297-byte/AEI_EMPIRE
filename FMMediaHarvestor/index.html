<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FMMedia Harvestor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #controlPanel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            display: none;
            max-width: 320px;
        }

        #togglePanel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #222;
            padding: 12px 18px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
        }

        select, button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: #fff;
        }

        #outputPanel {
            margin: 20px;
            padding: 20px;
            background: #181818;
            border-radius: 16px;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }
    </style>
</head>

<body>

    <div id="togglePanel">Open Engine</div>

    <div id="controlPanel"></div>

    <div id="outputPanel"></div>

    <script type="module">
        import { generateIR } from "./RootNodeEngine/ContentEngine/IR/generateIR.js";

        const toggle = document.getElementById("togglePanel");
        const panel = document.getElementById("controlPanel");

        toggle.onclick = () => {
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        };

        async function loadArchitecture() {
            const res = await fetch("./RootNodeHarvestor/architectureMap.json");
            return await res.json();
        }

        async function loadJSON(path) {
            const res = await fetch(path);
            return await res.json();
        }

        function createDropdown(label, id, options) {
            const container = document.createElement("div");

            const select = document.createElement("select");
            select.id = id;

            options.forEach(opt => {
                const option = document.createElement("option");
                option.value = opt;
                option.textContent = opt;
                select.appendChild(option);
            });

            container.appendChild(select);
            return container;
        }

        async function initUI() {
            const panel = document.getElementById("controlPanel");
            const architecture = await loadArchitecture();

            const dataMap = {
                baseNeeds: await loadJSON("./RootNodeHarvestor/baseNeeds/baseNeeds.json"),
                rootNodes: await loadJSON("./RootNodeHarvestor/rootNodes/rootNodes.json"),
                psychologicalClusters: await loadJSON("./RootNodeHarvestor/clusters/clusters.json"),
                identityMechanics: await loadJSON("./RootNodeHarvestor/identityMechanics/identityMechanics.json"),

                surfaceOverlays: await loadJSON("./RootNodeEngine/overlays/overlays.json"),
                wrappers: await loadJSON("./RootNodeEngine/wrappers/wrappers.json"),
                formats: await loadJSON("./RootNodeEngine/formats/formats.json"),
                distributionPhysics: await loadJSON("./RootNodeEngine/distributionPhysics/distributionPhysics.json")
            };

            architecture.order.forEach(layer => {
                const dropdown = createDropdown(layer, layer, dataMap[layer]);
                panel.appendChild(dropdown);
            });

            const generateBtn = document.createElement("button");
            generateBtn.textContent = "Generate IR";
            generateBtn.onclick = () => {
                const selections = {};

                architecture.order.forEach(layer => {
                    const el = document.getElementById(layer);
                    selections[layer] = el.value;
                });

                const ir = generateIR({
                    baseNeed: selections.baseNeeds,
                    rootNode: selections.rootNodes,
                    psychologicalCluster: selections.psychologicalClusters,
                    surfaceOverlay: selections.surfaceOverlays,
                    wrapper: selections.wrappers,
                    format: { type: selections.formats },
                    identityMechanic: selections.identityMechanics,
                    distributionPhysics: { platform: selections.distributionPhysics }
                });

                const outputPanel = document.getElementById("outputPanel");
                outputPanel.style.display = "block";
                outputPanel.textContent = JSON.stringify(ir, null, 2);
            };

            panel.appendChild(generateBtn);
        }

        initUI();
    </script>

</body>
</html>
