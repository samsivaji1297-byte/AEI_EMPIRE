<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Root Node Engine — Minimal Sovereign Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #888;
      --accent: #fff;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "SF Pro Display", "Segoe UI", sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .ambient {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.06), transparent 70%);
      animation: pulse 7s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes pulse {
      0% { opacity: 0.18; transform: scale(1); }
      100% { opacity: 0.32; transform: scale(1.08); }
    }

    #slide-viewer {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6vh 6vw;
      cursor: pointer;
      z-index: 1;
    }

    .inner {
      max-width: 720px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4vh;
    }

    .title {
      font-size: min(6vw, 26px);
      font-weight: 500;
      line-height: 1.3;
      color: var(--accent);
      min-height: 10vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 1.4vh;
      min-height: 18vh;
      justify-content: center;
    }

    .item {
      font-size: min(4.5vw, 18px);
      color: var(--fg);
      line-height: 1.35;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .item-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #fff;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
    }

    .cta {
      margin-top: 2vh;
      font-size: min(4.8vw, 20px);
      font-weight: 500;
      color: var(--accent);
    }

    .bio-center {
      margin-top: 2vh;
      display: flex;
      justify-content: center;
    }

    .bio-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.4em 1em;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      font-size: min(3.4vw, 13px);
      color: var(--fg);
    }

    .bio-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #fff;
    }

    .hint {
      position: absolute;
      bottom: 3vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="ambient"></div>

  <div id="slide-viewer">
    <div class="frame">
      <div class="inner">
        <div id="slide-title" class="title"></div>
        <div id="slide-list" class="list"></div>
        <div id="slide-cta" class="cta"></div>

        <div class="bio-center">
          <div id="slide-bio" class="bio-pill">
            <div class="bio-dot"></div>
            <span id="slide-bio-text"></span>
          </div>
        </div>
      </div>
      <div class="hint">TAP ANYWHERE TO EXIT</div>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById("slide-title");
    const listEl = document.getElementById("slide-list");
    const ctaEl = document.getElementById("slide-cta");
    const bioEl = document.getElementById("slide-bio");
    const bioTextEl = document.getElementById("slide-bio-text");
    const viewer = document.getElementById("slide-viewer");

    function generateMockIR() {
      return {
        identityMechanics: [
          "You still define yourself by old failures instead of current capabilities.",
          "You delay decisions because you’re afraid of invalidating a past version of you.",
          "You keep repeating behaviours that no longer match the rooms you want to be in.",
          "You optimise for being understood by your past circle instead of your future one.",
          "You treat your current constraints as permanent instead of negotiable."
        ]
      };
    }

    function generateListicleFromIR(ir, count, title) {
      const pool = (ir.identityMechanics || []).slice(0, count);
      if (!pool.length) {
        return Array.from({ length: count }, (_, i) => `Signal ${i + 1} that your identity is outdated.`);
      }
      return pool;
    }

    function renderSlide({ title, items, cta, bio }) {
      titleEl.textContent = title;

      listEl.innerHTML = "";
      items.forEach(item => {
        const row = document.createElement("div");
        row.className = "item";

        const dot = document.createElement("div");
        dot.className = "item-dot";

        const text = document.createElement("div");
        text.className = "item-text";
        text.textContent = item;

        row.appendChild(dot);
        row.appendChild(text);
        listEl.appendChild(row);
      });

      ctaEl.textContent = cta || "";
      bioTextEl.textContent = bio || "";
      bioEl.style.display = bio ? "inline-flex" : "none";
    }

    function bootstrap() {
      const ir = generateMockIR();
      const wrapperTitle = "5 signs your identity is outdated";
      const count = 5;

      const items = generateListicleFromIR(ir, count, wrapperTitle);
      const slide = {
        title: wrapperTitle,
        items,
        cta: "Follow for daily identity upgrades",
        bio: "@yourhandle"
      };

      renderSlide(slide);
    }

    viewer.addEventListener("click", () => {
      viewer.style.display = "none";
    });

    window.addEventListener("load", bootstrap);
  </script>
</body>
</html>
