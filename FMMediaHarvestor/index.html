<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FMMedia Harvestor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #controlPanel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            display: none;
        }

        #togglePanel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #222;
            padding: 12px 18px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
        }

        select, button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: #fff;
        }
    </style>
</head>

<body>

    <div id="togglePanel">Open Engine</div>

    <div id="controlPanel"></div>

    <script type="module">
        import { generateIR } from "./RootNodeEngine/ContentEngine/IR/generateIR.js";

        const toggle = document.getElementById("togglePanel");
        const panel = document.getElementById("controlPanel");

        toggle.onclick = () => {
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        };

        // Load architecture map
async function loadArchitecture() {
    const res = await fetch("./RootNodeHarvestor/architectureMap.json");
    return await res.json();
}

// Create dropdown
function createDropdown(label, id, options) {
    const container = document.createElement("div");

    const select = document.createElement("select");
    select.id = id;

    options.forEach(opt => {
        const option = document.createElement("option");
        option.value = opt;
        option.textContent = opt;
        select.appendChild(option);
    });

    container.appendChild(select);
    return container;
}

// Inject UI
async function initUI() {
    const panel = document.getElementById("controlPanel");
    const architecture = await loadArchitecture();

    architecture.order.forEach(layer => {
        const dropdown = createDropdown(layer, layer, []);
        panel.appendChild(dropdown);
    });

    const generateBtn = document.createElement("button");
    generateBtn.textContent = "Generate IR";
    generateBtn.onclick = () => {
        const selections = {};

        architecture.order.forEach(layer => {
            const el = document.getElementById(layer);
            selections[layer] = el.value;
        });

        const ir = generateIR({
            baseNeed: selections.baseNeeds,
            rootNode: selections.rootNodes,
            psychologicalCluster: selections.psychologicalClusters,
            surfaceOverlay: selections.surfaceOverlays,
            wrapper: selections.wrappers,
            format: { type: selections.formats },
            identityMechanic: selections.identityMechanics,
            distributionPhysics: { platform: selections.distributionPhysics }
        });

        console.log("IR Output:", ir);
    };

    panel.appendChild(generateBtn);
}

initUI();

    </script>

</body>
</html>
