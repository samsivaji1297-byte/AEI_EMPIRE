<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Root Node Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #888;
      --accent: #fff;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "SF Pro Display", "Segoe UI", sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Ambient + slide viewer */

    .ambient {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.06), transparent 70%);
      animation: pulse 7s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes pulse {
      0% { opacity: 0.18; transform: scale(1); }
      100% { opacity: 0.32; transform: scale(1.08); }
    }

    #slide-viewer {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6vh 6vw;
      cursor: pointer;
      z-index: 1;
    }

    .inner {
      max-width: 720px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4vh;
    }

    .title {
      font-size: min(6vw, 26px);
      font-weight: 500;
      line-height: 1.3;
      color: var(--accent);
      min-height: 10vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 1.4vh;
      min-height: 18vh;
      justify-content: center;
    }

    .item {
      font-size: min(4.5vw, 18px);
      color: var(--fg);
      line-height: 1.35;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .item-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #fff;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
    }

    .cta {
      margin-top: 2vh;
      font-size: min(4.8vw, 20px);
      font-weight: 500;
      color: var(--accent);
    }

    .bio-center {
      margin-top: 2vh;
      display: flex;
      justify-content: center;
    }

    .bio-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.4em 1em;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      font-size: min(3.4vw, 13px);
      color: var(--fg);
    }

    .bio-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #fff;
    }

    .hint {
      position: absolute;
      bottom: 3vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.6;
      pointer-events: none;
    }

    .slide-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease-out, opacity 0.25s ease-out;
    }

    .slide-container.enter-from-bottom {
      transform: translateY(100%);
      opacity: 0;
    }

    .slide-container.active {
      transform: translateY(0);
      opacity: 1;
    }

    .slide-container.exit-up {
      transform: translateY(-100%);
      opacity: 0;
    }
  </style>
</head>
<body>

  <div class="ambient"></div>

  <!-- Slide Viewer -->
  <div id="slide-viewer">
    <div id="slide-container" class="slide-container active">
      <div class="frame">
        <div class="inner">
          <div id="slide-title" class="title"></div>
          <div id="slide-list" class="list"></div>
          <div id="slide-cta" class="cta"></div>

          <div class="bio-center">
            <div id="slide-bio" class="bio-pill">
              <div class="bio-dot"></div>
              <span id="slide-bio-text"></span>
            </div>
          </div>
        </div>
        <div class="hint">TAP TO ADVANCE · TWO FINGERS TO EXIT</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { generateIR } from "./RootNodeEngine/ContentEngine/IR/generateIR.js";
    import { renderContent } from "./RootNodeEngine/Renderers/rendererPipeline.js";

    const viewer = document.getElementById("slide-viewer");
    const slideContainer = document.getElementById("slide-container");

    const titleEl = document.getElementById("slide-title");
    const listEl = document.getElementById("slide-list");
    const ctaEl = document.getElementById("slide-cta");
    const bioEl = document.getElementById("slide-bio");
    const bioTextEl = document.getElementById("slide-bio-text");

    let slides = [];
    let index = 0;

    function openViewer(data) {
      slides = data;
      index = 0;
      renderSlide(slides[index]);

      viewer.style.display = "flex";
      slideContainer.classList.add("active");
    }

    function closeViewer() {
      slideContainer.classList.remove("active");
      setTimeout(() => {
        viewer.style.display = "none";
      }, 250);
    }

    function renderSlide(slide) {
      titleEl.textContent = slide.title || "";

      listEl.innerHTML = "";
      if (slide.items && Array.isArray(slide.items)) {
        slide.items.forEach(item => {
          const div = document.createElement("div");
          div.className = "item";

          const dot = document.createElement("div");
          dot.className = "item-dot";

          const text = document.createElement("div");
          text.className = "item-text";
          text.textContent = item;

          div.appendChild(dot);
          div.appendChild(text);
          listEl.appendChild(div);
        });
      }

      ctaEl.textContent = slide.cta || "";
      bioTextEl.textContent = slide.bio || "";
      bioEl.style.display = slide.bio ? "inline-flex" : "none";
    }

    function nextSlide() {
      if (index < slides.length - 1) {
        index++;
        animateSlideChange(slides[index]);
      } else {
        closeViewer();
      }
    }

    function animateSlideChange(slide) {
      slideContainer.classList.remove("active");
      slideContainer.classList.add("exit-up");

      setTimeout(() => {
        slideContainer.classList.remove("exit-up");
        renderSlide(slide);
        slideContainer.classList.add("enter-from-bottom");

        requestAnimationFrame(() => {
          slideContainer.classList.remove("enter-from-bottom");
          slideContainer.classList.add("active");
        });
      }, 250);
    }

    let touches = new Set();

    viewer.addEventListener("touchstart", (e) => {
      for (const t of e.touches) touches.add(t.identifier);
      if (touches.size >= 2) {
        touches.clear();
        closeViewer();
      }
    });

    viewer.addEventListener("touchend", (e) => {
      for (const t of e.changedTouches) touches.delete(t.identifier);
    });

    viewer.addEventListener("click", () => {
      nextSlide();
    });

    /* ---------------------------
       AUTO-GENERATE ON LOAD
    ----------------------------*/
    window.addEventListener("load", () => {
      const ir = generateIR();

      // Default wrapper for auto mode
      const wrapper = "5 signs your identity is outdated";

      const output = renderContent({ wrapper, ir });

      openViewer(output.slides);
    });
  </script>
</body>
</html>
